<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#006aff">
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Tenant Login &mdash; Choice Properties</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <script defer src="/config.js"></script>
  <script defer src="/js/supabase.min.js"></script>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Inter',sans-serif}
  body{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
  .card{background:#fff;border-radius:16px;box-shadow:0 24px 64px rgba(0,0,0,.28);width:100%;max-width:420px;padding:40px 36px}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
  .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800;flex-shrink:0}
  .logo-text{font-size:1rem;font-weight:700;color:#0f172a;line-height:1.2}
  .logo-sub{font-size:.72rem;color:#64748b;font-weight:400}
  h1{font-size:1.45rem;font-weight:800;color:#0f172a;margin-bottom:6px}
  .subtitle{font-size:.85rem;color:#64748b;margin-bottom:28px;line-height:1.5}
  .form-group{margin-bottom:18px}
  .form-group label{display:block;font-size:.76rem;font-weight:600;color:#374151;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
  .form-group input{width:100%;padding:11px 14px;border:1.5px solid #d1d5db;border-radius:9px;font-size:.9rem;font-family:inherit;color:#0f172a;background:#f9fafb;transition:border-color .15s}
  .form-group input:focus{outline:none;border-color:#2563eb;background:#fff}
  .btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:9px;font-size:.92rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;margin-bottom:8px}
  .btn-primary:hover:not(:disabled){opacity:.9}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed}
  .btn-secondary{width:100%;padding:10px;background:transparent;color:#dc2626;border:1.5px solid #fecaca;border-radius:9px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:8px}
  .btn-secondary:hover{background:#fef2f2}
  .status-msg{text-align:center;font-size:.82rem;padding:10px 14px;border-radius:8px;margin-top:12px;display:none}
  .status-msg.success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;display:block}
  .status-msg.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;display:block}
  .status-msg.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;display:block}
  .back-link{display:block;text-align:center;margin-top:20px;font-size:.8rem;color:#64748b;text-decoration:none}
  .back-link:hover{color:#2563eb}
  .wrong-account-notice{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:.83rem;color:#92400e;line-height:1.55}
  .wrong-account-notice strong{color:#c2410c}
  .signed-in-banner{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:12px;padding:16px 18px;margin-bottom:22px;display:none}
  .signed-in-banner p{font-size:.83rem;color:#1e40af;line-height:1.55;margin-bottom:10px}
  .signed-in-banner strong{color:#1d4ed8}
  .btn-continue{width:100%;padding:11px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:9px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px}
  .btn-switch{width:100%;padding:10px;background:transparent;color:#6b7280;border:1.5px solid #d1d5db;border-radius:9px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit}
  .btn-switch:hover{background:#f9fafb;color:#374151}
  </style>
  </head>
  <body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">CP</div>
      <div>
        <div class="logo-text">Choice Properties</div>
        <div class="logo-sub">Tenant Portal</div>
      </div>
    </div>
    <h1>Sign In</h1>
    <p class="subtitle" id="subtitle">Enter your email to receive a secure sign-in link.</p>
    <div id="signed-in-banner" class="signed-in-banner">
      <p>You are currently signed in as <strong id="signed-in-email"></strong>.</p>
      <button class="btn-continue" id="btn-continue" onclick="goToPortal()">Continue to My Portal</button>
      <button class="btn-switch" onclick="signOutAndContinue()">Sign out &amp; use a different email</button>
    </div>
    <div id="wrong-account-notice" class="wrong-account-notice" style="display:none"></div>
    <div id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <button class="btn-primary" id="send-btn" onclick="sendMagicLink()">Send Sign-In Link</button>
      <button class="btn-secondary" id="signout-btn" style="display:none" onclick="signOutAndContinue()">Sign Out &amp; Use Different Email</button>
    </div>
    <div class="status-msg" id="status-msg"></div>
    <a href="/index.html" class="back-link">&larr; Back to Choice Properties</a>
  </div>

  <script>
  document.getElementById('email').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendMagicLink();
  });

  async function waitForSB(attempts) {
    for (let i = 0; i < (attempts || 50); i++) {
      if (window.supabase && typeof CONFIG !== 'undefined' && CONFIG.SUPABASE_URL) return true;
      await new Promise(r => setTimeout(r, 100));
    }
    return false;
  }

  function getSB() {
    return window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });
  }

  async function signOutAndContinue() {
    const sb = getSB();
    await sb.auth.signOut().catch(() => {});
    sessionStorage.removeItem('pendingPortalAppId');
    // Hide banner and wrong-account notice, restore the login form
    document.getElementById('signed-in-banner').style.display = 'none';
    document.getElementById('signout-btn').style.display = 'none';
    document.getElementById('wrong-account-notice').style.display = 'none';
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('send-btn').textContent = 'Send Sign-In Link';
    document.getElementById('send-btn').disabled = false;
    // Re-fill the email field with the URL param if present, so the user
    // doesn't have to remember which email to use.
    const params = new URLSearchParams(window.location.search);
    const emailParam = params.get('email') || '';
    if (emailParam) document.getElementById('email').value = emailParam;
    const msg = document.getElementById('status-msg');
    msg.textContent = 'Signed out. Enter the email you used on the rental application.';
    msg.className = 'status-msg info';
  }

  async function sendMagicLink() {
    const emailEl = document.getElementById('email');
    const btn = document.getElementById('send-btn');
    const msg = document.getElementById('status-msg');
    const email = emailEl.value.trim().toLowerCase();
    const params = new URLSearchParams(window.location.search);
    const appId = params.get('app_id') || sessionStorage.getItem('pendingPortalAppId') || '';

    msg.className = 'status-msg';
    msg.style.display = 'none';

    if (!email || !/^[^@]+@[^@]+\.[^@]+$/.test(email)) {
      msg.textContent = 'Please enter a valid email address.';
      msg.className = 'status-msg error';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending…';

    const ready = await waitForSB();
    if (!ready) {
      msg.textContent = 'Page not ready. Please refresh and try again.';
      msg.className = 'status-msg error';
      btn.disabled = false;
      btn.textContent = 'Send Sign-In Link';
      return;
    }

    try {
      const sb = getSB();

      // If there is already a session for a DIFFERENT email, sign out first so the
      // new magic link cleanly takes over without any session conflict.
      const { data: { session: existingSession } } = await sb.auth.getSession();
      if (existingSession && existingSession.user.email.toLowerCase() !== email) {
        await sb.auth.signOut().catch(() => {});
      }

      const redirectUrl = new URL('/tenant/portal.html', window.location.origin);
      if (appId) redirectUrl.searchParams.set('app_id', appId);

      const { error } = await sb.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: redirectUrl.toString() },
      });
      if (error) throw error;
      if (appId) sessionStorage.setItem('pendingPortalAppId', appId);
      document.getElementById('wrong-account-notice').style.display = 'none';
      document.getElementById('signout-btn').style.display = 'none';
      msg.innerHTML = '<strong>Check your email!</strong> A secure sign-in link has been sent to <strong>' + email + '</strong>. Click the link in the email to access your portal.';
      msg.className = 'status-msg success';
      document.getElementById('login-form').style.opacity = '0.5';
      document.getElementById('login-form').style.pointerEvents = 'none';
    } catch (err) {
      msg.textContent = err.message || 'Failed to send link. Please try again.';
      msg.className = 'status-msg error';
      btn.disabled = false;
      btn.textContent = 'Send Sign-In Link';
    }
  }

  let _pendingPortalAppId = '';

  function goToPortal() {
    const portalUrl = new URL('/tenant/portal.html', window.location.origin);
    if (_pendingPortalAppId) portalUrl.searchParams.set('app_id', _pendingPortalAppId);
    window.location.href = portalUrl.pathname + portalUrl.search;
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(window.location.search);
    const appId = params.get('app_id') || sessionStorage.getItem('pendingPortalAppId') || '';
    const emailParam = params.get('email') || '';
    const needEmail = params.get('need_email') === '1';
    _pendingPortalAppId = appId;
    if (appId) sessionStorage.setItem('pendingPortalAppId', appId);
    if (emailParam) document.getElementById('email').value = emailParam;

    // Show a clear contextual message when redirected here after a wrong-account error
    if (needEmail) {
      const msg = document.getElementById('status-msg');
      msg.innerHTML = emailParam
        ? 'Please sign in with <strong>' + emailParam + '</strong> — the email you used on the rental application.'
        : 'Please sign in with the email address you used when filling out the rental application for this property.';
      msg.className = 'status-msg info';
      document.getElementById('subtitle').textContent = 'Sign in with your application email.';
    }

    const ready = await waitForSB(20);
    if (!ready) return;

    const sb = getSB();
    const { data: { session } } = await sb.auth.getSession();

    if (session) {
      const signedInEmail = session.user.email.toLowerCase();
      const requestedEmail = emailParam.toLowerCase();

      // If a specific email is required and it doesn't match — show wrong-account notice.
      if (requestedEmail && signedInEmail !== requestedEmail) {
        const notice = document.getElementById('wrong-account-notice');
        notice.innerHTML =
          'You are currently signed in as <strong>' + signedInEmail + '</strong>. ' +
          'To view this application, please sign out and sign in with ' +
          '<strong>' + requestedEmail + '</strong>.';
        notice.style.display = 'block';
        document.getElementById('subtitle').textContent = 'Sign in with your application email to continue.';
        document.getElementById('signout-btn').style.display = 'block';
        return;
      }

      // A session exists — always show the banner so the user knows who they're
      // signed in as and can choose to continue or switch accounts.
      // Never auto-redirect silently: the user must consciously click "Continue".
      const banner = document.getElementById('signed-in-banner');
      document.getElementById('signed-in-email').textContent = signedInEmail;
      banner.style.display = 'block';
      document.getElementById('subtitle').textContent = 'You are already signed in.';
      document.getElementById('login-form').style.display = 'none';
    }
  });
  </script>
  </body>
  </html>
