<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="color-scheme" content="light dark">
<meta name="robots" content="noindex, nofollow">
<title>My Portal — Choice Properties</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500&display=swap">
<link rel="stylesheet" href="/css/cp-design.css?v=__BUILD_VERSION__">
<script defer src="/config.js"></script>
<script defer src="/js/supabase.min.js"></script>
<script defer src="/js/cp-ui.js?v=__BUILD_VERSION__"></script>
<script defer src="/js/cp-chrome.js?v=__BUILD_VERSION__"></script>
<script defer src="/js/cp-shell.js?v=__BUILD_VERSION__"></script>
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   PORTAL — premium design pass
   Tokens, scale, and depth tuned for a calm, confident, high-end feel.
   ═══════════════════════════════════════════════════════════════════════════ */

:root{
  /* Modern font stack */
  --font-sans: 'Geist', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  --font-display: 'Instrument Serif', 'Fraunces', Georgia, serif;
  /* Spacing scale */
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px;
  --sp-6:24px; --sp-7:32px; --sp-8:40px; --sp-9:56px; --sp-10:72px;
  /* Radius scale — slightly softer for premium feel */
  --r-sm:10px; --r-md:14px; --r-lg:20px; --r-xl:26px; --r-pill:999px;
  /* Elevation — layered for depth without heaviness */
  --elev-1:0 1px 2px rgba(15,23,42,.04), 0 1px 1px rgba(15,23,42,.03);
  --elev-2:0 2px 4px rgba(15,23,42,.04), 0 8px 24px -8px rgba(15,23,42,.08);
  --elev-3:0 4px 8px rgba(15,23,42,.06), 0 16px 40px -12px rgba(15,23,42,.14);
  --elev-cta:0 1px 2px rgba(15,23,42,.10), 0 8px 24px -6px rgba(15,23,42,.20);
  /* Card surface gradient (lit-from-above effect) */
  --card-grad: linear-gradient(180deg, color-mix(in srgb, var(--surface) 100%, white 0%) 0%, var(--surface) 100%);
  --card-highlight: inset 0 1px 0 rgba(255,255,255,.6);
  /* Theme-aware status colors */
  --acc-success-bg: var(--success-bg, #f0fdf4);
  --acc-success-border: rgba(34,197,94,.35);
  --acc-success-text: var(--success-strong, #15803d);
  --acc-warn-bg: var(--warning-bg, #fffbeb);
  --acc-warn-border: rgba(245,158,11,.35);
  --acc-warn-text: var(--warning-strong, #a16207);
  --acc-danger-bg: var(--danger-bg, #fef2f2);
  --acc-danger-border: rgba(239,68,68,.35);
  --acc-danger-text: var(--danger-strong, #b91c1c);
  --acc-info-bg: rgba(59,130,246,.10);
  --acc-info-border: rgba(59,130,246,.32);
  --acc-info-text: #1d4ed8;
  --acc-purple-bg: rgba(168,85,247,.12);
  --acc-purple-border: rgba(168,85,247,.32);
  --acc-purple-text: #7e22ce;
  --surface-2: var(--surface-alt, #f8fafc);
  --hairline: color-mix(in srgb, var(--border) 70%, transparent);
}
[data-theme="dark"]{
  --elev-1:0 1px 2px rgba(0,0,0,.30), 0 1px 1px rgba(0,0,0,.20);
  --elev-2:0 2px 4px rgba(0,0,0,.30), 0 12px 32px -8px rgba(0,0,0,.50);
  --elev-3:0 4px 8px rgba(0,0,0,.35), 0 20px 48px -12px rgba(0,0,0,.65);
  --elev-cta:0 1px 2px rgba(0,0,0,.40), 0 10px 28px -6px rgba(0,0,0,.55);
  --surface-2: rgba(255,255,255,.04);
}

/* ── Body font override (overrides Inter from cp-design.css for the portal) ── */
body[data-portal="tenant"]{
  font-family:var(--font-sans);
  font-feature-settings:"ss01","cv11","cv02";
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  letter-spacing:-.005em;
}
body[data-portal="tenant"] code,
body[data-portal="tenant"] .mono{font-family:var(--font-mono)}

/* ── Layout ── */
.main{
  max-width:760px;margin:0 auto;
  padding:var(--sp-7) var(--sp-4) var(--sp-10);
  animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both;
  font-family:var(--font-sans);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── States ── */
.loading-state{text-align:center;padding:var(--sp-10) var(--sp-5)}
.spin{
  display:inline-block;width:38px;height:38px;
  border:3px solid var(--hairline);
  border-top-color:var(--brand,#3b82f6);
  border-radius:50%;animation:spin .7s linear infinite;margin-bottom:var(--sp-4);
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--muted);font-size:.88rem;letter-spacing:.01em}

.error-card{
  background:var(--acc-danger-bg);border:1px solid var(--acc-danger-border);
  border-radius:var(--r-md);padding:var(--sp-5);text-align:center;
  color:var(--acc-danger-text);margin-bottom:var(--sp-5);font-size:.88rem;
  box-shadow:var(--elev-1);
}
.no-app{
  text-align:center;padding:var(--sp-9) var(--sp-5);
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-xl);box-shadow:var(--elev-2);
}
.no-app h3{
  font-family:var(--font-display);font-style:italic;font-weight:400;
  color:var(--text);font-size:1.7rem;line-height:1.1;
  margin-bottom:var(--sp-2);letter-spacing:-.01em;
}
.no-app p{color:var(--muted);font-size:.92rem;line-height:1.65;max-width:42ch;margin:0 auto}

/* ── Section ── */
.section{margin-bottom:var(--sp-6)}
.section-label{
  font-size:.68rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:var(--sp-3);
  display:flex;align-items:center;gap:var(--sp-2);
}
.section-label::after{
  content:"";flex:1;height:1px;background:var(--hairline);
  display:block;margin-left:var(--sp-2);
}

/* ── Card — premium surface with lit-from-above highlight ── */
.card{
  background:var(--card-grad);
  border:1px solid var(--hairline);
  border-radius:var(--r-xl);
  padding:var(--sp-6) var(--sp-6);
  box-shadow:var(--elev-2), var(--card-highlight);
  position:relative;
  transition:box-shadow .25s cubic-bezier(.16,1,.3,1), transform .25s cubic-bezier(.16,1,.3,1);
}
@media (hover:hover) and (min-width:768px){
  .card:hover{box-shadow:var(--elev-3), var(--card-highlight)}
}
[data-theme="dark"] .card{
  --card-highlight: inset 0 1px 0 rgba(255,255,255,.06);
}

/* ── Status header ── */
.status-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  flex-wrap:wrap;gap:var(--sp-3);margin-bottom:var(--sp-5);
}
.status-name{
  font-family:var(--font-display);font-style:italic;font-weight:400;
  font-size:1.7rem;line-height:1.1;color:var(--text);
  letter-spacing:-.015em;
}
.status-prop{
  font-size:.84rem;color:var(--muted);margin-top:var(--sp-1);
  display:flex;align-items:center;gap:var(--sp-1);
}
.badges-group{display:flex;gap:var(--sp-2);flex-wrap:wrap;align-items:center}
.badge{
  padding:5px 11px;border-radius:var(--r-pill);
  font-size:.66rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
  border:1px solid transparent;
  display:inline-flex;align-items:center;gap:var(--sp-1);
}
.badge::before{
  content:"";width:5px;height:5px;border-radius:50%;
  background:currentColor;opacity:.7;
}
.b-pending   {background:var(--acc-warn-bg);    color:var(--acc-warn-text);    border-color:var(--acc-warn-border)}
.b-approved  {background:var(--acc-success-bg); color:var(--acc-success-text); border-color:var(--acc-success-border)}
.b-denied    {background:var(--acc-danger-bg);  color:var(--acc-danger-text);  border-color:var(--acc-danger-border)}
.b-waitlisted{background:var(--acc-purple-bg);  color:var(--acc-purple-text);  border-color:var(--acc-purple-border)}
.b-withdrawn {background:var(--surface-2);      color:var(--muted);            border-color:var(--hairline)}
.b-none      {background:var(--surface-2);      color:var(--muted);            border-color:var(--hairline)}
.b-sent      {background:var(--acc-info-bg);    color:var(--acc-info-text);    border-color:var(--acc-info-border)}
.b-signed    {background:var(--acc-success-bg); color:var(--acc-success-text); border-color:var(--acc-success-border)}

/* ── Meta grid ── */
.meta-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:var(--sp-4) var(--sp-5);margin:var(--sp-5) 0;
  padding:var(--sp-5) 0;
  border-top:1px solid var(--hairline);
  border-bottom:1px solid var(--hairline);
}
.meta-item{display:flex;flex-direction:column;gap:var(--sp-1)}
.meta-label{
  font-size:.62rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.09em;
}
.meta-val{
  font-family:var(--font-mono);
  font-size:.88rem;color:var(--text);font-weight:500;
  font-variant-numeric:tabular-nums;letter-spacing:-.01em;
}

/* ── Divider ── */
.divider{border:none;border-top:1px solid var(--hairline);margin:var(--sp-5) 0}

/* ── Pipeline (timeline with vertical thread) ── */
.pipeline-label{
  font-size:.68rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:var(--sp-4);
}
.step-list{
  list-style:none;display:flex;flex-direction:column;gap:0;
  padding:0;margin:0;position:relative;
}
.step-list::before{
  content:"";position:absolute;left:14px;top:14px;bottom:14px;
  width:2px;background:var(--hairline);border-radius:1px;z-index:0;
}
.step-item{
  display:flex;align-items:flex-start;gap:var(--sp-4);
  padding:var(--sp-3) 0;position:relative;z-index:1;
}
.step-icon{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.74rem;font-weight:700;flex-shrink:0;
  background:var(--surface);border:2px solid var(--border);
  color:var(--muted);transition:all .25s ease;
}
.step-done{
  background:var(--acc-success-text);border-color:var(--acc-success-text);color:#fff;
  box-shadow:0 0 0 4px color-mix(in srgb,var(--acc-success-text) 12%,transparent);
}
.step-active{
  background:var(--surface);border-color:var(--acc-info-text);color:var(--acc-info-text);
  box-shadow:0 0 0 4px color-mix(in srgb,var(--acc-info-text) 14%,transparent);
}
.step-active::after{
  content:"";position:absolute;width:30px;height:30px;border-radius:50%;
  border:2px solid var(--acc-info-text);opacity:.4;
  animation:ping 2s cubic-bezier(0,0,.2,1) infinite;
}
@keyframes ping{0%{transform:scale(1);opacity:.4}80%,100%{transform:scale(1.6);opacity:0}}
.step-wait{background:var(--surface);border-color:var(--hairline);color:var(--muted)}
.step-text{
  font-size:.92rem;font-weight:600;color:var(--text);
  letter-spacing:-.005em;line-height:1.4;
}
.step-sub{font-size:.78rem;color:var(--muted);margin-top:var(--sp-1);line-height:1.55}

/* ── Action cards (success/warn/danger/purple) — shared aesthetic ── */
.payment-card,.movein-card{
  background:var(--surface);border:1px solid var(--acc-success-border);
  border-radius:var(--r-lg);padding:var(--sp-5) var(--sp-5);
  position:relative;overflow:hidden;box-shadow:var(--elev-1);
}
.payment-card::before,.movein-card::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--acc-success-text),color-mix(in srgb,var(--acc-success-text) 60%,transparent));
}
.payment-title,.movein-title{
  font-size:.88rem;font-weight:700;color:var(--acc-success-text);
  margin-bottom:var(--sp-3);display:flex;align-items:center;gap:var(--sp-2);
  letter-spacing:.01em;
}
.pay-unpaid-card{
  background:var(--surface);border:1px solid var(--acc-warn-border);
  border-radius:var(--r-lg);padding:var(--sp-5) var(--sp-5);
  position:relative;overflow:hidden;box-shadow:var(--elev-1);
}
.pay-unpaid-card::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--acc-warn-text),color-mix(in srgb,var(--acc-warn-text) 60%,transparent));
}
.pay-unpaid-title{
  font-size:.88rem;font-weight:700;color:var(--acc-warn-text);
  margin-bottom:var(--sp-2);display:flex;align-items:center;gap:var(--sp-2);
}
.denied-card,.waitlist-card{
  background:var(--surface);border-radius:var(--r-lg);
  padding:var(--sp-5) var(--sp-6);margin-top:var(--sp-4);
  position:relative;overflow:hidden;box-shadow:var(--elev-1);
}
.denied-card{border:1px solid var(--acc-danger-border)}
.denied-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--acc-danger-text)}
.denied-title{font-size:.96rem;font-weight:700;color:var(--acc-danger-text);margin-bottom:var(--sp-2)}
.waitlist-card{border:1px solid var(--acc-purple-border)}
.waitlist-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--acc-purple-text)}
.waitlist-title{font-size:.96rem;font-weight:700;color:var(--acc-purple-text);margin-bottom:var(--sp-2)}

/* ── Buttons ── */
.btn-sign,.btn-download,.hero-cta{
  display:inline-flex;align-items:center;gap:var(--sp-2);
  padding:13px 22px;border:none;border-radius:var(--r-md);
  font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit;
  text-decoration:none;letter-spacing:-.005em;
  transition:transform .18s cubic-bezier(.16,1,.3,1),box-shadow .18s,filter .18s;
  box-shadow:var(--elev-cta);color:#fff;
}
.btn-sign{background:linear-gradient(135deg,#16a34a 0%,#22c55e 100%)}
.btn-download{background:linear-gradient(135deg,#1e40af 0%,#3b82f6 100%)}
.btn-sign:hover,.btn-download:hover,.hero-cta:hover{transform:translateY(-1px);filter:brightness(1.05)}
.btn-sign:active,.btn-download:active,.hero-cta:active{transform:translateY(0)}
.lease-section{margin-top:var(--sp-5)}

/* ── Withdraw — quiet by design ── */
.btn-withdraw{
  display:inline-flex;align-items:center;gap:var(--sp-2);padding:9px 16px;
  background:transparent;border:1px solid var(--hairline);color:var(--muted);
  border-radius:var(--r-sm);font-size:.78rem;font-weight:500;cursor:pointer;
  font-family:inherit;transition:all .15s;margin-top:var(--sp-5);
}
.btn-withdraw:hover{
  background:var(--acc-danger-bg);border-color:var(--acc-danger-border);
  color:var(--acc-danger-text);
}

/* ── Doc rows (legacy fallback) ── */
.doc-row{display:flex;align-items:center;gap:var(--sp-3);flex-wrap:wrap;padding:var(--sp-3) 0;border-bottom:1px solid var(--hairline)}
.doc-row:last-child{border-bottom:none}
.doc-label{color:var(--text);font-size:.86rem;min-width:180px;font-weight:500}
.btn-choose{
  padding:8px 16px;background:var(--acc-info-bg);border:1px solid var(--acc-info-border);
  color:var(--acc-info-text);border-radius:var(--r-sm);font-size:.78rem;font-weight:600;
  cursor:pointer;font-family:inherit;
}
.btn-choose:hover{filter:brightness(.96)}
.doc-status{font-size:.78rem;color:var(--muted)}

/* ── Footer ── */
.portal-footer{
  text-align:center;margin-top:var(--sp-9);
  font-size:.78rem;color:var(--muted);line-height:2;
  padding-top:var(--sp-6);border-top:1px solid var(--hairline);
}
.portal-footer a{color:var(--text);text-decoration:none;font-weight:500;border-bottom:1px solid var(--hairline);padding-bottom:1px}
.portal-footer a:hover{border-color:var(--text)}

/* ── Inline SVG icons ── */
.ico{width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;display:inline-block;vertical-align:-0.15em;flex-shrink:0}
.ico-lg{width:1.25em;height:1.25em}

/* ═══════════════════════════════════════════════════════════════════════════
   HERO — cinematic, calm, confident
   ═══════════════════════════════════════════════════════════════════════════ */
.hero{
  position:relative;background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  padding:var(--sp-7) var(--sp-7) var(--sp-6);
  margin-bottom:var(--sp-5);overflow:hidden;
  box-shadow:var(--elev-3);
}
/* Soft mesh gradient backdrop */
.hero::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 0% 0%, color-mix(in srgb,var(--hero-from,#3b82f6) 14%,transparent) 0%, transparent 60%),
    radial-gradient(ellipse 70% 50% at 100% 0%, color-mix(in srgb,var(--hero-to,#8b5cf6) 11%,transparent) 0%, transparent 60%);
  opacity:.9;
}
/* Top accent line */
.hero::after{
  content:"";position:absolute;left:0;right:0;top:0;height:3px;
  background:linear-gradient(90deg,var(--hero-from,#3b82f6),var(--hero-to,#8b5cf6));
  opacity:.85;
}
.hero > *{position:relative;z-index:1}

.hero[data-tone="success"]{--hero-from:#22c55e;--hero-to:#10b981}
.hero[data-tone="warn"]   {--hero-from:#f59e0b;--hero-to:#f97316}
.hero[data-tone="danger"] {--hero-from:#ef4444;--hero-to:#dc2626}
.hero[data-tone="info"]   {--hero-from:#3b82f6;--hero-to:#6366f1}
.hero[data-tone="purple"] {--hero-from:#a855f7;--hero-to:#7c3aed}

.hero-eyebrow{
  display:inline-flex;align-items:center;gap:var(--sp-2);
  font-size:.66rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.14em;margin-bottom:var(--sp-3);
  padding:5px 10px;background:var(--surface-2);
  border:1px solid var(--hairline);border-radius:var(--r-pill);
}
.hero-eyebrow::before{
  content:"";width:6px;height:6px;border-radius:50%;
  background:var(--hero-from,#3b82f6);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--hero-from,#3b82f6) 25%,transparent);
}
.hero-title{
  font-family:var(--font-display);font-style:italic;font-weight:400;
  font-size:clamp(2rem, 5vw, 2.5rem);line-height:1.05;
  color:var(--text);margin-bottom:var(--sp-3);letter-spacing:-.02em;
}
.hero-sub{
  font-size:.95rem;color:var(--muted);line-height:1.6;
  margin-bottom:var(--sp-5);max-width:48ch;
}
.hero-cta{
  background:linear-gradient(135deg,var(--hero-from,#3b82f6) 0%,var(--hero-to,#6366f1) 100%);
}
.hero-cta-ghost{
  display:inline-flex;align-items:center;gap:var(--sp-2);
  padding:13px 18px;margin-left:var(--sp-2);
  background:transparent;color:var(--muted);
  border:1px solid var(--hairline);border-radius:var(--r-md);
  font-size:.86rem;font-weight:500;text-decoration:none;
  transition:all .15s;
}
.hero-cta-ghost:hover{color:var(--text);border-color:var(--border);background:var(--surface-2)}

/* ── Progress bar ── */
.progress-wrap{margin:var(--sp-5) 0 var(--sp-2)}
.progress-row{
  display:flex;align-items:center;justify-content:space-between;
  font-size:.7rem;color:var(--muted);margin-bottom:var(--sp-2);
  font-weight:600;letter-spacing:.06em;text-transform:uppercase;
}
.progress{
  height:8px;background:var(--surface-2);border-radius:var(--r-pill);
  overflow:hidden;position:relative;
  box-shadow:inset 0 1px 2px rgba(15,23,42,.06);
}
.progress-fill{
  height:100%;border-radius:var(--r-pill);
  background:linear-gradient(90deg,var(--hero-from,#3b82f6),var(--hero-to,#6366f1));
  transition:width .8s cubic-bezier(.16,1,.3,1);
  position:relative;overflow:hidden;
}
.progress-fill::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
  animation:shimmer 2.4s ease-in-out infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

/* ── Countdown ── */
.countdown{
  display:inline-flex;align-items:center;gap:var(--sp-1);
  padding:5px 11px;border-radius:var(--r-pill);
  font-size:.74rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.02em;
  background:var(--acc-warn-bg);color:var(--acc-warn-text);
  border:1px solid var(--acc-warn-border);
  box-shadow:var(--elev-1);
}
.countdown[data-urgent="1"]{
  background:var(--acc-danger-bg);color:var(--acc-danger-text);
  border-color:var(--acc-danger-border);animation:pulse 2s ease-in-out infinite;
}
.countdown[data-expired="1"]{background:var(--acc-danger-bg);color:var(--acc-danger-text);border-color:var(--acc-danger-border)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.85;transform:scale(.985)}}

/* ── Document checklist ── */
.doc-check{
  display:flex;align-items:center;gap:var(--sp-4);
  padding:var(--sp-4) 0;border-bottom:1px solid var(--hairline);
  transition:background .15s;
}
.doc-check:first-child{padding-top:var(--sp-2)}
.doc-check:last-child{border-bottom:none;padding-bottom:var(--sp-2)}
.doc-check-icon{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.92rem;font-weight:700;flex-shrink:0;
  background:var(--surface-2);color:var(--muted);
  border:1px solid var(--hairline);transition:all .25s;
}
.doc-check[data-state="done"] .doc-check-icon{
  background:var(--acc-success-text);color:#fff;border-color:var(--acc-success-text);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--acc-success-text) 14%,transparent);
}
.doc-check[data-state="optional"] .doc-check-icon{background:var(--surface-2);color:var(--muted);border-color:var(--hairline)}
.doc-check-body{flex:1;min-width:0}
.doc-check-label{font-size:.92rem;font-weight:600;color:var(--text);letter-spacing:-.005em}
.doc-check-status{font-size:.78rem;color:var(--muted);margin-top:2px;line-height:1.5}
.doc-check-files{margin-top:var(--sp-1);display:flex;flex-direction:column;gap:2px}
.doc-check-file{font-size:.76rem;color:var(--acc-success-text);font-weight:500;display:flex;align-items:center;gap:var(--sp-1)}
.btn-choose-mini{
  padding:8px 14px;background:var(--surface);
  border:1px solid var(--border);color:var(--text);
  border-radius:var(--r-sm);font-size:.78rem;font-weight:600;
  cursor:pointer;font-family:inherit;flex-shrink:0;
  transition:all .15s;
}
.btn-choose-mini:hover{border-color:var(--acc-info-border);color:var(--acc-info-text);background:var(--acc-info-bg)}
.doc-check[data-state="done"] .btn-choose-mini{
  background:transparent;border-color:var(--hairline);color:var(--muted);
}
.doc-check[data-state="done"] .btn-choose-mini:hover{color:var(--text);border-color:var(--border)}

/* ── App switcher pills (when multiple applications) ── */
.section [style*="display:flex;gap:8px;flex-wrap:wrap"] > *{
  padding:8px 14px !important;
  border-radius:var(--r-pill) !important;
  font-size:.8rem !important;
  font-weight:500 !important;
  border:1px solid var(--hairline) !important;
  background:var(--surface) !important;
  transition:all .15s;
}

/* ═══════════════════════════════════════════════════════════════════════════
   HERO ICON — tone-colored badge that sits above the title
   ═══════════════════════════════════════════════════════════════════════════ */
.hero-icon{
  width:52px;height:52px;border-radius:var(--r-md);
  display:inline-flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,
    color-mix(in srgb, var(--hero-from,#3b82f6) 18%, var(--surface)),
    color-mix(in srgb, var(--hero-to,#6366f1)   12%, var(--surface)));
  border:1px solid color-mix(in srgb, var(--hero-from,#3b82f6) 28%, transparent);
  margin-bottom:var(--sp-4);position:relative;
  box-shadow:var(--elev-1);
}
.hero-icon .ico{
  width:24px;height:24px;stroke-width:2.25;
  color:var(--hero-from,#3b82f6);
}
.hero-icon::after{
  content:"";position:absolute;inset:-6px;border-radius:calc(var(--r-md) + 4px);
  border:1px solid color-mix(in srgb, var(--hero-from,#3b82f6) 18%, transparent);
  pointer-events:none;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MOBILE — card-first redesign for ≤520px
   • Stat tiles instead of label/value rows
   • 2x2 doc grid with whole-card tap targets
   • Hero gets bigger icon, full-width CTA
   ═══════════════════════════════════════════════════════════════════════════ */
@media (max-width: 520px){
  .main{padding:var(--sp-5) var(--sp-3) var(--sp-9)}
  .card{padding:var(--sp-5) var(--sp-5);border-radius:var(--r-lg)}

  /* ── Hero: bigger icon, tighter title, full-width CTA ── */
  .hero{padding:var(--sp-6) var(--sp-5) var(--sp-5);border-radius:var(--r-lg)}
  .hero-icon{
    width:60px;height:60px;border-radius:var(--r-md);
    margin-bottom:var(--sp-5);
  }
  .hero-icon .ico{width:28px;height:28px}
  .hero-title{font-size:1.5rem;line-height:1.18}
  .hero-sub{font-size:.9rem}
  .hero-cta{
    display:flex;width:100%;justify-content:center;
    padding:14px 20px;font-size:.92rem;
  }
  .hero-cta-ghost{
    display:flex;width:100%;justify-content:center;margin-left:0;margin-top:var(--sp-2);
    padding:13px 18px;
  }

  /* ── Status header collapses to vertical stack ── */
  .status-header{flex-direction:column;align-items:flex-start;gap:var(--sp-3);margin-bottom:var(--sp-4)}
  .status-name{font-size:1.3rem}

  /* ── Meta grid → 2-column stat tile cards ── */
  .meta-grid{
    grid-template-columns:repeat(2,1fr);
    gap:var(--sp-2);
    padding:0;margin:var(--sp-4) 0;
    border:none;
  }
  .meta-item{
    background:var(--surface-2);
    border:1px solid var(--hairline);
    border-radius:var(--r-md);
    padding:var(--sp-3) var(--sp-4);
    gap:var(--sp-1);
    min-height:56px;
    justify-content:center;
  }
  .meta-label{font-size:.6rem;letter-spacing:.10em}
  .meta-val{font-size:.95rem;line-height:1.3;word-break:break-word}

  /* ── Pipeline: tighter and beefier touch targets ── */
  .step-list::before{left:13px}
  .step-icon{width:28px;height:28px}
  .step-text{font-size:.9rem}
  .step-sub{font-size:.78rem}

  /* ── Document checklist → 2-column tap-target grid ── */
  #doc-checklist-list{
    display:grid;grid-template-columns:repeat(2,1fr);
    gap:var(--sp-3);
  }
  .doc-check{
    flex-direction:column;align-items:center;text-align:center;
    gap:var(--sp-2);padding:var(--sp-5) var(--sp-3) var(--sp-4);
    border:1.5px solid var(--hairline);border-radius:var(--r-md);
    background:var(--surface);
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    transition:transform .15s, border-color .15s, background .15s, box-shadow .15s;
    position:relative;min-height:140px;
  }
  .doc-check:first-child,.doc-check:last-child{padding-top:var(--sp-5);padding-bottom:var(--sp-4)}
  .doc-check:active{transform:scale(.98)}
  .doc-check:hover{border-color:var(--border);box-shadow:var(--elev-1)}
  .doc-check[data-state="done"]{
    border-color:var(--acc-success-border);
    background:linear-gradient(180deg, color-mix(in srgb, var(--acc-success-text) 5%, var(--surface)) 0%, var(--surface) 100%);
  }
  .doc-check-icon{width:42px;height:42px;font-size:1.1rem}
  .doc-check[data-state="done"] .doc-check-icon{
    box-shadow:0 0 0 4px color-mix(in srgb,var(--acc-success-text) 16%,transparent);
  }
  .doc-check-body{flex:0 0 auto;width:100%;text-align:center}
  .doc-check-label{font-size:.84rem;line-height:1.3}
  .doc-check-status{font-size:.7rem;margin-top:2px;line-height:1.4;
    /* Truncate the long hint text on mobile to keep cards uniform. */
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .doc-check-files{align-items:center}
  .doc-check-file{font-size:.68rem;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
  /* Hide the explicit "Upload/Replace" button — whole card is tappable now,
     but we leave it in the DOM so handlers still work as fallback. */
  .doc-check .btn-choose-mini{
    position:absolute;top:var(--sp-2);right:var(--sp-2);
    padding:4px 8px;font-size:.65rem;
    background:transparent;border-color:transparent;color:var(--muted);
  }
  .doc-check[data-state="done"] .btn-choose-mini{color:var(--acc-success-text)}
  /* Hide the inline upload status line on mobile (status appears via icon state). */
  .doc-check + .doc-status{display:none}

  /* ── Action cards: tighter padding ── */
  .payment-card,.movein-card,.pay-unpaid-card,.denied-card,.waitlist-card{
    padding:var(--sp-4) var(--sp-4) var(--sp-4) var(--sp-5);border-radius:var(--r-md);
  }

  /* ── Buttons: full width on mobile (sign + download) ── */
  .btn-sign,.btn-download{display:flex;width:100%;justify-content:center;padding:14px 20px}
  .lease-section{display:flex;flex-direction:column;gap:var(--sp-2)}

  /* ── Section labels: cleaner on mobile ── */
  .section{margin-bottom:var(--sp-5)}
  .section-label{font-size:.66rem}
}

/* ── Tablet (521px–768px): hybrid layout ── */
@media (min-width: 521px) and (max-width: 768px){
  #doc-checklist-list{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--sp-3)}
  .doc-check{
    flex-direction:column;align-items:center;text-align:center;
    padding:var(--sp-5);border:1px solid var(--hairline);border-radius:var(--r-md);
    cursor:pointer;
  }
  .doc-check:active{transform:scale(.985)}
}

/* ═══════════════════════════════════════════════════════════════════════════
   PROPERTY HERO — editorial photo card with address, beds/baths, gradient mask
   ═══════════════════════════════════════════════════════════════════════════ */
.prop-hero{
  position:relative;border-radius:var(--r-xl);overflow:hidden;
  margin-bottom:var(--sp-5);background:var(--surface-2);
  border:1px solid var(--border);box-shadow:var(--elev-3);
  isolation:isolate;
}
.prop-hero-img{
  width:100%;height:240px;display:block;object-fit:cover;
  background:linear-gradient(135deg,#1e3a8a 0%,#7c3aed 50%,#db2777 100%);
}
.prop-hero-img.is-placeholder{
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.85);font-family:var(--font-display);
  font-style:italic;font-size:1.4rem;letter-spacing:-.01em;
  text-shadow:0 2px 12px rgba(0,0,0,.25);
}
.prop-hero-overlay{
  position:absolute;left:0;right:0;bottom:0;
  padding:var(--sp-7) var(--sp-7) var(--sp-6);
  background:linear-gradient(180deg, transparent 0%, rgba(0,0,0,.55) 60%, rgba(0,0,0,.78) 100%);
  color:#fff;
}
.prop-hero-greet{
  display:inline-flex;align-items:center;gap:var(--sp-2);
  font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;
  color:rgba(255,255,255,.85);margin-bottom:var(--sp-2);
  padding:5px 11px;border-radius:var(--r-pill);
  background:rgba(255,255,255,.14);backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.18);
}
.prop-hero-greet::before{
  content:"";width:6px;height:6px;border-radius:50%;
  background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.35);
}
.prop-hero-title{
  font-family:var(--font-display);font-style:italic;font-weight:400;
  font-size:clamp(1.6rem, 4.4vw, 2.2rem);line-height:1.08;
  color:#fff;letter-spacing:-.02em;margin-bottom:var(--sp-2);
  text-shadow:0 1px 3px rgba(0,0,0,.30);
}
.prop-hero-addr{
  font-size:.92rem;color:rgba(255,255,255,.92);
  display:flex;align-items:center;gap:var(--sp-2);
  font-weight:500;letter-spacing:-.005em;
}
.prop-hero-addr .ico{opacity:.85}
.prop-hero-stats{
  display:flex;gap:var(--sp-4);margin-top:var(--sp-3);flex-wrap:wrap;
  font-size:.82rem;color:rgba(255,255,255,.88);font-weight:500;
}
.prop-hero-stats span{display:inline-flex;align-items:center;gap:6px}
.prop-hero-stats .ico{width:.95em;height:.95em;opacity:.85}
.prop-hero-skel{
  height:240px;background:linear-gradient(135deg,
    color-mix(in srgb,var(--brand,#3b82f6) 12%,var(--surface-2)),
    color-mix(in srgb,#a855f7 10%,var(--surface-2)));
  position:relative;overflow:hidden;
}
.prop-hero-skel::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  animation:shimmer 1.6s ease-in-out infinite;
}

/* ═══════════════════════════════════════════════════════════════════════════
   ACTIVITY FEED — live timeline of what's happening with the application
   ═══════════════════════════════════════════════════════════════════════════ */
.activity{margin-bottom:var(--sp-6)}
.activity-card{
  background:var(--card-grad);border:1px solid var(--hairline);
  border-radius:var(--r-xl);padding:var(--sp-5) var(--sp-6);
  box-shadow:var(--elev-2), var(--card-highlight);
}
.activity-head{
  display:flex;align-items:center;justify-content:space-between;
  gap:var(--sp-3);margin-bottom:var(--sp-4);
}
.activity-head-l{display:flex;align-items:center;gap:var(--sp-2)}
.activity-title{
  font-family:var(--font-display);font-style:italic;font-weight:400;
  font-size:1.25rem;color:var(--text);letter-spacing:-.01em;
}
.live-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:var(--r-pill);
  background:color-mix(in srgb,var(--acc-success-text) 10%,transparent);
  border:1px solid color-mix(in srgb,var(--acc-success-text) 35%,transparent);
  color:var(--acc-success-text);font-size:.66rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;
}
.live-pill::before{
  content:"";width:6px;height:6px;border-radius:50%;
  background:var(--acc-success-text);
  box-shadow:0 0 0 0 color-mix(in srgb,var(--acc-success-text) 60%,transparent);
  animation:livepulse 1.8s ease-out infinite;
}
@keyframes livepulse{
  0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--acc-success-text) 60%,transparent)}
  70%{box-shadow:0 0 0 8px color-mix(in srgb,var(--acc-success-text) 0%,transparent)}
  100%{box-shadow:0 0 0 0 color-mix(in srgb,var(--acc-success-text) 0%,transparent)}
}
.live-pill[data-state="off"]{
  background:var(--surface-2);border-color:var(--hairline);color:var(--muted);
}
.live-pill[data-state="off"]::before{background:var(--muted);animation:none;box-shadow:none}
.activity-list{
  list-style:none;padding:0;margin:0;
  display:flex;flex-direction:column;
  position:relative;
}
.activity-list::before{
  content:"";position:absolute;left:14px;top:14px;bottom:14px;
  width:2px;background:var(--hairline);border-radius:1px;z-index:0;
}
.activity-item{
  display:flex;align-items:flex-start;gap:var(--sp-4);
  padding:var(--sp-3) 0;position:relative;z-index:1;
  animation:fadeUp .35s cubic-bezier(.16,1,.3,1) both;
}
.activity-item.new{
  animation:fadeUp .35s cubic-bezier(.16,1,.3,1) both, gentleHi 1.6s ease-out;
}
@keyframes gentleHi{
  0%{background:color-mix(in srgb,var(--acc-info-text) 10%,transparent)}
  100%{background:transparent}
}
.activity-dot{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface);border:2px solid var(--border);
  color:var(--muted);
}
.activity-dot.success{background:var(--acc-success-text);border-color:var(--acc-success-text);color:#fff}
.activity-dot.info{background:var(--surface);border-color:var(--acc-info-text);color:var(--acc-info-text)}
.activity-dot.warn{background:var(--surface);border-color:var(--acc-warn-text);color:var(--acc-warn-text)}
.activity-dot.purple{background:var(--surface);border-color:var(--acc-purple-text);color:var(--acc-purple-text)}
.activity-dot .ico{width:14px;height:14px;stroke-width:2.5}
.activity-body{flex:1;min-width:0;padding-top:2px}
.activity-text{
  font-size:.92rem;font-weight:600;color:var(--text);
  letter-spacing:-.005em;line-height:1.4;
}
.activity-sub{font-size:.78rem;color:var(--muted);margin-top:2px;line-height:1.5}
.activity-time{font-size:.72rem;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:2px}

/* ═══════════════════════════════════════════════════════════════════════════
   TOAST — slide-up notification for upload/sign/realtime updates
   ═══════════════════════════════════════════════════════════════════════════ */
.toast-stack{
  position:fixed;left:50%;bottom:max(20px, env(safe-area-inset-bottom, 0px));
  transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column-reverse;gap:8px;
  pointer-events:none;width:max-content;max-width:calc(100% - 32px);
}
.toast{
  pointer-events:auto;
  display:flex;align-items:center;gap:var(--sp-3);
  padding:12px 18px;background:var(--text);color:var(--surface);
  border-radius:var(--r-pill);box-shadow:0 12px 36px rgba(15,23,42,.30);
  font-size:.85rem;font-weight:600;letter-spacing:-.005em;
  animation:toastIn .35s cubic-bezier(.16,1,.3,1) both;
}
.toast.success{background:#15803d;color:#fff}
.toast.warn{background:#a16207;color:#fff}
.toast.danger{background:#b91c1c;color:#fff}
.toast.info{background:#1e293b;color:#fff}
.toast .ico{width:18px;height:18px;stroke-width:2.5}
.toast.leaving{animation:toastOut .25s cubic-bezier(.4,0,1,1) both}
@keyframes toastIn{
  from{opacity:0;transform:translateY(20px) scale(.95)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes toastOut{
  to{opacity:0;transform:translateY(20px) scale(.95)}
}

/* ═══════════════════════════════════════════════════════════════════════════
   SKELETON LOADERS — replaces the central spinner; perceived speed boost
   ═══════════════════════════════════════════════════════════════════════════ */
.skeleton-set{display:flex;flex-direction:column;gap:var(--sp-5)}
.skel{
  background:linear-gradient(90deg,
    var(--surface-2) 0%,
    color-mix(in srgb,var(--text) 6%,var(--surface-2)) 50%,
    var(--surface-2) 100%);
  background-size:200% 100%;
  animation:skelShimmer 1.4s linear infinite;
  border-radius:var(--r-md);
}
@keyframes skelShimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
.skel-hero{height:240px;border-radius:var(--r-xl)}
.skel-card{
  background:var(--surface);border:1px solid var(--hairline);
  border-radius:var(--r-xl);padding:var(--sp-6);
  box-shadow:var(--elev-2);
  display:flex;flex-direction:column;gap:var(--sp-3);
}
.skel-line{height:14px;border-radius:6px}
.skel-line.short{width:35%}
.skel-line.med{width:60%}
.skel-line.long{width:90%}
.skel-line.title{height:24px;width:55%;margin-bottom:var(--sp-2)}
.skel-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--sp-3);margin-top:var(--sp-3)}
.skel-tile{height:54px;border-radius:var(--r-md)}

/* ═══════════════════════════════════════════════════════════════════════════
   THEME TOGGLE — floating segmented control (light / auto / dark)
   ═══════════════════════════════════════════════════════════════════════════ */
.theme-toggle{
  position:fixed;
  top:calc(var(--appbar-h, 56px) + var(--safe-top, 0px) + 10px);
  right:14px;
  z-index:60;display:inline-flex;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-pill);padding:3px;gap:2px;
  box-shadow:var(--elev-2);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.theme-toggle button{
  width:30px;height:30px;border:none;background:transparent;
  border-radius:var(--r-pill);cursor:pointer;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  transition:background .18s, color .18s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}
.theme-toggle button:hover{color:var(--text)}
.theme-toggle button[data-active="1"]{
  background:var(--surface-2);color:var(--text);
  box-shadow:inset 0 0 0 1px var(--hairline);
}
.theme-toggle .ico{width:14px;height:14px}
@media (max-width:520px){
  .theme-toggle{top:max(10px, env(safe-area-inset-top, 0px));right:10px}
}

/* ═══════════════════════════════════════════════════════════════════════════
   DROPZONE / DOC POLISH — drag-and-drop on desktop, camera button on mobile
   ═══════════════════════════════════════════════════════════════════════════ */
.dropzone{
  border:2px dashed var(--hairline);border-radius:var(--r-md);
  padding:var(--sp-4);margin-bottom:var(--sp-4);
  background:var(--surface-2);
  display:flex;align-items:center;gap:var(--sp-3);
  font-size:.82rem;color:var(--muted);
  transition:border-color .18s, background .18s, color .18s;
}
.dropzone .ico{width:22px;height:22px;color:var(--muted);flex-shrink:0}
.dropzone[data-active="1"]{
  border-color:var(--acc-info-text);background:var(--acc-info-bg);
  color:var(--acc-info-text);
}
.dropzone[data-active="1"] .ico{color:var(--acc-info-text)}
.dropzone strong{color:var(--text);font-weight:600}
@media (max-width:520px){
  .dropzone{display:none} /* mobile uses tap + camera capture instead */
}
.cam-btn{
  display:none;
  -webkit-tap-highlight-color:transparent;
}
@media (max-width:520px){
  .doc-check{padding-right:46px}
  .doc-check .cam-btn{
    display:inline-flex;position:absolute;top:50%;right:8px;transform:translateY(-50%);
    width:36px;height:36px;align-items:center;justify-content:center;
    background:var(--surface);border:1px solid var(--border);
    border-radius:50%;color:var(--muted);
    box-shadow:var(--elev-1);
  }
  .doc-check .cam-btn .ico{width:16px;height:16px}
  .doc-check[data-state="done"] .cam-btn{color:var(--acc-success-text);border-color:var(--acc-success-border)}
}

/* ═══════════════════════════════════════════════════════════════════════════
   TRUST STRIP — small reassurance row above the footer
   ═══════════════════════════════════════════════════════════════════════════ */
.trust-strip{
  display:flex;justify-content:center;gap:var(--sp-5);flex-wrap:wrap;
  padding:var(--sp-5) var(--sp-3) var(--sp-3);
  font-size:.74rem;color:var(--muted);
}
.trust-strip span{display:inline-flex;align-items:center;gap:6px;letter-spacing:.01em}
.trust-strip .ico{width:13px;height:13px;color:var(--acc-success-text);opacity:.85}

/* ═══════════════════════════════════════════════════════════════════════════
   APP SWITCHER PILLS — when a user has multiple applications
   ═══════════════════════════════════════════════════════════════════════════ */
.app-switch{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:var(--sp-3)}
.app-switch button{
  padding:8px 14px;border-radius:var(--r-pill);
  font-size:.78rem;font-weight:600;font-family:inherit;
  border:1px solid var(--hairline);background:var(--surface);
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.app-switch button[data-active="1"]{
  background:var(--text);color:var(--surface);border-color:var(--text);
}
.app-switch button:hover{color:var(--text);border-color:var(--border)}

/* ── Mobile spacing for property hero ── */
@media (max-width:520px){
  .prop-hero-img{height:200px}
  .prop-hero-overlay{padding:var(--sp-5) var(--sp-5) var(--sp-4)}
  .prop-hero-title{font-size:1.4rem}
  .prop-hero-addr{font-size:.86rem}
  .activity-card{padding:var(--sp-4) var(--sp-5);border-radius:var(--r-lg)}
  .activity-title{font-size:1.1rem}
}

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce){
  .main,.spin,.step-active::after,.progress-fill::after,.countdown,.btn-sign,.btn-download,.hero-cta,.prop-hero-skel::after,.skel,.toast,.activity-item,.live-pill::before{animation:none!important;transition:none!important}
}
</style>
</head>
