<head>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --bg:#0b1120;--surface:#111827;--surface2:#1a2235;--surface3:#1e2d45;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.13);
  --text:#f1f5f9;--muted:#94a3b8;--muted2:#64748b;
  --blue:#3b82f6;--blue-dark:#1d4ed8;
  --green:#22c55e;--green-dark:#15803d;
  --red:#ef4444;--purple:#a855f7;--amber:#f59e0b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}

/* ── Topbar ── */
.topbar{background:rgba(11,17,32,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--blue-dark),var(--blue));border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.85rem;font-weight:800;flex-shrink:0}
.topbar-title{font-size:.97rem;font-weight:700;color:var(--text)}
.topbar-sub{font-size:.68rem;color:var(--muted)}
.topbar-right{display:flex;align-items:center;gap:12px}
.user-email{font-size:.75rem;color:var(--muted)}
@media(max-width:500px){.user-email{display:none}}
.btn-signout{padding:7px 14px;border-radius:8px;background:rgba(255,255,255,.07);border:1px solid var(--border2);color:var(--muted);font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-signout:hover{background:rgba(255,255,255,.12);color:var(--text)}

/* ── Main ── */
.main{max-width:680px;margin:0 auto;padding:28px 16px 80px}

/* ── States ── */
.loading-state{text-align:center;padding:80px 20px}
.spin{display:inline-block;width:36px;height:36px;border:3px solid rgba(255,255,255,.08);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--muted);font-size:.88rem}
.error-card{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:20px;text-align:center;color:#fca5a5;margin-bottom:20px;font-size:.88rem}
.no-app{text-align:center;padding:48px 20px;background:var(--surface);border:1px solid var(--border);border-radius:16px}
.no-app h3{color:var(--text);font-size:1rem;margin-bottom:8px}
.no-app p{color:var(--muted);font-size:.85rem;line-height:1.6}

/* ── Section ── */
.section{margin-bottom:22px}
.section-label{font-size:.66rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px}

/* ── Card ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 22px}

/* ── Status header ── */
.status-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px}
.status-name{font-size:1.2rem;font-weight:800;color:var(--text)}
.status-prop{font-size:.8rem;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px}
.badges-group{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.badge{padding:4px 12px;border-radius:12px;font-size:.69rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.b-pending{background:rgba(245,158,11,.15);color:#f59e0b}
.b-approved{background:rgba(34,197,94,.15);color:#22c55e}
.b-denied{background:rgba(239,68,68,.15);color:#ef4444}
.b-waitlisted{background:rgba(168,85,247,.15);color:#a855f7}
.b-withdrawn{background:rgba(100,116,139,.12);color:#94a3b8}
.b-none{background:rgba(100,116,139,.12);color:#64748b}
.b-sent{background:rgba(59,130,246,.15);color:#60a5fa}
.b-signed{background:rgba(34,197,94,.15);color:#22c55e}

/* ── Meta grid ── */
.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin:16px 0}
.meta-item{display:flex;flex-direction:column;gap:3px}
.meta-label{font-size:.62rem;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em}
.meta-val{font-size:.88rem;color:var(--text);font-weight:600}

/* ── Divider ── */
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}

/* ── Pipeline ── */
.pipeline-label{font-size:.66rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.09em;margin-bottom:14px}
.step-list{list-style:none;display:flex;flex-direction:column;gap:12px}
.step-item{display:flex;align-items:flex-start;gap:12px}
.step-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;flex-shrink:0;margin-top:1px}
.step-done{background:rgba(34,197,94,.2);color:#22c55e}
.step-active{background:rgba(59,130,246,.2);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
.step-wait{background:rgba(100,116,139,.1);color:var(--muted2)}
.step-text{font-size:.88rem;font-weight:600;color:var(--text)}
.step-sub{font-size:.76rem;color:var(--muted);margin-top:2px;line-height:1.5}

/* ── Payment section ── */
.payment-card{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);border-radius:14px;padding:18px 20px}
.payment-title{font-size:.84rem;font-weight:700;color:#22c55e;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.pay-unpaid-card{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:14px;padding:18px 20px}
.pay-unpaid-title{font-size:.84rem;font-weight:700;color:#f59e0b;margin-bottom:8px;display:flex;align-items:center;gap:7px}

/* ── Lease actions ── */
.lease-section{margin-top:18px}
.btn-sign{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;background:linear-gradient(135deg,var(--green-dark),var(--green));color:#fff;border:none;border-radius:10px;font-size:.86rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;transition:opacity .15s;box-shadow:0 4px 14px rgba(34,197,94,.3)}
.btn-sign:hover{opacity:.88}
.btn-download{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:#fff;border:none;border-radius:10px;font-size:.86rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;transition:opacity .15s}
.btn-download:hover{opacity:.88}

/* ── Move-in card ── */
.movein-card{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.18);border-radius:14px;padding:18px 20px}
.movein-title{font-size:.92rem;font-weight:700;color:#22c55e;margin-bottom:12px}

/* ── Denied card ── */
.denied-card{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.18);border-radius:14px;padding:20px 22px;margin-top:16px}
.denied-title{font-size:.92rem;font-weight:700;color:#ef4444;margin-bottom:10px}

/* ── Waitlisted card ── */
.waitlist-card{background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.18);border-radius:14px;padding:20px 22px;margin-top:16px}
.waitlist-title{font-size:.92rem;font-weight:700;color:#a855f7;margin-bottom:10px}

/* ── Withdraw ── */
.btn-withdraw{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;border-radius:9px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:16px}
.btn-withdraw:hover{background:rgba(239,68,68,.18)}

/* ── Doc upload ── */
.doc-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 0;border-bottom:1px solid var(--border)}
.doc-row:last-child{border-bottom:none}
.doc-label{color:var(--text);font-size:.83rem;min-width:180px;font-weight:500}
.btn-choose{padding:7px 16px;background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.25);color:#60a5fa;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit}
.btn-choose:hover{background:rgba(96,165,250,.2)}
.doc-status{font-size:.78rem;color:var(--muted)}

/* ── Footer ── */
.portal-footer{text-align:center;margin-top:32px;font-size:.76rem;color:var(--muted2);line-height:2}
.portal-footer a{color:var(--blue);text-decoration:none}
.portal-footer a:hover{text-decoration:underline}
</style>

<script nonce="VZEkWatH2Jtta2vFy8dRhA">
'use strict';

async function waitForSB(ms){
  const end=Date.now()+ms;
  while(Date.now()<end){
    if(window.supabase&&typeof CONFIG!=='undefined'&&CONFIG.SUPABASE_URL)return true;
    await new Promise(r=>setTimeout(r,80));
  }
  return false;
}

let _sb=null;
function getSB(){
  if(!_sb)_sb=window.supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY,{
    auth:{
      persistSession:true,
      autoRefreshToken:true,
      detectSessionInUrl:true,
      // PKCE flow returns a refresh token so sessions survive past the 1-hour
      // JWT expiry — autoRefreshToken silently re-issues new access tokens.
      // Implicit flow does NOT return a refresh token, which caused users to
      // be unexpectedly signed out after an hour. Magic links sent through
      // our own Edge Function include a token_hash that works in any browser.
      flowType:'pkce'
    }
  });
  return _sb;
}

function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
function fmtDate(d){if(!d)return '—';try{return new Date(d).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}catch{return d;}}
function fmtDateShort(d){if(!d)return '—';try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return d;}}
function fmtMoney(v){if(v==null)return '—';return '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

async function signOut(){
  try { await getSB().auth.signOut(); } catch(_) {}
  sessionStorage.removeItem('pendingPortalAppId');
  location.href = '/tenant/login.html';
}

async function lookupByAppId(){
  const input=document.getElementById('manual-app-id');
  const msg=document.getElementById('appid-msg');
  if(!input||!msg)return;
  const appId=(input.value||'').trim().toUpperCase();
  if(!appId){msg.textContent='Please enter your Application ID.';msg.style.color='#f59e0b';msg.style.display='block';return;}
  msg.textContent='Looking up…';msg.style.color='var(--muted)';msg.style.display='block';
  try{
    const sb=getSB();
    const {data:{session}}=await sb.auth.getSession();
    const userEmail=(session?.user?.email||'').toLowerCase();
    // Attempt to claim the app with this user's email
    const {data:claimResult,error:claimErr}=await sb.rpc('claim_application',{p_app_id:appId,p_email:userEmail});
    if(claimErr||claimResult?.success===false){
      msg.textContent='That Application ID was not found or does not match your email address. Please contact us for help.';
      msg.style.color='#f87171';msg.style.display='block';
      return;
    }
    // Claimed successfully — reload the portal with this app
    sessionStorage.setItem('pendingPortalAppId',appId);
    location.href='/tenant/portal.html?app_id='+encodeURIComponent(appId);
  }catch(e){
    msg.textContent='Error: '+(e.message||'Could not look up application.');
    msg.style.color='#f87171';msg.style.display='block';
  }
}

// ── Payment status rendering ─────────────────────────────────────────────────
function renderPaymentStatus(app){
  const status=app.payment_status||'unpaid';
  const fee=app.application_fee;
  const paid=status==='paid';
  const waived=status==='waived';
  const refunded=status==='refunded';

  if(paid||waived){
    const lines=[];
    if(fee!=null)lines.push(`<div class="meta-item"><span class="meta-label">Application Fee</span><span class="meta-val">${fmtMoney(fee)}</span></div>`);
    lines.push(`<div class="meta-item"><span class="meta-label">Payment Status</span><span class="meta-val" style="color:#22c55e">&#10003; ${paid?'Paid':waived?'Waived':''}</span></div>`);
    if(app.payment_date)lines.push(`<div class="meta-item"><span class="meta-label">Received</span><span class="meta-val">${fmtDateShort(app.payment_date)}</span></div>`);
    if(app.payment_amount_recorded)lines.push(`<div class="meta-item"><span class="meta-label">Amount</span><span class="meta-val">${fmtMoney(app.payment_amount_recorded)}</span></div>`);
    if(app.payment_method_recorded)lines.push(`<div class="meta-item"><span class="meta-label">Method</span><span class="meta-val">${esc(app.payment_method_recorded)}</span></div>`);
    return `<div class="section"><div class="section-label">Payment</div>
      <div class="payment-card"><div class="payment-title"><span style="font-size:1.1rem">&#10003;</span> Fee Confirmed</div>
      <div class="meta-grid">${lines.join('')}</div></div></div>`;
  }

  if(refunded){
    return `<div class="section"><div class="section-label">Payment</div>
      <div class="pay-unpaid-card"><div class="pay-unpaid-title">&#8592; Fee Refunded</div>
      <p style="color:var(--muted);font-size:.83rem">Your application fee has been refunded. Please contact us with any questions.</p></div></div>`;
  }

  if(status==='unpaid'&&fee){
    return `<div class="section"><div class="section-label">Payment</div>
      <div class="pay-unpaid-card">
        <div class="pay-unpaid-title">&#128176; Application Fee Due — ${fmtMoney(fee)}</div>
        <p style="color:var(--muted);font-size:.83rem;margin-bottom:14px">Your application fee is pending. Our team will reach out shortly to arrange payment — no action needed from you right now.</p>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="font-size:.76rem;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px">Accepted payment methods</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <span style="padding:5px 12px;border-radius:8px;background:rgba(59,130,246,.12);color:#60a5fa;font-size:.76rem;font-weight:600">Venmo</span>
            <span style="padding:5px 12px;border-radius:8px;background:rgba(59,130,246,.12);color:#60a5fa;font-size:.76rem;font-weight:600">Zelle</span>
            <span style="padding:5px 12px;border-radius:8px;background:rgba(59,130,246,.12);color:#60a5fa;font-size:.76rem;font-weight:600">Cash App</span>
            <span style="padding:5px 12px;border-radius:8px;background:rgba(59,130,246,.12);color:#60a5fa;font-size:.76rem;font-weight:600">Money Order</span>
          </div>
          <p style="color:var(--muted2);font-size:.76rem;margin-top:6px">Have questions or want to arrange payment now? <a href="tel:7077063137" style="color:var(--blue);font-weight:600">Call or text 707-706-3137</a></p>
        </div>
      </div></div>`;
  }

  // Holding fee flow (extended payment columns)
  if(app.holding_fee_requested){
    const hfPaid=app.holding_fee_paid;
    const hfAmt=app.holding_fee_amount;
    const hfDue=app.holding_fee_due_date;
    if(hfPaid){
      return `<div class="section"><div class="section-label">Payment</div>
        <div class="payment-card"><div class="payment-title"><span>&#10003;</span> Holding Fee Received</div>
        <div class="meta-grid">
          ${hfAmt?`<div class="meta-item"><span class="meta-label">Amount</span><span class="meta-val">${fmtMoney(hfAmt)}</span></div>`:''}
          ${app.holding_fee_paid_at?`<div class="meta-item"><span class="meta-label">Received</span><span class="meta-val">${fmtDateShort(app.holding_fee_paid_at)}</span></div>`:''}
        </div></div></div>`;
    }
    return `<div class="section"><div class="section-label">Payment</div>
      <div class="pay-unpaid-card"><div class="pay-unpaid-title">&#128176; Holding Fee Requested${hfAmt?' — '+fmtMoney(hfAmt):''}</div>
      <p style="color:var(--muted);font-size:.83rem;margin-bottom:12px">
        A holding fee has been requested to secure your place.${hfDue?' Please pay by <strong style="color:var(--text)">'+fmtDate(hfDue)+'</strong>.':''}
      </p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
        <span style="padding:5px 12px;border-radius:8px;background:rgba(59,130,246,.12);color:#60a5fa;font-size:.76rem;font-weight:600">Venmo</span>
        <span style="padding:5px 12px;border-radius:8px;background:rgba(59,130,246,.12);color:#60a5fa;font-size:.76rem;font-weight:600">Zelle</span>
        <span style="padding:5px 12px;border-radius:8px;background:rgba(59,130,246,.12);color:#60a5fa;font-size:.76rem;font-weight:600">Cashier's Check</span>
      </div>
      <p style="color:var(--muted2);font-size:.76rem">After payment, please call or text us to confirm: <a href="tel:7077063137" style="color:var(--blue);font-weight:600">707-706-3137</a></p></div></div>`;
  }

  return '';
}

// ── Document upload ──────────────────────────────────────────────────────────
function renderDocUpload(app){
  if(['denied','withdrawn'].includes(app.status))return '';
  function docRow(label,type){
    return `<div class="doc-row">
      <span class="doc-label">${label}</span>
      <input type="file" id="fi-${type}" accept=".pdf,.jpg,.jpeg,.png,.webp" style="display:none" data-doc-type="${type}" data-app-id="${esc(app.app_id)}" data-status-id="ds-${type}">
      <button class="btn-choose" type="button" data-action="choose-file" data-target="fi-${type}">Choose File</button>
      <span class="doc-status" id="ds-${type}"></span>
    </div>`;
  }
  return `<div class="section"><div class="section-label">Upload Documents</div>
    <div class="card">
      <p style="color:var(--muted);font-size:.82rem;margin-bottom:14px">Upload required documents: government ID, pay stubs, bank statements. PDF, JPG, or PNG accepted.</p>
      ${docRow('Government ID','government_id')}
      ${docRow('Pay Stub (last 2 months)','pay_stub')}
      ${docRow('Bank Statement','bank_statement')}
      ${docRow('Other Document','other')}
    </div></div>`;
}

async function uploadDoc(docType,appId,inputId,statusId){
  const input=document.getElementById(inputId);
  const status=document.getElementById(statusId);
  const file=input.files[0];
  if(!file)return;
  status.textContent='Uploading…';status.style.color='#60a5fa';
  try{
    const {data:{session}}=await getSB().auth.getSession();
    const token=session?.access_token;
    if(!token){status.textContent='Not signed in.';status.style.color='#ef4444';return;}
    const res=await fetch(CONFIG.SUPABASE_URL+'/functions/v1/request-upload-url',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':CONFIG.SUPABASE_ANON_KEY,'Authorization':'Bearer '+token},
      body:JSON.stringify({app_id:appId,file_name:file.name,file_type:file.type,doc_type:docType}),
    });
    const d=await res.json();
    if(!res.ok||!d.signed_url){status.textContent='Error: '+(d.error||'Upload failed');status.style.color='#ef4444';return;}
    const up=await fetch(d.signed_url,{method:'PUT',headers:{'Content-Type':file.type,'x-upsert':'true'},body:file});
    if(!up.ok){status.textContent='Upload failed. Try again.';status.style.color='#ef4444';return;}
    status.textContent='&#10003; '+file.name;status.style.color='#22c55e';input.value='';
  }catch(e){status.textContent='Error: '+e.message;status.style.color='#ef4444';}
}

// ── Portal render ─────────────────────────────────────────────────────────────
function renderPortal(app){
  const name=esc(((app.first_name||'')+' '+(app.last_name||'')).trim())||'Applicant';
  const prop=esc(app.property_address||'Your Property');
  const status=app.status||'pending';
  const leaseStatus=app.lease_status||'none';
  const miStatus=app.move_in_status||null;

  const statusBadge=(s)=>{
    const m={pending:'b-pending',approved:'b-approved',denied:'b-denied',waitlisted:'b-waitlisted',withdrawn:'b-withdrawn'};
    const l={pending:'Pending Review',approved:'Approved',denied:'Denied',waitlisted:'Waitlisted',withdrawn:'Withdrawn'};
    return `<span class="badge ${m[s]||'b-none'}">${l[s]||s}</span>`;
  };
  const leaseBadge=(s)=>{
    if(!s||s==='none')return `<span class="badge b-none">No Lease</span>`;

async function downloadLease(){
  try{
    const {data:sd}=await getSB().auth.getSession();
    const token=sd?.session?.access_token;
    if(!token){alert('Please sign in again.');return;}
    const res=await fetch(CONFIG.SUPABASE_URL+'/functions/v1/download-lease',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':CONFIG.SUPABASE_ANON_KEY,'Authorization':'Bearer '+token},
      body:JSON.stringify({app_id:window._portalAppId}),
    });
    const d=await res.json();
    const signedUrl=d.signed_url||d.signedUrl;
    if(signedUrl)window.open(signedUrl,'_blank');
    else alert(d.error||'Could not get download link.');
  }catch(e){alert(e.message);}
}

async function withdrawApplication(){
  if(!confirm('Are you sure you want to withdraw your application?\n\nThis cannot be undone.'))return;
  const sb=getSB();
  const {data:{session}}=await sb.auth.getSession();
  const userEmail=(session?.user?.email||'').toLowerCase();
  // Ensure application is claimed to this user before attempting the RLS-guarded update
  if(window._portalAppId&&userEmail){
    await sb.rpc('claim_application',{p_app_id:window._portalAppId,p_email:userEmail}).catch(()=>{});
  }
  const {error}=await sb.from('applications').update({status:'withdrawn',updated_at:new Date().toISOString()}).eq('app_id',window._portalAppId);
  if(error){
    const ct=document.getElementById('portal-content');
    if(ct)ct.innerHTML=`<div class="error-card">We couldn't process your withdrawal automatically. Please contact us directly:<br><br>
      <a href="tel:7077063137" style="color:#60a5fa;font-weight:700">&#128222; 707-706-3137</a> &nbsp;&middot;&nbsp;
      <a href="mailto:support@choiceproperties.com" style="color:#60a5fa">support@choiceproperties.com</a><br><br>
      Reference: <span style="font-family:monospace">${esc(window._portalAppId||'')}</span></div>`;
    return;
  }
  try{
    await sb.from('admin_actions').insert({action:'tenant_withdraw',target_type:'application',target_id:window._portalAppId,metadata:{app_id:window._portalAppId,actor:session?.user?.email||'tenant'}});
  }catch(_){}
  try{
    if(session?.access_token){
      fetch(CONFIG.SUPABASE_URL+'/functions/v1/send-email',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':CONFIG.SUPABASE_ANON_KEY,'Authorization':'Bearer '+session.access_token},
        body:JSON.stringify({type:'custom',to:'support@choiceproperties.com',subject:'Application Withdrawn — '+window._portalAppId,html:`<p>Application <strong>${window._portalAppId}</strong> has been withdrawn by the tenant (${esc(session.user?.email||'')}).</p>`}),
      }).catch(()=>{});
    }
  }catch(_){}
  document.getElementById('portal-content').innerHTML=`<div class="card" style="text-align:center;padding:36px">
    <div style="font-size:2.2rem;margin-bottom:14px">&#10003;</div>
    <h3 style="color:var(--text);margin-bottom:8px">Application Withdrawn</h3>
    <p style="color:var(--muted);font-size:.88rem;line-height:1.65">Your application has been withdrawn. If you'd like to reapply in the future, please contact us at <a href="tel:7077063137" style="color:var(--blue)">707-706-3137</a>.</p>
  </div>`;
}

// ── Auto-claim applications linked by email ──────────────────────────────────
async function autoClaimApplications(sb, userEmail){
  try{
    // get_apps_by_email returns apps found by email so we can claim them
    const {data:lookupResult,error}=await sb.rpc('get_apps_by_email',{p_email:userEmail});
    if(error||!lookupResult)return;
    const apps=typeof lookupResult==='string'?JSON.parse(lookupResult):lookupResult;
    if(!Array.isArray(apps)||!apps.length)return;
    // Claim each app — links applicant_user_id to this auth user
    for(const a of apps){
      if(a.app_id){
        await sb.rpc('claim_application',{p_app_id:a.app_id,p_email:userEmail}).catch(()=>{});
      }
    }
  }catch(_){}
}

function getRequestedAppId(){
  const params=new URLSearchParams(window.location.search);
  const appId=(params.get('app_id')||sessionStorage.getItem('pendingPortalAppId')||'').trim();
  if(appId)sessionStorage.setItem('pendingPortalAppId',appId);
  return appId;
}

async function signOutAndRetry(){

}

// ── Magic link session resolver ───────────────────────────────────────────────
// Magic links land here in THREE possible forms; the client must handle all
// three explicitly because supabase-js with flowType:'pkce' will ONLY
// auto-process `?code=` and ignores hash-fragment tokens.
//
//   1. Hash tokens   #access_token=...&refresh_token=...   (admin.generateLink — our send-magic-link)
//   2. token_hash    ?token_hash=...&type=magiclink         (alt admin format / manual links)
//   3. PKCE code     ?code=...                              (signInWithOtp fallback in login.html)
//
// The session must be established BEFORE we read getSession(), otherwise the
// portal sees no session and bounces the user back to the login page.
async function waitForMagicLinkSession(sb){
  const hashStr = (window.location.hash || '').replace(/^#/, '');
  const hashParams = new URLSearchParams(hashStr);
  const qsParams   = new URLSearchParams(window.location.search || '');

  const accessToken  = hashParams.get('access_token');
  const refreshToken = hashParams.get('refresh_token');
  const tokenHash    = qsParams.get('token_hash');
  const tokenType    = qsParams.get('type');
  const codeParam    = qsParams.get('code');
  const errParam     = hashParams.get('error') || qsParams.get('error');

  // Surface Supabase error redirects (expired link, etc.) instead of silently
  // bouncing to login with no explanation.
  if(errParam){
    const desc = hashParams.get('error_description') || qsParams.get('error_description') || errParam;
    console.warn('Magic link error:', desc);
    return {error: decodeURIComponent(desc.replace(/\+/g,' '))};
  }

  // CASE 1: Hash-fragment tokens from admin.generateLink (our Edge Function).
  // PKCE-mode supabase-js does NOT auto-process these; set them manually.
  if(accessToken && refreshToken){
    try{
      const {data, error} = await sb.auth.setSession({access_token: accessToken, refresh_token: refreshToken});
      if(!error && data && data.session) return data.session;
      if(error) console.warn('setSession from hash failed:', error.message);
    }catch(e){ console.warn('setSession threw:', e); }
  }

  // CASE 2: token_hash style (alt admin link format).
  if(tokenHash && tokenType){
    try{
      const {data, error} = await sb.auth.verifyOtp({token_hash: tokenHash, type: tokenType});
      if(!error && data && data.session) return data.session;
      if(error) console.warn('verifyOtp failed:', error.message);
    }catch(e){ console.warn('verifyOtp threw:', e); }
  }

  // CASE 3: PKCE ?code= from signInWithOtp fallback. supabase-js
  // detectSessionInUrl handles this asynchronously on init — wait for it.
  if(codeParam){
    // Maybe already exchanged before our listener attaches:
    try{
      const {data:{session:existing}} = await sb.auth.getSession();
      if(existing) return existing;
    }catch(_){}

    return new Promise(resolve => {
      let sub=null;
      const t=setTimeout(()=>{ try{sub&&sub.unsubscribe();}catch(_){} resolve(null); }, 15000);
      const {data} = sb.auth.onAuthStateChange((event, session) => {
        if((event==='SIGNED_IN'||event==='TOKEN_REFRESHED'||event==='INITIAL_SESSION') && session){
          clearTimeout(t);
          try{ data.subscription.unsubscribe(); }catch(_){}
          resolve(session);
        }
      });
      sub = data.subscription;
    });
  }

  return null;
}

// ── CSP-safe delegated event handlers ────────────────────────────────────────
// Cloudflare CSP forbids inline onclick/onchange. We delegate from document so
// dynamically-rendered buttons inside #portal-content all work without nonces.
document.addEventListener('click', function(e){
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;
  switch(action){
    case 'sign-out':       return signOut();
    case 'signout-retry':  return signOutAndRetry();
    case 'withdraw':       return withdrawApplication();
    case 'download-lease': return downloadLease();
    case 'lookup-app-id':  return lookupByAppId();
    case 'switch-app':     return window._switchApp && window._switchApp(btn.dataset.appId);
    case 'choose-file': {
      const target = document.getElementById(btn.dataset.target);
      if(target) target.click();
      return;
    }
  }
});
document.addEventListener('change', function(e){
  const input = e.target.closest('input[type=file][data-doc-type]');
  if(!input || !input.files || !input.files[0]) return;
  uploadDoc(input.dataset.docType, input.dataset.appId, input.id, input.dataset.statusId);
});

document.addEventListener('DOMContentLoaded',async()=>{
  const ready=await waitForSB(8000);
  if(!ready){
    document.getElementById('portal-loading').innerHTML='<div class="error-card">Page failed to load. Please refresh.</div>';
    return;
  }

  const sb=getSB();
  const requestedAppId=getRequestedAppId();

  // If a magic link token is in the hash/query, exchange it before reading
  // the session — otherwise we read an empty session and bounce to login.
  const magicResult = await waitForMagicLinkSession(sb);

  // Always strip auth params from the URL so a refresh doesn't re-replay them.
  const hadAuthInUrl = !!(window.location.hash || /[\?&](code|token_hash|error)=/.test(window.location.search));
  if(hadAuthInUrl){
    const cleanUrl = window.location.pathname + (requestedAppId ? '?app_id='+encodeURIComponent(requestedAppId) : '');
    history.replaceState(null, '', cleanUrl);
  }

  // Magic link returned an error (expired / already used / etc.) — show it
  // on the login page instead of looping silently.
  if(magicResult && magicResult.error){
    const loginUrl = new URL('/tenant/login.html', window.location.origin);
    if(requestedAppId) loginUrl.searchParams.set('app_id', requestedAppId);
    loginUrl.searchParams.set('link_error', magicResult.error);
    location.href = loginUrl.pathname + loginUrl.search;
    return;
  }

  const magicSession = (magicResult && !magicResult.error) ? magicResult : null;
  const {data:{session}} = await sb.auth.getSession();
  const activeSession = magicSession || session;

  if(!activeSession){
    const loginUrl = new URL('/tenant/login.html', window.location.origin);
    if(requestedAppId) loginUrl.searchParams.set('app_id', requestedAppId);
    location.href = loginUrl.pathname + loginUrl.search;
    return;
  }

  const userEmail=(activeSession.user.email||'').toLowerCase();
  const emailEl=document.getElementById('user-email');
  if(emailEl)emailEl.textContent=userEmail;

  const loading=document.getElementById('portal-loading');
  const content=document.getElementById('portal-content');
  const errorEl=document.getElementById('portal-error');

  // ── Step 1: Confirm this email can access the requested application ───────
  if(requestedAppId){
    const {data:claimResult,error:claimErr}=await sb.rpc('claim_application',{p_app_id:requestedAppId,p_email:userEmail});
    if(claimErr||claimResult?.success===false){
      // Auto-redirect to login with a helpful message instead of showing
      // a dead-end screen inside the portal.
      await redirectWrongAccount(requestedAppId);
      return;
    }
  }

  // ── Step 2: Fetch list of this user's applications ─────────────────────────
  const {data:rpcResult,error:rpcErr}=await sb.rpc('get_my_applications');
  let myApps=[];
  if(!rpcErr&&rpcResult?.success&&Array.isArray(rpcResult.applications)){
    myApps=rpcResult.applications;
  }

  if(!myApps.length){
    // Auto-claim any applications by email match then retry.
    await autoClaimApplications(sb,userEmail);
    const {data:r2}=await sb.rpc('get_my_applications');
    if(r2?.success&&Array.isArray(r2.applications)) myApps=r2.applications;
  }

  loading.style.display='none';
  content.style.display='block';

  if(!myApps.length){
    content.innerHTML=`<div class="no-app">
      <div style="font-size:2.4rem;margin-bottom:14px">&#128269;</div>
      <h3 style="margin-bottom:10px">No application found</h3>
      <p style="color:var(--muted);font-size:.87rem;line-height:1.7;margin-bottom:6px">
        We searched for an application linked to<br>
        <strong style="color:var(--text);font-size:.92rem">${esc(userEmail)}</strong>
      </p>
      <p style="color:var(--muted2);font-size:.82rem;line-height:1.65;margin-bottom:18px">
        Make sure you are signed in with the exact email address you used on your rental application — even a slight difference (like a period or extra letter) will prevent a match.
      </p>

      <div style="background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:16px 18px;margin-bottom:18px;text-align:left">
        <div style="font-size:.7rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Look up by Application ID</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input type="text" id="manual-app-id" placeholder="e.g. CP-20260420-ABC123" autocomplete="off" autocapitalize="characters"
            style="flex:1;min-width:160px;padding:9px 12px;border:1.5px solid var(--border2);border-radius:8px;background:var(--surface3);color:var(--text);font-size:.85rem;font-family:inherit;-webkit-appearance:none">
          <button type="button" data-action="lookup-app-id" style="padding:9px 16px;border-radius:8px;background:var(--blue);border:none;color:#fff;font-size:.83rem;font-weight:700;cursor:pointer;font-family:inherit;touch-action:manipulation;white-space:nowrap">Look Up</button>
        </div>
        <div id="appid-msg" style="margin-top:8px;font-size:.78rem;color:var(--muted);display:none"></div>
      </div>

      <button type="button" data-action="sign-out" style="width:100%;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#60a5fa;padding:11px 18px;border-radius:9px;cursor:pointer;font-family:inherit;font-size:.86rem;font-weight:600;touch-action:manipulation;min-height:44px">&#8592; Sign in with a different email</button>

      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);text-align:left">
        <p style="font-size:.79rem;color:var(--muted2);margin-bottom:6px"><strong style="color:var(--muted)">Co-applicant?</strong> Sign in with the email address listed for you on the application, not the primary applicant's email.</p>
        <p style="font-size:.79rem;color:var(--muted2)">Still need help? <a href="tel:7077063137" style="color:var(--blue);font-weight:600">Call or text 707-706-3137</a> &middot; <a href="mailto:support@choiceproperties.com" style="color:var(--blue)">Email us</a></p>
      </div>
    </div>`;
    return;
  }

  // ── Step 3: Pick the right application from the list ──────────────────────
  const summary=requestedAppId
    ? (myApps.find(a=>(a.app_id||a.id)===requestedAppId)||myApps[0])
    : myApps[0];

  if(!summary){
    content.innerHTML=renderWrongAccount(userEmail,requestedAppId,'This application is not linked to the current signed-in email.');
    return;
  }

  window._portalAppId=summary.app_id||summary.id;
  sessionStorage.setItem('pendingPortalAppId',window._portalAppId);

  // ── Step 4: Render app (with multi-app switcher if needed) ────────────────
  async function loadAndRenderApp(appId){
    window._portalAppId=appId;
    sessionStorage.setItem('pendingPortalAppId',appId);

    const {data:fullApp,error:fetchErr}=await sb.from('applications')
      .select(
        'id,app_id,created_at,updated_at,status,payment_status,payment_date,application_fee,'+
        'payment_amount_recorded,payment_method_recorded,payment_notes,'+
        'holding_fee_requested,holding_fee_amount,holding_fee_due_date,holding_fee_paid,holding_fee_paid_at,'+
        'payment_confirmed_at,payment_amount_collected,payment_method_confirmed,'+
        'first_name,last_name,email,property_address,property_id,'+
        'lease_status,lease_sent_date,lease_signed_date,lease_start_date,lease_end_date,'+
        'monthly_rent,security_deposit,move_in_costs,'+
        'move_in_status,move_in_date_actual,move_in_notes,'+
        'tenant_sign_token,has_co_applicant,admin_notes,desired_lease_term'
      )
      .eq('app_id',appId)
      .maybeSingle();

    if(fetchErr||!fullApp){
      errorEl.style.display='block';
      errorEl.innerHTML='<div class="error-card">Could not load application details. Please refresh or <a href="tel:7077063137" style="color:#60a5fa">call us</a>.</div>';
      if(fetchErr)console.error('Portal fetch error:',fetchErr.message);
      return;
    }

    // Build multi-app switcher if user has more than one application
    let switcherHtml='';
    if(myApps.length>1){
      const statusColor={pending:'#f59e0b',approved:'#22c55e',denied:'#ef4444',waitlisted:'#a855f7',withdrawn:'#64748b'};
      const pills=myApps.map(a=>{
        const aId=a.app_id||a.id;
        const isActive=aId===appId;
        const col=statusColor[a.status]||'#64748b';
        const addr=esc((a.property_address||'Application').split(',')[0]);
        return `<button type="button" data-action="switch-app" data-app-id="${esc(aId)}"
          style="padding:7px 14px;border-radius:20px;border:2px solid ${isActive?col:'rgba(255,255,255,.12)'};
          background:${isActive?'rgba(59,130,246,.15)':'transparent'};color:${isActive?'#f1f5f9':'#94a3b8'};
          font-size:.75rem;font-weight:${isActive?'700':'500'};cursor:pointer;font-family:inherit;
          white-space:nowrap;transition:all .15s">
          <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${col};margin-right:5px;vertical-align:middle"></span>
          ${addr}
        </button>`;
      }).join('');
      switcherHtml=`<div class="section"><div class="section-label">Your Applications (${myApps.length})</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${pills}</div></div>`;
    }

    content.innerHTML=switcherHtml+renderPortal(fullApp);
  }

  // Global switch function for pill buttons
  window._switchApp=async function(appId){
    content.innerHTML='<div class="loading-state"><div class="spin"></div><div class="loading-text">Loading…</div></div>';
    await loadAndRenderApp(appId);
  };

  await loadAndRenderApp(window._portalAppId);
});
</script>
</body>
</html>
