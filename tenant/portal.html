<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#006aff">
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>My Portal &mdash; Choice Properties</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <script defer src="/config.js"></script>
  <script defer src="/js/supabase.min.js"></script>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%;font-family:'Inter',sans-serif;background:#0f172a;color:#e2e8f0}
  .topbar{background:rgba(15,23,42,.95);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.08);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .topbar-logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;flex-shrink:0}
  .topbar-title{font-size:.95rem;font-weight:700;color:#f1f5f9}
  .topbar-sub{font-size:.7rem;color:#94a3b8}
  .topbar-right{display:flex;align-items:center;gap:12px}
  .user-email{font-size:.76rem;color:#94a3b8;display:none}
  @media(min-width:600px){.user-email{display:block}}
  .btn-signout{padding:6px 13px;border-radius:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#94a3b8;font-size:.75rem;cursor:pointer;font-family:inherit;transition:all .15s}
  .btn-signout:hover{background:rgba(255,255,255,.13);color:#e2e8f0}
  .main{max-width:720px;margin:0 auto;padding:28px 16px 60px}
  .loading-state{text-align:center;padding:80px 20px;color:#64748b}
  .loading-state .spin{display:inline-block;width:32px;height:32px;border:3px solid rgba(255,255,255,.1);border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-state{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:12px;padding:24px;text-align:center;color:#fca5a5;margin-bottom:20px}
  .section{margin-bottom:28px}
  .section-label{font-size:.68rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
  .card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:20px 22px}
  .status-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px}
  .status-name{font-size:1.15rem;font-weight:800;color:#f1f5f9}
  .status-prop{font-size:.8rem;color:#94a3b8;margin-top:2px}
  .badge{padding:4px 11px;border-radius:12px;font-size:.69rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .badge-pending{background:rgba(234,179,8,.15);color:#fbbf24}
  .badge-approved{background:rgba(34,197,94,.15);color:#4ade80}
  .badge-denied{background:rgba(239,68,68,.15);color:#f87171}
  .badge-waitlisted{background:rgba(168,85,247,.15);color:#c084fc}
  .badge-none{background:rgba(100,116,139,.15);color:#94a3b8}
  .badge-sent{background:rgba(59,130,246,.15);color:#60a5fa}
  .badge-signed{background:rgba(34,197,94,.15);color:#4ade80}
  .meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:16px 0}
  .meta-item{display:flex;flex-direction:column;gap:3px}
  .meta-label{font-size:.63rem;color:#64748b;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .meta-val{font-size:.88rem;color:#e2e8f0;font-weight:600}
  .divider{border:none;border-top:1px solid rgba(255,255,255,.08);margin:16px 0}
  .step-list{list-style:none;display:flex;flex-direction:column;gap:10px}
  .step-item{display:flex;align-items:flex-start;gap:12px;font-size:.85rem}
  .step-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;margin-top:1px}
  .step-done{background:rgba(34,197,94,.2);color:#4ade80}
  .step-active{background:rgba(59,130,246,.2);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
  .step-wait{background:rgba(100,116,139,.15);color:#64748b}
  .step-text{color:#e2e8f0;font-weight:500}
  .step-sub{font-size:.76rem;color:#64748b;margin-top:2px}
  .lease-section{margin-top:16px}
  .btn-download{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:8px;font-size:.83rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;transition:opacity .15s}
  .btn-download:hover{opacity:.85}
  .btn-sign{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:8px;font-size:.83rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;transition:opacity .15s}
  .btn-sign:hover{opacity:.85}
  .movein-card{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:16px 18px}
  .movein-title{font-size:.95rem;font-weight:700;color:#4ade80;margin-bottom:12px}
  .no-app{text-align:center;padding:40px 20px;color:#64748b}
  .no-app h3{color:#94a3b8;margin-bottom:8px;font-size:1rem}
  .btn-withdraw{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:14px}
  .btn-withdraw:hover{background:rgba(239,68,68,.18)}
  .denied-card{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:18px 20px;margin-top:20px}
  .denied-card-title{font-size:.92rem;font-weight:700;color:#f87171;margin-bottom:10px}
  </style>
  </head>
  <body>
  <div class="topbar">
    <div class="topbar-logo">
      <div class="logo-icon">CP</div>
      <div>
        <div class="topbar-title">Choice Properties</div>
        <div class="topbar-sub">Tenant Portal</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="user-email" id="user-email"></span>
      <button class="btn-signout" onclick="signOut()">Sign Out</button>
    </div>
  </div>

  <div class="main">
    <div id="portal-loading" class="loading-state">
      <div class="spin"></div>
      <div>Loading your portal&hellip;</div>
    </div>
    <div id="portal-content" style="display:none"></div>
  </div>

  <script>
  async function waitForSB(attempts) {
    for (let i = 0; i < (attempts || 80); i++) {
      if (window.supabase && typeof CONFIG !== 'undefined' && CONFIG.SUPABASE_URL) return true;
      await new Promise(r => setTimeout(r, 100));
    }
    return false;
  }

  let _sb = null;
  function getSB() {
    if (!_sb) _sb = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });
    return _sb;
  }

  function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
  function fmtDate(d){if(!d)return '&mdash;';try{return new Date(d).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}catch{return d;}}
  function fmtMoney(v){if(v==null)return '&mdash;';return '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

  async function signOut() {
    await getSB().auth.signOut();
    window.location.href = '/tenant/login.html';
  }

  // ── Phase 7: Financial status section ──────────────────────────────────────
  function renderFinancialStatus(app) {
    const hfRequested = app.holding_fee_requested;
    const hfPaid      = app.holding_fee_paid;
    const hfAmount    = app.holding_fee_amount;
    const hfDue       = app.holding_fee_due_date;
    const hfPaidAt    = app.holding_fee_paid_at;
    const pmtConfirmed = app.payment_confirmed_at;
    const pmtAmount    = app.payment_amount_collected;
    const pmtMethod    = app.payment_method_confirmed;

    if (!hfRequested && !pmtConfirmed) return '';

    const rows = [];
    if (hfRequested) {
      rows.push(`<div class="meta-item"><span class="meta-label">Holding Fee</span><span class="meta-val">${hfAmount != null ? fmtMoney(hfAmount) : '&mdash;'}</span></div>`);
      rows.push(`<div class="meta-item"><span class="meta-label">Holding Fee Status</span><span class="meta-val">${hfPaid ? '<span style="color:#16a34a;font-weight:600">&#10003; Received' + (hfPaidAt ? ' ' + fmtDate(hfPaidAt) : '') + '</span>' : (hfDue ? 'Due ' + fmtDate(hfDue) : 'Pending')}</span></div>`);
    }
    if (pmtConfirmed) {
      rows.push(`<div class="meta-item"><span class="meta-label">Payment Confirmed</span><span class="meta-val" style="color:#16a34a;font-weight:600">&#10003; ${fmtDate(pmtConfirmed)}</span></div>`);
      if (pmtAmount != null) rows.push(`<div class="meta-item"><span class="meta-label">Amount</span><span class="meta-val">${fmtMoney(pmtAmount)}</span></div>`);
      if (pmtMethod) rows.push(`<div class="meta-item"><span class="meta-label">Method</span><span class="meta-val">${esc(pmtMethod)}</span></div>`);
    }

    return `<div class="section">
      <div class="section-label">Financial Status</div>
      <div class="card"><div class="meta-grid">${rows.join('')}</div></div>
    </div>`;
  }

  // ── Phase 8: Document upload section ────────────────────────────────────────
  function renderDocUpload(app) {
    if (!['approved', 'co_signed', 'signed', 'move_in_scheduled'].includes(app.status) && app.status !== 'approved') return '';
    return `<div class="section">
      <div class="section-label">Documents</div>
      <div class="card">
        <p style="color:#94a3b8;font-size:.82rem;margin-bottom:16px">Upload supporting documents required by your landlord (government ID, pay stubs, bank statements). Accepted formats: PDF, JPG, PNG.</p>
        <div style="display:flex;flex-direction:column;gap:12px">
          ${renderDocRow('Government ID', 'government_id', app.app_id)}
          ${renderDocRow('Pay Stub (last 2 months)', 'pay_stub', app.app_id)}
          ${renderDocRow('Bank Statement', 'bank_statement', app.app_id)}
          ${renderDocRow('Other Document', 'other', app.app_id)}
        </div>
      </div>
    </div>`;
  }

  function renderDocRow(label, docType, appId) {
    const inputId = 'doc-input-' + docType;
    const statusId = 'doc-status-' + docType;
    return `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span style="color:#f1f5f9;font-size:.82rem;min-width:180px">${label}</span>
      <input type="file" id="${inputId}" accept=".pdf,.jpg,.jpeg,.png,.webp" style="display:none" onchange="uploadDoc('${docType}','${appId}','${inputId}','${statusId}')">
      <button onclick="document.getElementById('${inputId}').click()" style="padding:6px 14px;background:rgba(96,165,250,.15);border:1px solid rgba(96,165,250,.3);color:#60a5fa;border-radius:7px;font-size:.78rem;font-weight:600;cursor:pointer">Choose File</button>
      <span id="${statusId}" style="font-size:.78rem;color:#94a3b8"></span>
    </div>`;
  }

  async function uploadDoc(docType, appId, inputId, statusId) {
    const input  = document.getElementById(inputId);
    const status = document.getElementById(statusId);
    const file   = input.files[0];
    if (!file) return;
    status.textContent = 'Uploading…';
    status.style.color = '#60a5fa';
    try {
      const { data: { session } } = await getSB().auth.getSession();
      const token = session?.access_token;
      if (!token) { status.textContent = 'Not signed in.'; status.style.color = '#f87171'; return; }
      const res = await fetch(CONFIG.SUPABASE_URL + '/functions/v1/request-upload-url', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': CONFIG.SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ app_id: appId, file_name: file.name, file_type: file.type, doc_type: docType }),
      });
      const d = await res.json();
      if (!res.ok || !d.signed_url) { status.textContent = 'Error: ' + (d.error || 'Could not get upload URL'); status.style.color = '#f87171'; return; }
      const uploadRes = await fetch(d.signed_url, {
        method: 'PUT',
        headers: { 'Content-Type': file.type, 'x-upsert': 'true' },
        body: file,
      });
      if (!uploadRes.ok) { status.textContent = 'Upload failed. Please try again.'; status.style.color = '#f87171'; return; }
      status.textContent = '✓ Uploaded: ' + file.name;
      status.style.color = '#4ade80';
      input.value = '';
    } catch(e) { status.textContent = 'Error: ' + e.message; status.style.color = '#f87171'; }
  }

  function renderPortal(app) {
    const name = esc((app.first_name||'') + ' ' + (app.last_name||'')).trim() || 'Applicant';
    const prop = esc(app.property_address || app.property_id || 'Property');
    const status = app.status || 'pending';
    const leaseStatus = app.lease_status || 'none';
    const miStatus = app.move_in_status || 'pending';

    const statusBadge = (s) => {
      const map = {pending:'badge-pending',approved:'badge-approved',denied:'badge-denied',waitlisted:'badge-waitlisted'};
      const labels = {pending:'Pending Review',approved:'Approved',denied:'Denied',waitlisted:'Waitlisted'};
      return `<span class="badge ${map[s]||'badge-none'}">${labels[s]||s}</span>`;
    };

    const leaseBadge = (s) => {
      const map = {none:'badge-none',sent:'badge-sent',signed:'badge-signed'};
      const labels = {none:'No Lease Yet',sent:'Lease Sent',signed:'Lease Signed'};
      return `<span class="badge ${map[s]||'badge-none'}">${labels[s]||s}</span>`;
    };

    // Determine pipeline steps
    const steps = [
      {
        done: true,
        active: false,
        label: 'Application Submitted',
        sub: 'Received ' + fmtDate(app.created_at),
      },
      {
        done: ['approved','denied'].includes(status),
        active: status === 'pending',
        label: status === 'approved' ? 'Application Approved' : status === 'denied' ? 'Application Denied' : status === 'waitlisted' ? 'Waitlisted' : 'Under Review',
        sub: status === 'approved' ? 'Congratulations! You have been approved.' : status === 'denied' ? 'Unfortunately your application was not approved.' : status === 'waitlisted' ? 'You are on our waitlist.' : 'We are reviewing your application.',
      },
      {
        done: ['signed'].includes(leaseStatus),
        active: leaseStatus === 'sent',
        label: leaseStatus === 'signed' ? 'Lease Signed' : leaseStatus === 'sent' ? 'Lease Ready to Sign' : 'Lease Agreement',
        sub: leaseStatus === 'signed' ? 'Signed on ' + fmtDate(app.lease_signed_date) : leaseStatus === 'sent' ? 'Your lease has been sent for your signature.' : 'Will be prepared after approval.',
      },
      {
        done: miStatus === 'confirmed' || miStatus === 'completed',
        active: miStatus === 'scheduled',
        label: miStatus === 'confirmed' ? 'Move-In Confirmed' : miStatus === 'scheduled' ? 'Move-In Scheduled' : 'Move-In',
        sub: app.move_in_date_actual ? 'Date: ' + fmtDate(app.move_in_date_actual) : app.lease_start_date ? 'Lease starts ' + fmtDate(app.lease_start_date) : 'To be scheduled.',
      },
    ];

    const stepsHtml = steps.map(s => {
      const cls = s.done ? 'step-done' : s.active ? 'step-active' : 'step-wait';
      const icon = s.done ? '&#10003;' : s.active ? '&bull;' : '&ndash;';
      return `<li class="step-item">
        <span class="step-icon ${cls}">${icon}</span>
        <div><div class="step-text">${s.label}</div><div class="step-sub">${s.sub}</div></div>
      </li>`;
    }).join('');

    // Lease actions
    let leaseHtml = '';
    if (leaseStatus === 'sent' && app.tenant_sign_token) {
      leaseHtml = `<div class="lease-section">
        <a href="/lease-sign.html?token=${esc(app.tenant_sign_token)}" class="btn-sign">&#9998; Sign Your Lease</a>
      </div>`;
    } else if (leaseStatus === 'signed' && app.lease_pdf_url) {
      leaseHtml = `<div class="lease-section">
        <button class="btn-download" onclick="downloadLease()">&#8595; Download Signed Lease</button>
      </div>`;
    }

    // Move-in details
    let moveInHtml = '';
    if (miStatus === 'confirmed' || miStatus === 'scheduled') {
      moveInHtml = `<div class="section">
        <div class="section-label">Move-In Details</div>
        <div class="movein-card">
          <div class="movein-title">${miStatus === 'confirmed' ? '&#10003; Move-In Confirmed' : '&#128197; Move-In Scheduled'}</div>
          <div class="meta-grid">
            <div class="meta-item"><span class="meta-label">Move-In Date</span><span class="meta-val">${fmtDate(app.move_in_date_actual || app.lease_start_date)}</span></div>
            <div class="meta-item"><span class="meta-label">Property</span><span class="meta-val">${esc(app.property_address || '&mdash;')}</span></div>
            <div class="meta-item"><span class="meta-label">Monthly Rent</span><span class="meta-val">${fmtMoney(app.monthly_rent)}</span></div>
            ${app.move_in_notes ? `<div class="meta-item" style="grid-column:1/-1"><span class="meta-label">Notes from Team</span><span class="meta-val">${esc(app.move_in_notes)}</span></div>` : ''}
          </div>
        </div>
      </div>`;
    }

    // Denied card
    let deniedHtml = '';
    if (status === 'denied') {
      deniedHtml = `<div class="denied-card">
        <div class="denied-card-title">Application Not Approved</div>
        <p style="color:#fca5a5;font-size:.85rem;line-height:1.6;margin-bottom:10px">Unfortunately your application was not approved at this time. This decision was based on our standard screening criteria.</p>
        <p style="color:#94a3b8;font-size:.82rem;line-height:1.6">You are welcome to apply for other available Choice Properties listings. Applications remain on file for 60 days and may be considered for other units. Contact us to discuss your options.</p>
        <a href="/" style="display:inline-block;margin-top:12px;padding:8px 16px;background:rgba(96,165,250,.15);border:1px solid rgba(96,165,250,.3);color:#60a5fa;border-radius:7px;font-size:.8rem;font-weight:600;text-decoration:none">View Available Properties &rarr;</a>
      </div>`;
    }

    // Withdraw button — only for pending, before any lease activity
    const withdrawHtml = (status === 'pending' && leaseStatus === 'none')
      ? `<button class="btn-withdraw" onclick="withdrawApplication()">&#8592; Withdraw Application</button>`
      : '';

    return `
      <div class="section">
        <div class="section-label">Your Application</div>
        <div class="card">
          <div class="status-header">
            <div>
              <div class="status-name">${name}</div>
              <div class="status-prop">${prop}</div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">${statusBadge(status)}${leaseBadge(leaseStatus)}</div>
          </div>
          <div class="meta-grid">
            <div class="meta-item"><span class="meta-label">App ID</span><span class="meta-val" style="font-family:monospace;font-size:.8rem">${esc(app.app_id||app.id)}</span></div>
            <div class="meta-item"><span class="meta-label">Submitted</span><span class="meta-val">${fmtDate(app.created_at)}</span></div>
            ${app.lease_start_date ? `<div class="meta-item"><span class="meta-label">Lease Start</span><span class="meta-val">${fmtDate(app.lease_start_date)}</span></div>` : ''}
            ${app.lease_end_date ? `<div class="meta-item"><span class="meta-label">Lease End</span><span class="meta-val">${fmtDate(app.lease_end_date)}</span></div>` : ''}
            ${app.monthly_rent ? `<div class="meta-item"><span class="meta-label">Monthly Rent</span><span class="meta-val">${fmtMoney(app.monthly_rent)}</span></div>` : ''}
            ${app.security_deposit ? `<div class="meta-item"><span class="meta-label">Security Deposit</span><span class="meta-val">${fmtMoney(app.security_deposit)}</span></div>` : ''}
          </div>
          <hr class="divider">
          <div class="section-label" style="margin-bottom:14px">Application Status</div>
          <ul class="step-list">${stepsHtml}</ul>
          ${leaseHtml}
          ${deniedHtml}
          ${withdrawHtml}
        </div>
      </div>
      ${moveInHtml}
      ${renderFinancialStatus(app)}
      ${renderDocUpload(app)}
      <div style="text-align:center;margin-top:32px;font-size:.78rem;color:#475569">
        Questions? Contact us at <a href="mailto:choicepropertygroup@hotmail.com" style="color:#60a5fa">choicepropertygroup@hotmail.com</a> &middot; <a href="tel:7077063137" style="color:#60a5fa">707-706-3137</a>
      </div>`;
  }

  async function downloadLease() {
    try {
      const { data: session } = await getSB().auth.getSession();
      const token = session?.session?.access_token;
      if (!token) { alert('Please sign in again.'); return; }
      const res = await fetch(CONFIG.SUPABASE_URL + '/functions/v1/download-lease', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': CONFIG.SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + token,
        },
        body: JSON.stringify({ app_id: window._appId }),
      });
      const d = await res.json();
      if (d.signedUrl) { window.open(d.signedUrl, '_blank'); }
      else { alert(d.error || 'Could not retrieve lease download link.'); }
    } catch(e) { alert(e.message); }
  }

  async function withdrawApplication() {
    if (!confirm('Are you sure you want to withdraw your application?\n\nThis cannot be undone. Please contact us if you wish to reapply.')) return;
    const sb = getSB();
    const { error } = await sb.from('applications').update({
      status: 'withdrawn',
      updated_at: new Date().toISOString(),
    }).eq('app_id', window._appId);
    if (error) { alert('Error: ' + error.message + '\nPlease contact us directly.'); return; }
    document.getElementById('portal-content').innerHTML = `
      <div class="card" style="text-align:center;padding:32px">
        <div style="font-size:2rem;margin-bottom:12px">✓</div>
        <h3 style="color:#f1f5f9;margin-bottom:8px">Application Withdrawn</h3>
        <p style="color:#94a3b8;font-size:.88rem">Your application has been withdrawn. If you would like to reapply in the future, please contact us at <a href="tel:7077063137" style="color:#60a5fa">707-706-3137</a>.</p>
      </div>`;
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const ready = await waitForSB();
    if (!ready) {
      document.getElementById('portal-loading').innerHTML = '<div class="error-state">Page failed to load. Please refresh.</div>';
      return;
    }

    // Handle magic link token in URL (Supabase puts #access_token=... in hash)
    const hash = window.location.hash;
    if (hash.includes('access_token')) {
      // Let Supabase handle it automatically via session
      await new Promise(r => setTimeout(r, 500));
    }

    const sb = getSB();
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.href = '/tenant/login.html';
      return;
    }

    const userEmail = session.user.email || '';
    document.getElementById('user-email').textContent = userEmail;

    // Find the application by email
    const { data: apps, error } = await sb.from('applications')
      .select('id,app_id,created_at,status,payment_status,first_name,last_name,email,phone,' +
              'property_address,property_id,lease_status,lease_sent_date,lease_signed_date,' +
              'lease_start_date,lease_end_date,monthly_rent,security_deposit,move_in_costs,' +
              'move_in_status,move_in_date_actual,move_in_notes,tenant_sign_token,' +
              'holding_fee_requested,holding_fee_amount,holding_fee_due_date,holding_fee_paid,holding_fee_paid_at,' +
              'payment_confirmed_at,payment_amount_collected,payment_method_confirmed,payment_transaction_ref')
      .eq('email', userEmail.toLowerCase())
      .order('created_at', { ascending: false });

    const loading = document.getElementById('portal-loading');
    const content = document.getElementById('portal-content');
    loading.style.display = 'none';
    content.style.display = 'block';

    if (error) {
      content.innerHTML = '<div class="error-state">Error loading your application. Please try again or contact support.</div>';
      return;
    }

    if (!apps || apps.length === 0) {
      content.innerHTML = `<div class="no-app"><h3>No application found</h3><p>We could not find an application for <strong>${esc(userEmail)}</strong>.<br>If you applied recently, it may take a moment to appear.</p><p style="margin-top:16px;font-size:.78rem"><a href="/how-to-apply.html" style="color:#60a5fa">Learn how to apply &rarr;</a></p></div>`;
      return;
    }

    const app = apps[0];
    window._appId = app.app_id || app.id;
    content.innerHTML = renderPortal(app);
  });
  </script>
  </body>
  </html>
