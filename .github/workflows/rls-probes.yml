# Phase 2 monitoring — RLS regression probes.
#
# Hits the public PostgREST endpoint as the anon role with the (already
# public) anon key, and asserts the privacy contract: PII columns must
# refuse to be SELECTed, admin tables must be invisible, and intentionally
# public columns must keep working. A regression here would re-open
# issues like #1 and #22.
#
# Anon key + URL are read at runtime from the deployed config.js — no
# additional secrets required, and the probe automatically tracks whatever
# is currently in production.

name: RLS regression probes

on:
  schedule:
    - cron: '17 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SITE_BASE: https://choice-properties-site.pages.dev
    steps:
      - name: Probe RLS as anon
        shell: bash
        run: |
          set -u
          if [ -z "${SUPABASE_PROJECT_REF:-}" ] || [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::warning::SUPABASE_PROJECT_REF / SUPABASE_ACCESS_TOKEN not set — probes will run but failures cannot be recorded."
            CAN_RECORD=0
          else
            CAN_RECORD=1
          fi

          # Pull the public anon key + URL straight from the deployed config.
          # If config.js can't be fetched, skip the probes entirely (no false
          # alarms).
          CFG=$(curl -fsSL --max-time 8 "${SITE_BASE}/config.js" || true)
          if [ -z "$CFG" ]; then
            echo "::warning::could not fetch ${SITE_BASE}/config.js — skipping RLS probes"
            exit 0
          fi
          SUPA_URL=$(printf "%s" "$CFG" | grep -oE "SUPABASE_URL:\s*'[^']+'" | head -n1 | sed -E "s/.*'([^']+)'.*/\1/")
          ANON_KEY=$(printf "%s" "$CFG" | grep -oE "SUPABASE_ANON_KEY:\s*'[^']+'" | head -n1 | sed -E "s/.*'([^']+)'.*/\1/")
          if [ -z "$SUPA_URL" ] || [ -z "$ANON_KEY" ]; then
            echo "::warning::could not parse SUPABASE_URL / SUPABASE_ANON_KEY from config.js"
            exit 0
          fi
          echo "Probing ${SUPA_URL} as anon (key length ${#ANON_KEY})"

          API="https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query"
          AUTH="Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"
          esc() { printf "%s" "$1" | sed "s/'/''/g"; }

          run_sql() {
            [ "$CAN_RECORD" = "1" ] || { echo "  (skip record — no secrets)"; return; }
            local q="$1"
            local payload
            payload=$(jq -nc --arg q "$q" '{query:$q}')
            curl -sS -X POST "$API" -H "$AUTH" -H "Content-Type: application/json" \
              --data "$payload" -o /tmp/sql_resp.json -w "  recorded HTTP %{http_code}\n" || true
          }

          report_issue() {
            local fp="$1" title="$2" severity="$3" evidence_json="$4"
            local efp etitle eev esev
            efp=$(esc "$fp"); etitle=$(esc "$title"); eev=$(esc "$evidence_json"); esev=$(esc "$severity")
            local sql
            sql="INSERT INTO public.agent_issues (severity, status, title, kind, detector, evidence, fingerprint, auto_fix_attempts) "
            sql="${sql}VALUES ('${esev}','open','${etitle}','rls','github-actions/rls-probes','${eev}'::jsonb,'${efp}',0) "
            sql="${sql}ON CONFLICT (fingerprint) DO UPDATE SET "
            sql="${sql}status = CASE WHEN public.agent_issues.status = 'resolved' THEN 'open' ELSE public.agent_issues.status END, "
            sql="${sql}evidence = EXCLUDED.evidence;"
            run_sql "$sql"
          }

          mark_resolved() {
            local fp="$1"
            local efp; efp=$(esc "$fp")
            local sql
            sql="UPDATE public.agent_issues SET status='resolved', resolved_at = NOW(), "
            sql="${sql}resolved_by = 'agent:rls-probe', "
            sql="${sql}resolution_note = COALESCE(resolution_note,'') || E'\nAuto-resolved by RLS probe at ' || NOW()::text "
            sql="${sql}WHERE fingerprint = '${efp}' AND status = 'open' AND kind='rls';"
            run_sql "$sql"
          }

          # Test cases:
          #   path  | label                              | expected | severity_on_fail
          # expected: "deny"   — must NOT return 200 with rows
          #           "allow"  — must return 200
          # Each probe stores its own fingerprint so individual fixes / regressions
          # are tracked independently.
          PROBES=(
            "/rest/v1/landlords?select=email&limit=1|landlords.email leakage to anon|deny|critical"
            "/rest/v1/landlords?select=phone&limit=1|landlords.phone leakage to anon|deny|critical"
            "/rest/v1/applications?select=*&limit=1|applications visible to anon|deny|critical"
            "/rest/v1/admin_actions?select=*&limit=1|admin_actions visible to anon|deny|critical"
            "/rest/v1/agent_issues?select=*&limit=1|agent_issues visible to anon|deny|high"
            "/rest/v1/client_errors?select=*&limit=1|client_errors visible to anon|deny|high"
            "/rest/v1/properties?select=id&limit=1|properties readable by anon|allow|high"
          )

          for line in "${PROBES[@]}"; do
            path=$(echo "$line"   | awk -F'|' '{print $1}')
            label=$(echo "$line"  | awk -F'|' '{print $2}')
            want=$(echo "$line"   | awk -F'|' '{print $3}')
            sev=$(echo "$line"    | awk -F'|' '{print $4}')
            url="${SUPA_URL}${path}"
            fp="rls:${path}"

            BODY_FILE=$(mktemp)
            CODE=$(curl -s -o "$BODY_FILE" -w "%{http_code}" \
                       --max-time 10 \
                       -H "apikey: ${ANON_KEY}" \
                       -H "Authorization: Bearer ${ANON_KEY}" \
                       "$url" || echo "000")
            BODY_LEN=$(wc -c < "$BODY_FILE" | tr -d ' ')
            BODY_PREVIEW=$(head -c 240 "$BODY_FILE" | tr -d '\n')
            rm -f "$BODY_FILE"

            FAIL=0
            REASON=""
            if [ "$want" = "deny" ]; then
              # We accept any non-2xx OR a 200 with an empty array []
              if [ "$CODE" = "200" ] && [ "$BODY_PREVIEW" != "[]" ]; then
                FAIL=1
                REASON="anon got rows back when none should be visible"
              fi
            else
              if [ "$CODE" != "200" ]; then
                FAIL=1
                REASON="expected 200, got ${CODE}"
              fi
            fi

            if [ "$FAIL" = "1" ]; then
              echo "FAIL ${CODE}  ${path}  — ${REASON}"
              ev=$(jq -nc \
                    --arg url "$url" \
                    --arg http "$CODE" \
                    --arg expected "$want" \
                    --arg reason "$REASON" \
                    --arg body "$BODY_PREVIEW" \
                    --argjson body_len "$BODY_LEN" \
                    '{url:$url, http:$http, expected:$expected, reason:$reason, body_preview:$body, body_len:$body_len}')
              report_issue "$fp" "RLS regression: ${label}" "$sev" "$ev"
            else
              echo "OK   ${CODE}  ${path}"
              mark_resolved "$fp"
            fi
          done

          exit 0
