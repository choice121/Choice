name: Deploy Supabase Edge Functions & Migrations

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Fail-fast guard: parse every edge function (and its transitive imports)
      # before pulling Docker layers and round-tripping to Supabase. We use
      # `deno cache --no-check` so this matches what the Supabase eszip bundler
      # actually does — it catches SYNTAX/PARSE errors (e.g. an unescaped
      # apostrophe in a single-quoted string) but ignores type-only errors so
      # we don't reject pre-existing type-inference quirks the bundler tolerates.
      # Without this guard a parse error in a `_shared/*.ts` import silently
      # leaves N functions deployed and the rest stale on a partial failure.
      - name: Set up Deno (for parse check)
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Parse-check edge functions before deploy
        run: |
          set -e
          shopt -s nullglob
          FAIL=0
          for d in supabase/functions/*/; do
            slug=$(basename "$d")
            case "$slug" in _*) continue;; esac
            entry="$d/index.ts"
            [ -f "$entry" ] || continue
            echo "::group::deno cache --no-check $slug"
            if ! deno cache --no-check --no-lock --quiet "$entry"; then
              echo "::error file=$entry::Parse/syntax error in edge function '$slug' — fix before deploy"
              FAIL=1
            fi
            echo "::endgroup::"
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "One or more edge functions failed to parse — aborting deploy."
            exit 1
          fi
          echo "All edge functions parsed OK."

      # M-1 hardening: deploy each function INDIVIDUALLY so the per-function
      # `verify_jwt` setting in supabase/config.toml is respected. The previous
      # bulk `supabase functions deploy --no-verify-jwt` invocation overrode
      # config.toml and forced verify_jwt=false on every function.
      - name: Deploy Edge Functions (per-function so config.toml wins)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -e
          shopt -s nullglob
          for d in supabase/functions/*/; do
            slug=$(basename "$d")
            # Skip the _shared utilities directory.
            case "$slug" in _*) continue;; esac
            echo "::group::Deploying $slug"
            supabase functions deploy "$slug" --project-ref "$SUPABASE_PROJECT_REF"
            echo "::endgroup::"
          done

      - name: Apply new database migrations (skip already-applied)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          API="https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query"
          AUTH="Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"

          # Ensure the migration-tracking table exists (idempotent)
          curl -sf -X POST "$API" \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d '{"query":"CREATE TABLE IF NOT EXISTS _migration_history (filename TEXT PRIMARY KEY, applied_at TIMESTAMPTZ DEFAULT NOW());"}' \
            > /dev/null && echo "Tracking table ready."

          FAILED=0

          for f in supabase/migrations/*.sql; do
            BASENAME=$(basename "$f")
            QUOTED=$(python3 -c "import sys; print(\"'\" + sys.argv[1].replace(\"'\", \"''\") + \"'\")" "$BASENAME")

            # Skip if already successfully applied
            ALREADY=$(curl -sf -X POST "$API" \
              -H "$AUTH" -H "Content-Type: application/json" \
              -d "{\"query\":\"SELECT 1 FROM _migration_history WHERE filename = ${QUOTED}\"}" || echo "[]")

            if echo "$ALREADY" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if len(d)>0 else 1)" 2>/dev/null; then
              echo "Skipping (already applied): $BASENAME"
              continue
            fi

            echo "Applying: $BASENAME"
            # Write the JSON payload to a tempfile and stream it to curl with
            # `--data-binary @-` so we don't hit ARG_MAX (~128 KB) when a
            # migration file is large. Previously the SQL was interpolated
            # directly into the shell command line, which crashed on the
            # 274 KB phase13_remaining_states_templates.sql with
            # "Argument list too long" (exit 126) and stranded later
            # migrations as never-applied.
            python3 -c 'import sys,json; print(json.dumps({"query": open(sys.argv[1]).read()}))' "$f" > /tmp/mig_payload.json
            STATUS=$(curl -s -o /tmp/mig_resp.json -w "%{http_code}" \
              -X POST "$API" \
              -H "$AUTH" -H "Content-Type: application/json" \
              --data-binary @/tmp/mig_payload.json)
            RESP=$(cat /tmp/mig_resp.json)
            echo "  HTTP $STATUS — $BASENAME"
            echo "$RESP" | head -c 400

            if [ "$STATUS" -lt 400 ]; then
              curl -sf -X POST "$API" \
                -H "$AUTH" -H "Content-Type: application/json" \
                -d "{\"query\":\"INSERT INTO _migration_history (filename) VALUES (${QUOTED}) ON CONFLICT DO NOTHING\"}" \
                > /dev/null
              echo "  Recorded as applied: $BASENAME"
            else
              echo "  FAILED: $BASENAME"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "One or more migrations failed."
            exit 1
          fi
          echo "All migrations complete."
