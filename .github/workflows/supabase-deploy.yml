name: Deploy Supabase Edge Functions & Migrations

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        run: |
          supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply database migrations via Management API
        run: |
          FAILED_CRITICAL=0
          for f in supabase/migrations/*.sql; do
            echo "Applying migration: $f"
            SQL=$(cat "$f")
            STATUS=$(curl -s -o /tmp/sql_resp.json -w "%{http_code}" \
              -X POST \
              "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/database/query" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"query\": $(echo "$SQL" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}")
            RESP=$(cat /tmp/sql_resp.json)
            echo "HTTP $STATUS — $f"
            echo "$RESP" | head -c 300

            # Ignore errors for old/idempotent migrations (already-exists, syntax quirks)
            # Only fail on our critical new migrations (2026*)
            if [ "$STATUS" -ge 400 ]; then
              BASENAME=$(basename "$f")
              if [[ "$BASENAME" == 2026* ]]; then
                echo "CRITICAL migration failed: $f"
                FAILED_CRITICAL=1
              else
                echo "Warning: old migration returned $STATUS — likely already applied, continuing."
              fi
            fi
          done
          if [ "$FAILED_CRITICAL" -eq 1 ]; then
            echo "One or more 2026 critical migrations failed."
            exit 1
          fi
          echo "All critical migrations applied successfully."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
