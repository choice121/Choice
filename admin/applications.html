<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<title>Applications · Choice Properties Admin</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap">
<link rel="stylesheet" href="/css/cp-design.css?v=__BUILD_VERSION__">
<script defer src="/config.js"></script>
<script defer src="/js/supabase.min.js"></script>
<script defer src="/js/cp-api.js" type="module"></script>
<script defer src="/js/cp-chrome.js?v=__BUILD_VERSION__"></script>
<script defer src="/js/cp-shell.js?v=__BUILD_VERSION__"></script>
<link rel="stylesheet" href="/css/admin/applications.css?v=__BUILD_VERSION__">
</head>
<body data-page-title="Applications" data-page-sub="Loading…">
<div class="app">
  <main class="app-content">

    <div class="toolbar">
      <div class="search">
        <svg class="i"><use href="#i-search"/></svg>
        <input id="search-input" placeholder="Search name, email, phone, app id…" autocomplete="off">
      </div>
      <select id="pay-filter" aria-label="Payment filter">
        <option value="">All payments</option>
        <option value="paid">Paid</option>
        <option value="unpaid">Unpaid</option>
        <option value="waived">Waived</option>
        <option value="refunded">Refunded</option>
      </select>
    </div>

    <div class="chip-row" id="filter-tabs" role="tablist" aria-label="Status filter">
      <button class="chip active" data-status="all">All</button>
      <button class="chip" data-status="pending">Pending</button>
      <button class="chip" data-status="under_review">In review</button>
      <button class="chip" data-status="approved">Approved</button>
      <button class="chip" data-status="waitlisted">Waitlisted</button>
      <button class="chip" data-status="denied">Denied</button>
      <button class="chip" data-status="withdrawn">Withdrawn</button>
    </div>

    <div class="stats-bar" id="stats-bar"></div>

    <!-- Bulk-action toolbar row: select-all + selection count.
         The sticky bulk-bar (#bulk-bar-slot) appears below the list when
         1+ rows are selected. -->
    <div class="bulk-toolbar-row" id="bulk-toolbar-row" hidden>
      <label>
        <input type="checkbox" class="bulk-cb-all" id="bulk-cb-all" aria-label="Select all visible applications">
        <span id="bulk-cb-all-label">Select all visible</span>
      </label>
    </div>

    <div id="apps-list">
      <div class="list">
        <div class="skeleton sk-line lg" style="height:90px;margin-bottom:10px"></div>
        <div class="skeleton sk-line lg" style="height:90px;margin-bottom:10px"></div>
        <div class="skeleton sk-line lg" style="height:90px;margin-bottom:10px"></div>
      </div>
    </div>

    <div id="bulk-bar-slot" aria-live="polite"></div>

  </main>
</div>

<script defer src="/js/admin/applications.js?v=__BUILD_VERSION__"></script>

</body>
</html>
