<script>
// ВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂ Admin applications page ВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂВѓВўВ‚В”В‚ВЂ
// Uses CP.Applications (added in Phase 1 migration)
// Requires: SETUP.sql must be run against Supabase first (Phase 0)

let _currentStatus = 'all';
let _currentSearch = '';
let _debounce = null;

function statusBadge(s) {
  const map = { pending:'badge-pending', approved:'badge-approved', denied:'badge-denied', waitlisted:'badge-waitlisted' };
  return `<span class="badge ${map[s]||'badge-pending'}">${s||'unknown'}</span>`;
}
function payBadge(s) {
  const map = { paid:'badge-paid', unpaid:'badge-unpaid', refunded:'badge-refunded' };
  return `<span class="badge ${map[s]||'badge-unpaid'}">${s||'unpaid'}</span>`;
}
function fmtDate(d) {
  if (!d) return 'ВѓВўВ‚ВЂВ‚В”';
  try { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch { return d; }
}
function esc(s) { return CP_esc ? CP_esc(s) : String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

function renderCard(app) {
  const name = esc(`${app.first_name||''} ${app.last_name||''}`.trim()) || '(no name)';
  const prop = esc(app.property_address || app.property_id || 'ВѓВўВ‚ВЂВ‚В”');
  const hasCoApp = app.has_co_applicant ? '<span class="badge" style="background:rgba(201,168,76,.15);color:#b45309">Co-Applicant</span>' : '';
  const hasPets  = app.has_pets ? '<span class="badge" style="background:rgba(16,185,129,.1);color:#059669">Pets</span>' : '';

  return `<div class="app-card" id="card-${app.id}">
    <div class="app-card-top">
      <div>
        <div class="app-id">${esc(app.app_id||app.id)}</div>
        <div class="app-name">${name}</div>
        <div class="app-sub"><i class="fas fa-map-marker-alt" style="margin-right:4px;font-size:.65rem"></i>${prop}</div>
        <div class="app-badges">${statusBadge(app.status)}${payBadge(app.payment_status)}${hasCoApp}${hasPets}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:.7rem;color:var(--muted)">Submitted</div>
        <div style="font-size:.78rem;font-weight:600;color:var(--text)">${fmtDate(app.created_at)}</div>
      </div>
    </div>
    <div class="app-meta">
      <span><i class="fas fa-envelope"></i> ${esc(app.email||'ВѓВўВ‚ВЂВ‚В”')}</span>
      <span><i class="fas fa-phone"></i> ${esc(app.phone||'ВѓВўВ‚ВЂВ‚В”')}</span>
      ${app.requested_move_in_date ? `<span><i class="fas fa-calendar"></i> Move-in: ${esc(app.requested_move_in_date)}</span>` : ''}
      ${app.monthly_income ? `<span><i class="fas fa-dollar-sign"></i> Income: ${esc(app.monthly_income)}/mo</span>` : ''}
    </div>
    <div class="app-actions">
      ${app.status !== 'approved'   ? `<button class="btn-sm btn-approve"   onclick="setStatus('${app.id}','approved')">Approve</button>` : ''}
      ${app.status !== 'denied'     ? `<button class="btn-sm btn-deny"      onclick="setStatus('${app.id}','denied')">Deny</button>` : ''}
      ${app.status !== 'waitlisted' ? `<button class="btn-sm btn-waitlist"  onclick="setStatus('${app.id}','waitlisted')">Waitlist</button>` : ''}
      ${app.status !== 'pending'    ? `<button class="btn-sm btn-pending"   onclick="setStatus('${app.id}','pending')">ResetВѓВўВ‚В†В‚В’Pending</button>` : ''}
      <button class="btn-ghost-sm" onclick="togglePayment('${app.id}','${app.payment_status}')">
        ${app.payment_status === 'paid' ? 'ВѓВ°В‚ВџВ‚В’В‚Ві Mark Unpaid' : 'ВѓВ°В‚ВџВ‚В’В‚Ві Mark Paid'}
      </button>
      ${app.payment_status === 'paid' ? `<button class="btn-ghost-sm" onclick="showRefundModal('${app.id}','${app.app_id||app.id}','${esc((app.first_name||'')+' '+(app.last_name||''))}')" style="color:#b45309;border-color:rgba(180,83,9,.3)"><i class="fas fa-undo" style="margin-right:4px"></i>Refund</button>` : ''}
      <button class="btn-ghost-sm" onclick="toggleDetail('${app.id}')">Details ВѓВўВ‚В–В‚Вѕ</button>
    </div>
    <div class="detail-panel" id="detail-${app.id}">
      ${renderDetail(app)}
    </div>
  </div>`;
}

function renderDetail(app) {
  function row(label, val) {
    return `<div class="detail-row"><span class="detail-key">${esc(label)}</span><span class="detail-val">${esc(String(val||'ВѓВўВ‚ВЂВ‚В”'))}</span></div>`;
  }
  return `
    <strong style="font-size:.78rem;color:var(--text)">Personal</strong>
    <div class="detail-grid" style="margin-bottom:12px">
      ${row('DOB', app.dob)}
      ${row('SSN (last 4)', app.ssn)}
      ${row('Gov ID Type', app.government_id_type)}
      ${row('Gov ID #', app.government_id_number)}
      ${row('Desired Lease Term', app.desired_lease_term)}
      ${row('Total Occupants', app.total_occupants)}
      ${row('Smoker', app.smoker ? 'Yes' : 'No')}
      ${row('Ever Evicted', app.ever_evicted ? 'Yes' : 'No')}
    </div>
    <strong style="font-size:.78rem;color:var(--text)">Residence</strong>
    <div class="detail-grid" style="margin-bottom:12px">
      ${row('Current Address', app.current_address)}
      ${row('Duration', app.residency_duration)}
      ${row('Current Rent', app.current_rent_amount)}
      ${row('Reason Leaving', app.reason_for_leaving)}
      ${row('Current Landlord', app.current_landlord_name)}
      ${row('Landlord Phone', app.landlord_phone)}
      ${row('Prior Address', app.previous_address)}
      ${row('Prior Landlord', app.previous_landlord_name)}
    </div>
    <strong style="font-size:.78rem;color:var(--text)">Employment</strong>
    <div class="detail-grid" style="margin-bottom:12px">
      ${row('Status', app.employment_status)}
      ${row('Employer', app.employer)}
      ${row('Job Title', app.job_title)}
      ${row('Duration', app.employment_duration)}
      ${row('Supervisor', app.supervisor_name)}
      ${row('Monthly Income', app.monthly_income)}
      ${row('Other Income', app.other_income)}
    </div>
    <strong style="font-size:.78rem;color:var(--text)">Background</strong>
    <div class="detail-grid" style="margin-bottom:12px">
      ${row('Bankruptcy', app.has_bankruptcy ? 'Yes ВѓВўВ‚ВЂВ‚В” ' + (app.bankruptcy_explanation||'') : 'No')}
      ${row('Criminal History', app.has_criminal_history ? 'Yes ВѓВўВ‚ВЂВ‚В” ' + (app.criminal_history_explanation||'') : 'No')}
    </div>
    <strong style="font-size:.78rem;color:var(--text)">References & Emergency Contact</strong>
    <div class="detail-grid" style="margin-bottom:12px">
      ${row('Ref 1', app.reference_1_name ? app.reference_1_name + ' ВѓВўВ‚ВЂВ‚В” ' + (app.reference_1_phone||'') : 'ВѓВўВ‚ВЂВ‚В”')}
      ${row('Ref 2', app.reference_2_name ? app.reference_2_name + ' ВѓВўВ‚ВЂВ‚В” ' + (app.reference_2_phone||'') : 'ВѓВўВ‚ВЂВ‚В”')}
      ${row('Emergency Contact', app.emergency_contact_name ? app.emergency_contact_name + ' (' + (app.emergency_contact_relationship||'') + ') ' + (app.emergency_contact_phone||'') : 'ВѓВўВ‚ВЂВ‚В”')}
    </div>
    <strong style="font-size:.78rem;color:var(--text)">Vehicle & Preferences</strong>
    <div class="detail-grid" style="margin-bottom:12px">
      ${row('Vehicle', [app.vehicle_year, app.vehicle_make, app.vehicle_model].filter(Boolean).join(' ') || 'ВѓВўВ‚ВЂВ‚В”')}
      ${row('License Plate', app.vehicle_license_plate)}
      ${row('Primary Payment', app.primary_payment_method)}
      ${row('Alt Payment', app.alternative_payment_method)}
      ${row('Preferred Contact', app.preferred_contact_method)}
      ${row('Best Time', app.preferred_time)}
    </div>
    ${app.pet_details ? `<div class="detail-row"><span class="detail-key">Pet Details</span><span class="detail-val">${esc(app.pet_details)}</span></div>` : ''}
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border,#e2e8f0)">
      <div style="font-size:.72rem;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">Uploaded Documents</div>
      <div id="docs-${app.id}">
        <button class="btn-ghost-sm" onclick="loadDocs('${app.id}','${app.app_id||app.id}')"><i class="fas fa-folder-open" style="margin-right:4px"></i>View Documents</button>
      </div>
    </div>
    <div style="margin-top:12px">
      <div style="font-size:.72rem;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Admin Notes</div>
      <textarea class="notes-area" id="notes-${app.id}" placeholder="Internal notes (not visible to applicant)ВѓВўВ‚ВЂВ‚В¦">${esc(app.admin_notes||'')}</textarea>
      <button class="btn-ghost-sm" style="margin-top:6px" onclick="saveNotes('${app.id}')">Save Notes</button>
    </div>`;
}

function toggleDetail(id) {
  const panel = document.getElementById('detail-' + id);
  if (panel) panel.classList.toggle('open');
}

async function setStatus(id, status) {
    const card = document.getElementById('card-' + id);
    if (card) card.style.opacity = '0.5';
    const { ok, error } = await CP.Applications.updateStatus(id, status);
    if (!ok) { alert('Error: ' + error); if (card) card.style.opacity = '1'; return; }
    if (status === 'approved' || status === 'denied') {
      const emailType = status;
      const send = confirm('Status updated to ' + status + '.\n\nSend ' + (emailType === 'approved' ? 'approval' : 'denial') + ' email to applicant?');
      if (send) await sendStatusEmail(id, emailType);
    }
    await loadApps();
  }

  async function sendStatusEmail(id, type) {
    try {
      const appResult = await CP.Applications.getOne(id);
      if (!appResult.ok || !appResult.data?.app_id) {
        alert('Status saved, but email failed: could not load application ID.');
        return;
      }
      const session = await CP.Auth.getSession();
      const token = session?.access_token || CONFIG.SUPABASE_ANON_KEY;
      const res = await fetch(CONFIG.SUPABASE_URL + '/functions/v1/send-email', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': CONFIG.SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + token,
        },
        body: JSON.stringify({ app_id: appResult.data.app_id, type }),
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok || json.success === false) { alert('Status saved, but email failed: ' + (json.error || res.statusText)); return; }
      showToast('Email sent to applicant.');
    } catch(e) { alert('Email error: ' + e.message); }
  }

  function showToast(msg) {
    let t = document.getElementById('cp-toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'cp-toast';
      t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#16a34a;color:#fff;padding:10px 18px;border-radius:9px;font-size:.82rem;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:9999;opacity:0;transition:opacity .2s';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = '1';
    setTimeout(() => { t.style.opacity = '0'; }, 3000);
  }

  async function togglePayment(id, currentStatus) {
  const newStatus = currentStatus === 'paid' ? 'unpaid' : 'paid';
  const { ok, error } = await CP.Applications.updatePayment(id, newStatus);
  if (!ok) { alert('Error: ' + error); return; }
  await loadApps();
}

async function saveNotes(id) {
  const ta = document.getElementById('notes-' + id);
  if (!ta) return;
  const { ok, error } = await CP.Applications.saveNotes(id, ta.value);
  if (!ok) { alert('Error saving notes: ' + error); return; }
  ta.style.borderColor = '#16a34a';
  setTimeout(() => { ta.style.borderColor = ''; }, 1500);
}

async function loadApps() {
  const list = document.getElementById('apps-list');
  const sub  = document.getElementById('page-sub');
  const { ok, data, error } = await CP.Applications.getAll({
    status: _currentStatus,
    search: _currentSearch,
  });
  if (!ok) {
    list.innerHTML = `<div class="empty-state"><h3>Error loading applications</h3><p>${esc(error)}</p></div>`;
    return;
  }
  const rows = data || [];
  sub.textContent = `${rows.length} application${rows.length !== 1 ? 's' : ''}${_currentStatus !== 'all' ? ' ВѓВўВ‚ВЂВ‚В” ' + _currentStatus : ''}`;
  if (!rows.length) {
    list.innerHTML = `<div class="empty-state"><h3>No applications found</h3><p>Try changing the filter or search term.</p></div>`;
    return;
  }
  list.innerHTML = rows.map(renderCard).join('');
}

document.addEventListener('DOMContentLoaded', async () => {
  const ok = await CP.Auth.requireAdmin();
  if (!ok) return;
  const user = await CP.Auth.getUser();
  document.getElementById('admin-name').textContent = user?.email || 'Admin';

  // Filter tabs
  document.getElementById('filter-tabs').addEventListener('click', async e => {
    const btn = e.target.closest('.filter-tab');
    if (!btn) return;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _currentStatus = btn.dataset.status;
    await loadApps();
  });

  // Search
  document.getElementById('search-input').addEventListener('input', e => {
    _currentSearch = e.target.value;
    clearTimeout(_debounce);
    _debounce = setTimeout(loadApps, 350);
  });

  await loadApps();
});

// в”Ђв”Ђ Phase 4B вЂ” Mark as Refunded в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function showRefundModal(dbId, appId, name) {
  document.getElementById('refund-app-db-id').value = dbId;
  document.getElementById('refund-app-id').value    = appId;
  document.getElementById('refund-name').textContent = name || appId;
  const bd = document.getElementById('refund-modal-backdrop');
  bd.style.display = 'flex';
}
function closeRefundModal() {
  document.getElementById('refund-modal-backdrop').style.display = 'none';
}
async function markRefunded() {
  const dbId = document.getElementById('refund-app-db-id').value;
  const btn  = document.getElementById('refund-confirm-btn');
  btn.disabled = true;
  btn.textContent = 'ProcessingвЂ¦';
  const { error } = await CP.sb().from('applications')
    .update({ payment_status: 'refunded', updated_at: new Date().toISOString() })
    .eq('id', dbId);
  if (error) { alert('Error: ' + error.message); btn.disabled = false; btn.textContent = 'Confirm Refund'; return; }
  closeRefundModal();
  showToast('Payment marked as refunded.');
  await loadApps();
}

// в”Ђв”Ђ Phase 8 вЂ” View uploaded documents в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function loadDocs(dbId, appId) {
  const container = document.getElementById('docs-' + dbId);
  if (!container) return;
  container.innerHTML = '<span style="font-size:.78rem;color:var(--muted)"><i class="fas fa-spinner fa-spin"></i> LoadingвЂ¦</span>';
  try {
    const { data: files, error } = await CP.sb().storage.from('application-docs').list(appId, { limit: 50, sortBy: { column: 'created_at', order: 'desc' } });
    if (error) { container.innerHTML = '<span style="font-size:.78rem;color:#dc2626">Error: ' + esc(error.message) + '</span>'; return; }
    if (!files || !files.length) { container.innerHTML = '<span style="font-size:.78rem;color:var(--muted)">No documents uploaded yet.</span>'; return; }
    const rows = files.map(f => {
      const name = esc(f.name || 'вЂ”');
      const path = appId + '/' + f.name;
      return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border,#e2e8f0)">' +
        '<i class="fas fa-file" style="color:var(--muted);font-size:.8rem"></i>' +
        '<span style="font-size:.78rem;flex:1">' + name + '</span>' +
        '<button class="btn-ghost-sm" style="font-size:.72rem;padding:3px 8px" onclick="downloadDoc(\'' + esc(path) + '\')">Download</button>' +
        '</div>';
    }).join('');
    container.innerHTML = '<div style="margin-top:4px">' + rows + '</div>';
  } catch(e) { container.innerHTML = '<span style="font-size:.78rem;color:#dc2626">Error loading docs.</span>'; }
}
async function downloadDoc(path) {
  const { data, error } = await CP.sb().storage.from('application-docs').createSignedUrl(path, 300);
  if (error || !data?.signedUrl) { alert('Could not get download link: ' + (error?.message || 'unknown')); return; }
  window.open(data.signedUrl, '_blank');
}

</script>

<!-- Phase 4B вЂ” Refund Confirmation Modal -->

  <div style="background:#1e293b;border-radius:12px;padding:28px 32px;width:90%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.5)">

    <input type="hidden" id="refund-app-db-id">
    <input type="hidden" id="refund-app-id">

      <button class="btn-ghost-sm" onclick="closeRefundModal()">Cancel</button>
      <button id="refund-confirm-btn" onclick="markRefunded()" style="padding:8px 18px;background:#b45309;color:#fff;border:none;border-radius:7px;font-size:.82rem;font-weight:600;cursor:pointer">Confirm Refund</button>
    </div>
  </div>
</div>
