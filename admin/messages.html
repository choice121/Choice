<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<title>Messages · Choice Properties Admin</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap">
<link rel="stylesheet" href="/css/cp-design.css?v=20260429">
<script defer src="/config.js"></script>
<script defer src="/js/supabase.min.js"></script>
<script defer src="/js/cp-api.js" type="module"></script>
<script defer src="/js/cp-chrome.js?v=20260429"></script>
<script defer src="/js/cp-shell.js?v=20260429"></script>
<style>
  .thread{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden}
  .thread + .thread{margin-top:var(--sp-2)}
  .th-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;cursor:pointer;min-height:var(--tap)}
  .th-head:hover{background:var(--surface-2)}
  .th-body{display:none;border-top:1px solid var(--border);padding:14px 16px}
  .thread.open .th-body{display:block}
  .msg{margin:6px 0;padding:10px 12px;border-radius:8px;font-size:.85rem;line-height:1.5}
  .msg-admin{background:var(--brand-glow);border-left:3px solid var(--brand)}
  .msg-tenant{background:var(--surface-2);border-left:3px solid var(--info)}
  .msg-meta{font-size:.66rem;color:var(--muted-2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
  .reply{display:flex;flex-direction:column;gap:8px;margin-top:14px}
  .reply textarea{min-height:60px;resize:vertical}
</style>
</head>
<body data-page-title="Messages" data-page-sub="Tenant ↔ admin threads">
<div class="app">
  <main class="app-content">
    <div id="threads"></div>
  </main>
</div>

<script nonce="VZEkWatH2Jtta2vFy8dRhA">
(function(){
  'use strict';

  function readyDeps(){ return window.AdminShell && window.CP && CP.Auth && CP.sb && CP.Applications; }
  function waitReady(ms){
    return new Promise((res,rej)=>{
      const start=Date.now();
      (function tick(){
        if(readyDeps()) return res();
        if(Date.now()-start>ms) return rej(new Error('Admin tools failed to load.'));
        setTimeout(tick,80);
      })();
    });
  }

  function render(threads){
    const S = AdminShell;
    const host = document.getElementById('threads');
    if(!Object.keys(threads).length){
      host.innerHTML = '<div class="empty"><svg class="i"><use href="#i-message"/></svg><h3>No messages yet</h3><p>Tenant conversations will appear here.</p></div>';
      return;
    }
    host.innerHTML = Object.entries(threads).map(([appId,t]) => {
      const last = t.msgs[0];
      const name = ((t.app && t.app.first_name)||'')+' '+((t.app && t.app.last_name)||'');
      const msgs = [...t.msgs].reverse().map(m => ''
        + '<div class="msg msg-'+(m.sender||'tenant')+'">'
        +   '<div class="msg-meta">'+S.esc(m.sender_name||m.sender||'—')+' · '+S.fmtRelative(m.created_at)+'</div>'
        +   S.esc(m.message||'')
        + '</div>').join('');
      return ''
        + '<div class="thread" data-app="'+S.esc(appId)+'">'
        +   '<div class="th-head" data-action="toggle-thread">'
        +     '<div style="min-width:0;flex:1">'
        +       '<div class="row-title">'+S.esc(name.trim()||'Applicant')+' <span class="muted text-xs" style="font-family:monospace">'+S.esc(appId)+'</span></div>'
        +       '<div class="row-sub">'+S.esc((t.app && t.app.email)||'')+'</div>'
        +     '</div>'
        +     '<div class="row-meta">'+t.msgs.length+' · '+S.fmtRelative(last.created_at)+'</div>'
        +   '</div>'
        +   '<div class="th-body">'
        +     msgs
        +     '<div class="reply">'
        +       '<textarea class="form-input" data-reply="'+S.esc(appId)+'" placeholder="Type a reply…"></textarea>'
        +       '<button class="btn btn-primary btn-sm" data-action="send-reply" data-app="'+S.esc(appId)+'" style="align-self:flex-end">Send</button>'
        +     '</div>'
        +   '</div>'
        + '</div>';
    }).join('');
  }

  async function load(){
    document.getElementById('threads').innerHTML = AdminShell.skeletonRows(3);
    document.getElementById('page-sub').textContent = 'Loading…';
    const { data: msgs, error } = await CP.sb()
      .from('messages')
      .select('*,applications(first_name,last_name,email,app_id)')
      .order('created_at',{ascending:false});
    if(error){
      document.getElementById('threads').innerHTML =
        '<div class="empty"><h3>Could not load</h3><p>'+AdminShell.esc(error.message)+'</p></div>';
      document.getElementById('page-sub').textContent = 'Error';
      return;
    }
    const threads = {};
    (msgs||[]).forEach(m => {
      const id = m.app_id;
      if(!threads[id]) threads[id] = { app: m.applications, msgs: [] };
      threads[id].msgs.push(m);
    });
    document.getElementById('page-sub').textContent = Object.keys(threads).length+' thread'+(Object.keys(threads).length===1?'':'s');
    render(threads);
  }

  AdminShell && AdminShell.on && AdminShell.on('toggle-thread', (target) => {
    const t = target.closest('.thread');
    if(t) t.classList.toggle('open');
  });
  AdminShell && AdminShell.on && AdminShell.on('send-reply', async (target) => {
    const appId = target.getAttribute('data-app');
    const ta = document.querySelector('textarea[data-reply="'+appId+'"]');
    if(!ta) return;
    const msg = ta.value.trim();
    if(!msg) return;
    target.disabled = true;
    const res = await CP.Applications.sendMessage(appId, msg, 'admin', 'Choice Properties');
    target.disabled = false;
    if(res.ok){
      ta.value = '';
      AdminShell.toast('Message sent','success');
      load();
    } else {
      AdminShell.toast('Error: '+res.error,'error');
    }
  });

  document.addEventListener('DOMContentLoaded', async () => {
    try { await waitReady(8000); }
    catch(e){
      document.getElementById('threads').innerHTML =
        '<div class="empty"><h3>Could not load admin tools</h3><p>'+e.message+'</p></div>';
      return;
    }
    const ok = await AdminShell.requireAdmin();
    if(!ok) return;
    AdminShell.on('refresh', () => load());
    load();
  });
})();
</script>
</body>
</html>
