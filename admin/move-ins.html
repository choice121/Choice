<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<title>Move-ins · Choice Properties Admin</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap">
<link rel="stylesheet" href="/css/cp-design.css?v=__BUILD_VERSION__">
<script defer src="/config.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js" integrity="sha384-YieCqqg9gQufX7+5HcFvCEg/n3KUEdl8/Jb+A6J0npf1mB740VayvwKjTrtCeUoy" crossorigin="anonymous"></script>
<script defer src="/js/cp-api.js" type="module"></script>
<script defer src="/js/cp-chrome.js?v=__BUILD_VERSION__"></script>
<script defer src="/js/cp-shell.js?v=__BUILD_VERSION__"></script>
<style>
  .mi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:var(--sp-4);display:flex;flex-direction:column;gap:var(--sp-3)}
  .mi-card + .mi-card{margin-top:var(--sp-2)}
  .mi-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:var(--sp-2);padding:var(--sp-3) 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
  .mi-meta .mi-k{font-size:.65rem;color:var(--muted-2);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
  .mi-meta .mi-v{font-size:.82rem;color:var(--text);font-weight:600;margin-top:2px}
</style>
</head>
<body data-page-title="Move-ins" data-page-sub="Loading…">
<div class="app">
  <main class="app-content">

    <div class="chip-row" id="chips">
      <button class="chip active" data-mi="signed">Pending move-in</button>
      <button class="chip" data-mi="scheduled">Scheduled</button>
      <button class="chip" data-mi="confirmed">Confirmed</button>
      <button class="chip" data-mi="all_signed">All signed</button>
    </div>

    <div id="mi-list"></div>

  </main>
</div>

<script defer src="/js/admin/move-ins.js?v=__BUILD_VERSION__"></script>
</body>
</html>
