<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<title>Properties · Choice Properties Admin</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap">
<link rel="stylesheet" href="/css/cp-design.css?v=__BUILD_VERSION__">
<script defer src="/config.js"></script>
<script defer src="/js/supabase.min.js"></script>
<script defer src="/js/cp-api.js" type="module"></script>
<script defer src="/js/cp-chrome.js?v=__BUILD_VERSION__"></script>
<script defer src="/js/cp-shell.js?v=__BUILD_VERSION__"></script>
<style>
  .prop-grid{display:grid;grid-template-columns:1fr;gap:var(--sp-3)}
  @media (min-width:560px){.prop-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}}
  .prop-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;display:flex;flex-direction:column}
  .prop-img{width:100%;height:140px;object-fit:cover;background:var(--surface-2)}
  .prop-img-ph{width:100%;height:140px;display:flex;align-items:center;justify-content:center;background:var(--surface-2);color:var(--muted-2)}
  .prop-img-ph .i{width:36px;height:36px}
  .prop-body{padding:var(--sp-4);display:flex;flex-direction:column;gap:6px;flex:1}
  .prop-actions{display:flex;gap:8px;margin-top:auto;padding-top:8px}
</style>
</head>
<body data-page-title="Properties" data-page-sub="Loading…">
<div class="app">
  <main class="app-content">

    <div class="chip-row" id="chips">
      <button class="chip active" data-status="all">All</button>
      <button class="chip" data-status="active">Active</button>
      <button class="chip" data-status="rented">Rented</button>
      <button class="chip" data-status="inactive">Inactive</button>
      <button class="chip" data-status="maintenance">Maintenance</button>
    </div>

    <div class="search">
      <svg class="i"><use href="#i-search"/></svg>
      <input id="search" type="text" placeholder="Search title or address…">
    </div>

    <div id="prop-grid" class="prop-grid"></div>

  </main>
</div>

<a href="#" class="fab" data-action="add-prop" aria-label="Add property"><svg class="i i-lg"><use href="#i-plus"/></svg></a>

<script defer src="/js/admin/properties.js?v=__BUILD_VERSION__"></script>
</body>
</html>
