<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<title>Properties · Choice Properties Admin</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap">
<link rel="stylesheet" href="/css/cp-design.css?v=__BUILD_VERSION__">
<script defer src="/config.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js" integrity="sha384-YieCqqg9gQufX7+5HcFvCEg/n3KUEdl8/Jb+A6J0npf1mB740VayvwKjTrtCeUoy" crossorigin="anonymous"></script>
<script defer src="/js/cp-api.js" type="module"></script>
<script defer src="/js/cp-chrome.js?v=__BUILD_VERSION__"></script>
<script defer src="/js/cp-shell.js?v=__BUILD_VERSION__"></script>
<style>
  /* Admin properties — richer cards modeled after the public card, admin themed */
  .prop-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:8px 0 12px}
  .prop-toolbar .grow{flex:1}
  .prop-bulkbar{display:none;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;margin:0 0 12px;position:sticky;top:8px;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.25)}
  .prop-bulkbar.show{display:flex}
  .prop-bulkbar .count{font-weight:700;color:var(--text)}
  .prop-bulkbar .spacer{flex:1}

  .prop-grid{display:grid;grid-template-columns:1fr;gap:14px}
  @media (min-width:560px){.prop-grid{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}}

  .prop-shell{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease}
  .prop-shell:hover{border-color:var(--brand);box-shadow:0 6px 24px rgba(0,0,0,.25)}
  .prop-shell.is-selected{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand) inset, 0 6px 24px rgba(0,0,0,.25)}

  .prop-media{position:relative;width:100%;aspect-ratio:16/10;background:var(--surface-2);overflow:hidden}
  .prop-media img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease}
  .prop-shell:hover .prop-media img{transform:scale(1.03)}
  .prop-media .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted-2)}
  .prop-media .ph .i{width:40px;height:40px}

  .prop-status-badge{position:absolute;top:10px;left:10px;padding:5px 10px;border-radius:999px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#fff;background:rgba(15,18,30,.78);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.14)}
  .prop-status-badge.s-active{background:rgba(34,197,94,.85);border-color:rgba(34,197,94,.5)}
  .prop-status-badge.s-rented{background:rgba(59,130,246,.85);border-color:rgba(59,130,246,.5)}
  .prop-status-badge.s-inactive{background:rgba(120,128,150,.85);border-color:rgba(120,128,150,.5)}
  .prop-status-badge.s-maintenance{background:rgba(245,158,11,.9);border-color:rgba(245,158,11,.5)}

  .prop-photo-count{position:absolute;bottom:10px;right:10px;padding:4px 8px;border-radius:999px;background:rgba(15,18,30,.78);color:#fff;font-size:.72rem;font-weight:700;display:inline-flex;align-items:center;gap:5px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
  .prop-photo-count .i{width:12px;height:12px}

  .prop-actions-overlay{position:absolute;top:8px;right:8px;display:flex;gap:6px;opacity:0;transform:translateY(-4px);transition:opacity .15s ease, transform .15s ease}
  .prop-shell:hover .prop-actions-overlay,
  .prop-shell:focus-within .prop-actions-overlay,
  .prop-grid.touch .prop-actions-overlay{opacity:1;transform:none}
  .prop-action-btn{width:36px;height:36px;border-radius:10px;border:1px solid rgba(255,255,255,.18);background:rgba(15,18,30,.82);color:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);transition:background .15s ease, transform .15s ease}
  .prop-action-btn:hover{background:rgba(15,18,30,.95);transform:translateY(-1px)}
  .prop-action-btn.danger:hover{background:rgba(220,38,38,.92);border-color:rgba(220,38,38,.5)}
  .prop-action-btn .i{width:16px;height:16px}

  .prop-checkbox{position:absolute;top:8px;left:8px;width:28px;height:28px;border-radius:8px;border:2px solid #fff;background:rgba(15,18,30,.6);display:none;align-items:center;justify-content:center;color:#fff;cursor:pointer;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
  .prop-checkbox .i{width:16px;height:16px;opacity:0;transition:opacity .12s ease}
  .prop-grid.select-mode .prop-checkbox{display:inline-flex}
  .prop-grid.select-mode .prop-status-badge{transform:translateX(36px)}
  .prop-shell.is-selected .prop-checkbox{background:var(--brand);border-color:var(--brand)}
  .prop-shell.is-selected .prop-checkbox .i{opacity:1}

  .prop-body{padding:14px 14px 12px;display:flex;flex-direction:column;gap:6px;flex:1}
  .prop-title{font-size:1rem;font-weight:700;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .prop-addr{font-size:.82rem;color:var(--muted);line-height:1.35;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .prop-meta-row{display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--muted-2);margin-top:2px}
  .prop-meta-row .dot{width:3px;height:3px;border-radius:50%;background:var(--muted-2);opacity:.7}
  .prop-rent{font-size:1.05rem;font-weight:800;color:var(--text);margin-top:4px}
  .prop-rent .per{font-size:.78rem;color:var(--muted);font-weight:600}
  .prop-stats{display:flex;align-items:center;gap:12px;margin-top:6px;padding-top:8px;border-top:1px solid var(--border);font-size:.74rem;color:var(--muted-2)}
  .prop-stats span{display:inline-flex;align-items:center;gap:4px}
  .prop-stats .i{width:12px;height:12px;opacity:.75}

  /* Disable inner click navigation in select mode (whole card toggles) */
  .prop-grid.select-mode .prop-shell{cursor:pointer}
  .prop-grid.select-mode .prop-shell .prop-actions-overlay{display:none}

  /* Smaller mobile: tighter cards */
  @media (max-width:540px){
    .prop-media{aspect-ratio:3/2}
    .prop-actions-overlay{opacity:1;transform:none}
  }
</style>
</head>
<body data-page-title="Properties" data-page-sub="Loading…">
<div class="app">
  <main class="app-content">

    <div class="chip-row" id="chips">
      <button class="chip active" data-status="all">All</button>
      <button class="chip" data-status="active">Active</button>
      <button class="chip" data-status="rented">Rented</button>
      <button class="chip" data-status="inactive">Inactive</button>
      <button class="chip" data-status="maintenance">Maintenance</button>
    </div>

    <div class="prop-toolbar">
      <div class="search grow">
        <svg class="i"><use href="#i-search"/></svg>
        <input id="search" type="text" placeholder="Search title or address…">
      </div>
      <button class="btn btn-ghost" id="btn-select-toggle" type="button">
        <svg class="i"><use href="#i-check"/></svg>
        <span>Select</span>
      </button>
    </div>

    <div class="prop-bulkbar" id="bulkbar" role="region" aria-label="Bulk actions">
      <span class="count" id="bulk-count">0 selected</span>
      <button class="btn btn-ghost btn-sm" id="bulk-all" type="button">Select all</button>
      <button class="btn btn-ghost btn-sm" id="bulk-none" type="button">Clear</button>
      <span class="spacer"></span>
      <button class="btn btn-danger btn-sm" id="bulk-delete" type="button" disabled>
        <svg class="i"><use href="#i-trash"/></svg>
        <span>Delete forever</span>
      </button>
      <button class="btn btn-ghost btn-sm" id="bulk-cancel" type="button">Cancel</button>
    </div>

    <div id="prop-grid" class="prop-grid"></div>

  </main>
</div>

<a href="#" class="fab" data-action="add-prop" aria-label="Add property"><svg class="i i-lg"><use href="#i-plus"/></svg></a>

<script defer src="/js/admin/properties.js?v=__BUILD_VERSION__"></script>
</body>
</html>
