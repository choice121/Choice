<style>
  .timeline{position:relative;padding-left:24px;margin-top:8px}
  .timeline:before{content:'';position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:var(--border)}
  .ev{position:relative;padding:10px 0;font-size:.84rem}
  .ev:before{content:'';position:absolute;left:-22px;top:14px;width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--accent)}
  .ev .ev-time{font-size:.7rem;color:var(--muted);font-family:ui-monospace,monospace}
  .ev .ev-title{font-weight:700;color:var(--text)}
  .ev .ev-meta{color:var(--muted);font-size:.78rem;margin-top:2px}
  .pdf-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);font-size:.82rem}
  .pdf-row:last-child{border-bottom:none}
  .pdf-row .pdf-num{font-family:ui-monospace,monospace;color:var(--muted);min-width:46px}
  .amend-card{padding:14px;border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:10px}
  .amend-card .amend-title{font-weight:700;color:var(--text)}
  .amend-card .amend-body{font-size:.8rem;color:var(--text);margin-top:6px;white-space:pre-wrap;max-height:140px;overflow-y:auto;padding:8px;background:var(--surface-2);border-radius:6px}
  .sig-thumb{max-width:200px;max-height:60px;border:1px solid var(--border);border-radius:6px;background:#fff;padding:4px}
</style>
</head>
<body data-page-title="Lease Detail" data-page-sub="Loading…">
<div class="app">
  <main class="app-content">

    <div style="margin-bottom:14px">
      <a href="/admin/leases.html" class="text-xs muted" style="text-decoration:none">&larr; Back to lease pipeline</a>
    </div>

    <div id="lease-detail-root">
      <div class="empty"><div class="text-sm muted">Loading…</div></div>
    </div>

  </main>
</div>

<script defer src="/js/admin/lease-detail.js?v=__BUILD_VERSION__"></script>
</body>
</html>
