<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Choice Admin">
<meta name="robots" content="noindex, nofollow">
<title>Dashboard · Choice Properties Admin</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap">
<link rel="stylesheet" href="/css/cp-design.css?v=__BUILD_VERSION__">
<script defer src="/config.js"></script>
<script defer src="/js/supabase.min.js"></script>
<script defer src="/js/cp-api.js" type="module"></script>
<script defer src="/js/cp-chrome.js?v=__BUILD_VERSION__"></script>
<script defer src="/js/cp-shell.js?v=__BUILD_VERSION__"></script>
</head>
<body data-page-title="Dashboard" data-page-sub="Live overview">

<div class="app">
  <main class="app-content">

    <!-- Greeting -->
    <div class="greeting">
      <div class="g-text">
        <h1 id="greeting-name">Welcome back</h1>
        <p id="greeting-stamp">Live — last refreshed just now</p>
      </div>
    </div>

    <!-- Failed-email alert (only renders when there are failures) -->
    <div id="alert-slot"></div>

    <!-- ACTION QUEUE — needs your attention -->
    <section>
      <div class="row-flex between" style="margin-bottom:10px">
        <div class="text-strong">Needs your attention</div>
        <span class="text-xs muted" id="aq-count"></span>
      </div>
      <div class="action-stack" id="action-queue">
        <div class="skeleton sk-line lg" style="height:72px"></div>
        <div class="skeleton sk-line lg" style="height:72px"></div>
      </div>
    </section>

    <!-- KPI STRIP -->
    <section>
      <div class="row-flex between" style="margin-bottom:10px">
        <div class="text-strong">Pulse</div>
        <a class="card-link" href="applications.html">All applications <svg class="i i-sm"><use href="#i-arrow"/></svg></a>
      </div>
      <div class="chip-row date-range-chips" id="range-tabs" role="tablist" aria-label="Date range" style="margin-bottom:10px">
        <button class="chip" data-range="1d">Today</button>
        <button class="chip" data-range="7d">Last 7d</button>
        <button class="chip" data-range="30d">Last 30d</button>
        <button class="chip active" data-range="all">All time</button>
      </div>
      <div class="kpi-strip" id="kpi-strip">
        <!-- skeletons until loaded -->
      </div>
    </section>

    <!-- RECENT ACTIVITY -->
    <section class="card">
      <div class="card-header">
        <span class="card-title">Recent activity</span>
        <a class="card-link" href="applications.html">View all <svg class="i i-sm"><use href="#i-arrow"/></svg></a>
      </div>
      <div class="card-body" id="recent-feed">
        <div class="activity-feed">
          <div class="activity-row"><div class="skeleton sk-circle"></div><div class="a-body"><div class="skeleton sk-line lg" style="width:70%"></div><div class="skeleton sk-line sm" style="width:40%"></div></div></div>
          <div class="activity-row"><div class="skeleton sk-circle"></div><div class="a-body"><div class="skeleton sk-line lg" style="width:60%"></div><div class="skeleton sk-line sm" style="width:30%"></div></div></div>
          <div class="activity-row"><div class="skeleton sk-circle"></div><div class="a-body"><div class="skeleton sk-line lg" style="width:80%"></div><div class="skeleton sk-line sm" style="width:35%"></div></div></div>
        </div>
      </div>
    </section>

  </main>
</div>

<script defer src="/js/admin/dashboard.js?v=__BUILD_VERSION__"></script>

</body>
</html>
