<!DOCTYPE html>
<html data-theme="light" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<title>Leases · Choice Properties Admin</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap">
<link rel="stylesheet" href="/css/cp-design.css?v=__BUILD_VERSION__">
<script defer src="/config.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js" integrity="sha384-YieCqqg9gQufX7+5HcFvCEg/n3KUEdl8/Jb+A6J0npf1mB740VayvwKjTrtCeUoy" crossorigin="anonymous"></script>
<script defer src="/js/cp-api.js" type="module"></script>
<script defer src="/js/cp-chrome.js?v=__BUILD_VERSION__"></script>
<script defer src="/js/cp-shell.js?v=__BUILD_VERSION__"></script>
</head>
<body data-page-title="Leases" data-page-sub="Loading…">
<div class="app">
  <main class="app-content">

    <div class="chip-row" id="filter-tabs" role="tablist" aria-label="Lease filter">
      <button class="chip active" data-lease="all">All approved</button>
      <button class="chip" data-lease="none">Pending lease</button>
      <button class="chip" data-lease="sent">Sent for signing</button>
      <button class="chip" data-lease="signed">Signed</button>
      <button class="chip" data-lease="co_signed">Fully executed</button>
      <button class="chip" data-lease="voided">Voided</button>
    </div>

    <div class="row-flex between" style="margin:8px 0 4px;flex-wrap:wrap;gap:8px">
      <div class="text-strong">Lease pipeline</div>
      <div class="row-flex gap-2" style="flex-wrap:wrap;align-items:center">
        <span class="text-xs muted" id="count-label"></span>
        <a class="btn btn-ghost btn-sm" href="/admin/lease-template.html">Edit template</a>
        <button class="btn btn-ghost btn-sm" id="btn-check-renewals">Check renewals</button>
      </div>
    </div>

    <div class="chip-row" style="margin-top:6px">
      <span class="chip" style="background:transparent;border:none;color:var(--muted);font-size:.72rem">
        Status filter:
      </span>
    </div>

    <div id="leases-list"></div>

  </main>
</div>

<script defer src="/js/admin/leases.js?v=__BUILD_VERSION__"></script>

</body>
</html>
