<style>
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.filter-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--color-border);background:transparent;color:var(--muted);font-size:.75rem;font-weight:600;cursor:pointer;transition:all .15s}
.filter-tab.active{background:var(--color-primary,#2563eb);color:#fff;border-color:transparent}
.lease-card{background:var(--surface2);border:1px solid var(--color-border);border-radius:10px;padding:18px 20px;margin-bottom:12px;transition:border-color .15s}
.lease-card:hover{border-color:rgba(37,99,235,.3)}
.app-id{font-family:monospace;font-size:.68rem;color:var(--muted);margin-bottom:3px}
.lease-name{font-size:.97rem;font-weight:700;color:var(--text)}
.lease-prop{font-size:.76rem;color:var(--muted2);margin-top:2px}
.badge{padding:3px 9px;border-radius:12px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.badge-none{background:rgba(107,114,128,.12);color:#6b7280}
.badge-pending{background:rgba(234,179,8,.15);color:#ca8a04}
.badge-sent{background:rgba(59,130,246,.15);color:#2563eb}
.badge-signed{background:rgba(34,197,94,.15);color:#16a34a}
.badge-voided{background:rgba(239,68,68,.12);color:#dc2626}
.lease-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin:14px 0;padding:12px 0;border-top:1px solid var(--color-border);border-bottom:1px solid var(--color-border);font-size:.74rem}
.meta-item{display:flex;flex-direction:column;gap:2px}
.meta-label{color:var(--muted);font-size:.63rem;text-transform:uppercase;letter-spacing:.06em}
.meta-val{color:var(--text);font-weight:600}
.lease-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;align-items:center}
.btn-sm{padding:5px 13px;border-radius:7px;font-size:.75rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-ghost-sm{background:transparent;border:1px solid var(--color-border);color:var(--muted);padding:5px 11px;border-radius:7px;font-size:.72rem;cursor:pointer}
.btn-ghost-sm:hover{border-color:var(--color-primary);color:var(--color-primary)}
.notes-area{width:100%;margin-top:10px;padding:8px 10px;background:var(--surface2);border:1px solid var(--color-border);border-radius:7px;color:var(--text);font-size:.78rem;resize:vertical;min-height:60px;font-family:inherit}
.detail-panel{display:none;margin-top:14px;padding:14px;background:var(--bg);border:1px solid var(--color-border);border-radius:8px;font-size:.76rem}
.detail-panel.open{display:block}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state h3{color:var(--text);margin-bottom:8px}
.loading-row{text-align:center;padding:40px;color:var(--muted);font-size:.85rem}

  .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:16px}
  .modal-backdrop.open{display:flex}
  .modal{background:var(--surface1,#fff);border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.22);width:100%;max-width:580px;max-height:90vh;overflow-y:auto}
  .modal-header{padding:18px 22px;border-bottom:1px solid var(--color-border);display:flex;align-items:center;justify-content:space-between}
  .modal-header h3{font-size:.97rem;font-weight:700;color:var(--text)}
  .modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);padding:2px 6px;border-radius:4px;line-height:1}
  .modal-close:hover{color:var(--text);background:var(--surface2)}
  .modal-body{padding:18px 22px}
  .modal-footer{padding:14px 22px;border-top:1px solid var(--color-border);display:flex;gap:8px;justify-content:flex-end}
  .form-row{margin-bottom:14px}
  .form-row label{display:block;font-size:.73rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
  .form-row input,.form-row textarea,.form-row select{width:100%;padding:8px 11px;background:var(--surface2);border:1px solid var(--color-border);border-radius:7px;color:var(--text);font-size:.82rem;font-family:inherit}
  .form-row input:focus,.form-row textarea:focus,.form-row select:focus{outline:none;border-color:var(--color-primary,#2563eb)}
  .form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btn-primary{background:var(--color-primary,#2563eb);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;transition:background .15s}
  .btn-primary:hover:not(:disabled){filter:brightness(1.1)}
  .btn-primary:disabled{opacity:.55;cursor:not-allowed}
  .btn-danger{background:rgba(239,68,68,.12);color:#dc2626;border:1px solid rgba(239,68,68,.25);padding:5px 13px;border-radius:7px;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s}
  .btn-danger:hover{background:rgba(239,68,68,.2)}
  .btn-download{background:rgba(34,197,94,.1);color:#16a34a;border:1px solid rgba(34,197,94,.2);padding:5px 13px;border-radius:7px;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s}
  .btn-download:hover{background:rgba(34,197,94,.2)}
  .btn-generate{background:var(--color-primary,#2563eb);color:#fff;padding:5px 13px;border-radius:7px;font-size:.72rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
  .btn-generate:hover{filter:brightness(1.1)}
  .toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:9px;font-size:.82rem;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  .toast.success{background:#16a34a;color:#fff}
  .toast.error{background:#dc2626;color:#fff}
  </style>

<script>
(function(){

  if(!btn)return;
  btn.addEventListener('click',()=>{sidebar.classList.add('open');overlay.classList.add('open');});
  overlay.addEventListener('click',()=>{sidebar.classList.remove('open');overlay.classList.remove('open');});

<script>
let _leaseFilter = 'all';

function esc(s) { return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
function fmtDate(d) { if(!d)return '—'; try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return d;} }
function fmtMoney(v) { if(v==null)return '—'; return '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function leaseBadge(s) {
  const map = {none:'badge-none',pending:'badge-pending',sent:'badge-sent',signed:'badge-signed',voided:'badge-voided'};
  return `<span class="badge ${map[s]||'badge-none'}">${s||'none'}</span>`;
}

function renderLease(app) {
  const name = esc(`${app.first_name||''} ${app.last_name||''}`.trim()) || '(no name)';
  const prop = esc(app.property_address || app.property_id || '—');
  return `<div class="lease-card" id="lcard-${app.id}">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <div>
        <div class="app-id">${esc(app.app_id||app.id)}</div>
        <div class="lease-name">${name}</div>
        <div class="lease-prop"><i class="fas fa-map-marker-alt" style="margin-right:4px;font-size:.65rem"></i>${prop}</div>
        <div style="margin-top:8px">${leaseBadge(app.lease_status)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;font-size:.76rem;color:var(--muted)">
        ${app.lease_sent_date   ? `<div>Sent: <strong>${fmtDate(app.lease_sent_date)}</strong></div>` : ''}
        ${app.lease_signed_date ? `<div>Signed: <strong style="color:#16a34a">${fmtDate(app.lease_signed_date)}</strong></div>` : ''}
      </div>
    </div>
    <div class="lease-meta">
      <div class="meta-item"><span class="meta-label">Lease Start</span><span class="meta-val">${fmtDate(app.lease_start_date)}</span></div>
      <div class="meta-item"><span class="meta-label">Lease End</span><span class="meta-val">${fmtDate(app.lease_end_date)}</span></div>
      <div class="meta-item"><span class="meta-label">Monthly Rent</span><span class="meta-val">${fmtMoney(app.monthly_rent)}</span></div>
      <div class="meta-item"><span class="meta-label">Security Deposit</span><span class="meta-val">${fmtMoney(app.security_deposit)}</span></div>
      <div class="meta-item"><span class="meta-label">Move-In Costs</span><span class="meta-val">${fmtMoney(app.move_in_costs)}</span></div>
      <div class="meta-item"><span class="meta-label">Tenant Signed</span><span class="meta-val">${app.signature_timestamp ? '✅ ' + fmtDate(app.signature_timestamp) : '—'}</span></div>
    </div>
    <div class="lease-actions">
      <a href="applications.html" class="btn-ghost-sm">← All Applications</a>
      ${app.lease_pdf_url ? `<a href="${esc(app.lease_pdf_url)}" target="_blank" class="btn-ghost-sm"><i class="fas fa-file-pdf"></i> View Lease PDF</a>` : ''}
      <button class="btn-ghost-sm" onclick="toggleLeaseDetail('${app.id}')">Notes / Details ▾</button>
    </div>
    <div class="detail-panel" id="ldetail-${app.id}">
      <div style="margin-bottom:8px;font-size:.76rem;color:var(--text)">
        ${app.lease_notes ? `<div><strong>Lease Notes:</strong> ${esc(app.lease_notes)}</div>` : ''}
        <div style="margin-top:4px"><strong>Email:</strong> ${esc(app.email||'—')} &nbsp;|&nbsp; <strong>Landlord Email:</strong> ${esc(app.landlord_email||'—')}</div>
        ${app.tenant_signature ? `<div style="margin-top:4px;font-size:.72rem;color:#16a34a"><i class="fas fa-check-circle"></i> Tenant signed: ${fmtDate(app.signature_timestamp)}</div>` : ''}
      </div>
      <div style="font-size:.72rem;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Admin Notes</div>
      <textarea class="notes-area" id="lnotes-${app.id}" placeholder="Internal lease notes…">${esc(app.admin_notes||'')}</textarea>
      <button class="btn-ghost-sm" style="margin-top:6px" onclick="saveLNotes('${app.id}')">Save Notes</button>
    </div>
  </div>`;
}

function toggleLeaseDetail(id) {
  const p = document.getElementById('ldetail-' + id);
  if (p) p.classList.toggle('open');
}

async function saveLNotes(id) {
  const ta = document.getElementById('lnotes-' + id);
  if (!ta) return;
  const { ok, error } = await CP.Applications.saveNotes(id, ta.value);
  if (!ok) { alert('Error: ' + error); return; }
  ta.style.borderColor = '#16a34a';
  setTimeout(() => { ta.style.borderColor = ''; }, 1500);
}

async function loadLeases() {
  const list = document.getElementById('leases-list');
  const sub  = document.getElementById('page-sub');

  // Show all approved apps + any with lease activity
  const filters = { status: 'approved' };
  if (_leaseFilter !== 'all') filters.lease_status = _leaseFilter;

  // For "all" tab: get approved status OR any lease_status != none
  // Supabase doesn't support OR across different columns easily in getAll,
  // so we fetch approved apps and let the filter tab handle lease_status separately.
  const { ok, data, error } = await CP.Applications.getAll(
    _leaseFilter === 'all'
      ? { status: 'approved' }
      : { lease_status: _leaseFilter }
  );

  if (!ok) {
    list.innerHTML = `<div class="empty-state"><h3>Error loading leases</h3><p>${esc(error)}</p></div>`;
    return;
  }
  const rows = data || [];
  sub.textContent = `${rows.length} record${rows.length !== 1 ? 's' : ''}${_leaseFilter !== 'all' ? ' — lease ' + _leaseFilter : ' — approved applications'}`;
  if (!rows.length) {
    list.innerHTML = `<div class="empty-state"><h3>No records found</h3><p>No applications match this filter.</p></div>`;
    return;
  }
  list.innerHTML = rows.map(renderLease).join('');
}

document.addEventListener('DOMContentLoaded', async () => {
  const ok = await CP.Auth.requireAdmin();
  if (!ok) return;
  const user = await CP.Auth.getUser();
  document.getElementById('admin-name').textContent = user?.email || 'Admin';

  document.getElementById('filter-tabs').addEventListener('click', async e => {
    const btn = e.target.closest('.filter-tab');
    if (!btn) return;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    _leaseFilter = btn.dataset.lease;
    await loadLeases();
  });

  await loadLeases();
});


  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type || 'success') + ' show';
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  function openLeaseMod(appId, appData) {
    const app = typeof appData === 'string' ? JSON.parse(appData) : appData;
    document.getElementById('modal-app-id').value = appId;
    document.getElementById('modal-app-info').textContent =
      (app.first_name||'') + ' ' + (app.last_name||'') + '  ·  ' + (app.property_address||appId);

    // Prefill fields from existing app data
    if (app.lease_start_date) document.getElementById('m-lease-start').value = app.lease_start_date.slice(0,10);
    if (app.lease_end_date)   document.getElementById('m-lease-end').value   = app.lease_end_date.slice(0,10);
    if (app.monthly_rent)     document.getElementById('m-monthly-rent').value = app.monthly_rent;
    if (app.security_deposit) document.getElementById('m-security-deposit').value = app.security_deposit;
    if (app.move_in_costs)    document.getElementById('m-move-in-costs').value = app.move_in_costs;
    if (app.lease_late_fee_flat) document.getElementById('m-late-fee-flat').value = app.lease_late_fee_flat;
    document.getElementById('m-landlord-name').value    = app.lease_landlord_name    || 'Choice Properties';
    document.getElementById('m-landlord-address').value = app.lease_landlord_address || '2265 Livernois Suite 500, Troy MI 48083';
    document.getElementById('m-state-code').value       = app.lease_state_code       || 'MI';
    document.getElementById('m-pets-policy').value      = app.lease_pets_policy      || '';
    document.getElementById('m-smoking-policy').value   = app.lease_smoking_policy   || '';
    document.getElementById('m-lease-notes').value      = app.lease_notes            || '';
    document.getElementById('modal-err').style.display  = 'none';
    document.getElementById('modal-submit-btn').disabled = false;
    document.getElementById('modal-submit-text').textContent = 'Generate & Send Lease';

    document.getElementById('lease-modal-backdrop').classList.add('open');
  }

  function closeLeaseMod() {
    document.getElementById('lease-modal-backdrop').classList.remove('open');
  }

  async function submitGenerateLease() {
    const appId = document.getElementById('modal-app-id').value;
    if (!appId) return;

    const leaseData = {
      lease_start_date:       document.getElementById('m-lease-start').value       || null,
      lease_end_date:         document.getElementById('m-lease-end').value         || null,
      monthly_rent:           parseFloat(document.getElementById('m-monthly-rent').value)     || null,
      security_deposit:       parseFloat(document.getElementById('m-security-deposit').value) || null,
      move_in_costs:          parseFloat(document.getElementById('m-move-in-costs').value)    || null,
      lease_late_fee_flat:    parseFloat(document.getElementById('m-late-fee-flat').value)    || null,
      lease_landlord_name:    document.getElementById('m-landlord-name').value    || 'Choice Properties',
      lease_landlord_address: document.getElementById('m-landlord-address').value || '2265 Livernois Suite 500, Troy MI 48083',
      lease_state_code:       document.getElementById('m-state-code').value       || 'MI',
      lease_pets_policy:      document.getElementById('m-pets-policy').value      || null,
      lease_smoking_policy:   document.getElementById('m-smoking-policy').value   || null,
      lease_notes:            document.getElementById('m-lease-notes').value      || null,
    };

    const btn = document.getElementById('modal-submit-btn');
    btn.disabled = true;
    document.getElementById('modal-submit-text').textContent = 'Generating…';
    document.getElementById('modal-err').style.display = 'none';

    const token = await CP.Auth.getAccessToken();
    if (!token) {
      document.getElementById('modal-err').textContent = 'Session expired. Please sign in again.';
      document.getElementById('modal-err').style.display = 'block';
      btn.disabled = false;
      document.getElementById('modal-submit-text').textContent = 'Generate & Send Lease';
      return;
    }

    const serverBase = (typeof CONFIG !== 'undefined' && CONFIG.SERVER_URL) ? CONFIG.SERVER_URL : '';
    let resp, json;
    try {
      resp = await fetch(serverBase + '/generate-lease', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ app_id: appId, lease_data: leaseData }),
      });
      json = await resp.json();
    } catch(e) {
      document.getElementById('modal-err').textContent = 'Network error: ' + e.message;
      document.getElementById('modal-err').style.display = 'block';
      btn.disabled = false;
      document.getElementById('modal-submit-text').textContent = 'Generate & Send Lease';
      return;
    }

    if (!resp.ok || !json.success) {
      document.getElementById('modal-err').textContent = json.error || 'Generation failed.';
      document.getElementById('modal-err').style.display = 'block';
      btn.disabled = false;
      document.getElementById('modal-submit-text').textContent = 'Generate & Send Lease';
      return;
    }

    closeLeaseMod();
    showToast('Lease generated and signing email sent!', 'success');
    await loadLeases();
  }

  async function voidLease(id) {
    if (!confirm('Void this lease? The tenant will no longer be able to sign.')) return;
    const { ok, error } = await CP.Applications.saveNotes(id, undefined);
    const { error: voidErr } = await CP.sb().from('applications')
      .update({ lease_status: 'voided', updated_at: new Date().toISOString() })
      .eq('id', id);
    if (voidErr) { showToast('Error: ' + voidErr.message, 'error'); return; }
    showToast('Lease voided.', 'success');
    await loadLeases();
  }

  async function downloadLease(appId) {
    const token = await CP.Auth.getAccessToken();
    if (!token) { showToast('Session expired', 'error'); return; }
    const serverBase = (typeof CONFIG !== 'undefined' && CONFIG.SERVER_URL) ? CONFIG.SERVER_URL : '';
    let resp, json;
    try {
      resp = await fetch(serverBase + '/download-lease?app_id=' + encodeURIComponent(appId), {
        headers: { 'Authorization': 'Bearer ' + token },
      });
      json = await resp.json();
    } catch(e) { showToast('Error: ' + e.message, 'error'); return; }
    if (!resp.ok || !json.signed_url) { showToast(json.error || 'Could not get download link', 'error'); return; }
    window.open(json.signed_url, '_blank');
  }
  </script>
</body>
