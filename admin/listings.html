<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<title>Listings · Choice Properties Admin</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap">
<link rel="stylesheet" href="/css/cp-design.css?v=__BUILD_VERSION__">
<script defer src="/config.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js" integrity="sha384-YieCqqg9gQufX7+5HcFvCEg/n3KUEdl8/Jb+A6J0npf1mB740VayvwKjTrtCeUoy" crossorigin="anonymous"></script>
<script defer src="/js/cp-api.js" type="module"></script>
<script defer src="/js/cp-chrome.js?v=__BUILD_VERSION__"></script>
<script defer src="/js/cp-shell.js?v=__BUILD_VERSION__"></script>
</head>
<body data-page-title="Listings" data-page-sub="Loading…">
<div class="app">
  <main class="app-content">

    <div class="chip-row" id="chips">
      <button class="chip active" data-status="">All</button>
      <button class="chip" data-status="active">Active</button>
      <button class="chip" data-status="draft">Draft</button>
      <button class="chip" data-status="paused">Paused</button>
      <button class="chip" data-status="rented">Rented</button>
      <button class="chip" data-status="archived">Archived</button>
    </div>

    <div class="search">
      <svg class="i"><use href="#i-search"/></svg>
      <input id="search" type="text" placeholder="Search title or address…">
    </div>

    <div id="list-list"></div>

  </main>
</div>

<script defer src="/js/admin/listings.js?v=__BUILD_VERSION__"></script>
</body>
</html>
