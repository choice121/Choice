<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<title>Audit Log · Choice Properties Admin</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap">
<link rel="stylesheet" href="/css/cp-design.css?v=__BUILD_VERSION__">
<script defer src="/config.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js" integrity="sha384-YieCqqg9gQufX7+5HcFvCEg/n3KUEdl8/Jb+A6J0npf1mB740VayvwKjTrtCeUoy" crossorigin="anonymous"></script>
<script defer src="/js/cp-api.js" type="module"></script>
<script defer src="/js/cp-chrome.js?v=__BUILD_VERSION__"></script>
<script defer src="/js/cp-shell.js?v=__BUILD_VERSION__"></script>
<style>
  .audit-row{display:flex;flex-direction:column;gap:6px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md)}
  .audit-row + .audit-row{margin-top:var(--sp-2)}
  .audit-row .arow-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .audit-row .arow-meta{display:flex;flex-wrap:wrap;gap:4px}
  .meta-pill{font-size:.7rem;font-family:ui-monospace,Menlo,monospace;background:var(--surface-2);border:1px solid var(--border);padding:2px 7px;border-radius:6px;color:var(--muted)}
</style>
</head>
<body data-page-title="Audit Log" data-page-sub="History of admin & system actions" data-live="0">
<div class="app">
  <main class="app-content">

    <div class="form-grid-2">
      <select id="f-action" class="form-input">
        <option value="">All actions</option>
        <option value="update_status">Update status</option>
        <option value="mark_paid">Mark paid</option>
        <option value="mark_movein">Mark move-in</option>
        <option value="generate_lease">Generate lease</option>
        <option value="resend_lease">Resend lease</option>
        <option value="void_lease">Void lease</option>
        <option value="tenant_signed_lease">Tenant signed</option>
        <option value="co_applicant_signed_lease">Co-applicant signed</option>
      </select>
      <input id="f-app" class="form-input" type="text" placeholder="Filter by App ID…" maxlength="12" style="text-transform:uppercase">
    </div>

    <div class="row-flex between">
      <div class="text-strong">Actions</div>
      <span class="text-xs muted" id="result-count"></span>
    </div>

    <div id="audit-list"></div>

    <div class="pager">
      <button class="btn btn-ghost btn-sm" id="btn-prev" disabled>‹ Prev</button>
      <span id="page-info">—</span>
      <button class="btn btn-ghost btn-sm" id="btn-next" disabled>Next ›</button>
    </div>

  </main>
</div>

<script defer src="/js/admin/audit-log.js?v=__BUILD_VERSION__"></script>
</body>
</html>
