<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<title>Email Logs · Choice Properties Admin</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap">
<link rel="stylesheet" href="/css/cp-design.css?v=__BUILD_VERSION__">
<script defer src="/config.js"></script>
<script defer src="/js/supabase.min.js"></script>
<script defer src="/js/cp-api.js" type="module"></script>
<script defer src="/js/cp-chrome.js?v=__BUILD_VERSION__"></script>
<script defer src="/js/cp-shell.js?v=__BUILD_VERSION__"></script>
</head>
<body data-page-title="Email Logs" data-page-sub="System email audit trail" data-live="0">
<div class="app">
  <main class="app-content">

    <div class="search">
      <svg class="i"><use href="#i-search"/></svg>
      <input id="f-app" type="text" placeholder="Filter by App ID…">
    </div>

    <div class="form-grid-2">
      <select id="f-type" class="form-input">
        <option value="">All types</option>
        <option value="application_confirmation">Application confirmation</option>
        <option value="admin_notification">Admin notification</option>
        <option value="payment_confirmation">Payment confirmation</option>
        <option value="status_update">Status update</option>
        <option value="lease_sent">Lease sent</option>
        <option value="lease_signed_tenant">Lease signed (tenant)</option>
        <option value="lease_signed_admin">Lease signed (admin)</option>
        <option value="move_in_confirmation">Move-in confirmation</option>
        <option value="admin_message">Admin message</option>
      </select>
      <select id="f-status" class="form-input">
        <option value="">All statuses</option>
        <option value="success">Success</option>
        <option value="sent">Sent</option>
        <option value="failed">Failed</option>
      </select>
    </div>

    <div class="row-flex between">
      <div class="text-strong">Recent emails</div>
      <span class="text-xs muted" id="count-label"></span>
    </div>

    <div id="log-list"></div>

  </main>
</div>

<script defer src="/js/admin/email-logs.js?v=__BUILD_VERSION__"></script>
</body>
</html>
