<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<title>Deposit Accounting · Choice Properties Admin</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap">
<link rel="stylesheet" href="/css/cp-design.css?v=__BUILD_VERSION__">
<script defer src="/config.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js" integrity="sha384-YieCqqg9gQufX7+5HcFvCEg/n3KUEdl8/Jb+A6J0npf1mB740VayvwKjTrtCeUoy" crossorigin="anonymous"></script>
<script defer src="/js/cp-api.js" type="module"></script>
<script defer src="/js/cp-chrome.js?v=__BUILD_VERSION__"></script>
<script defer src="/js/cp-shell.js?v=__BUILD_VERSION__"></script>
<style>
  /* ── Phase 09 chunk 4: deposit accounting admin page ─────────────── */
  .dep-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:var(--sp-4);display:flex;flex-direction:column;gap:var(--sp-2)}
  .dep-card + .dep-card{margin-top:var(--sp-2)}
  .dep-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:var(--sp-2);padding:var(--sp-3) 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
  .dep-meta .k{font-size:.65rem;color:var(--muted-2);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
  .dep-meta .v{font-size:.82rem;color:var(--text);font-weight:600;margin-top:2px}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.7rem;font-weight:700;border:1px solid;margin-right:4px}
  .pill-info{background:rgba(59,130,246,.12);color:#93c5fd;border-color:rgba(59,130,246,.4)}
  .pill-warn{background:rgba(245,158,11,.12);color:#fcd34d;border-color:rgba(245,158,11,.4)}
  .pill-late{background:rgba(239,68,68,.14);color:#fca5a5;border-color:rgba(239,68,68,.5)}
  .pill-ok{background:rgba(34,197,94,.12);color:#86efac;border-color:rgba(34,197,94,.4)}
  .pill-muted{background:rgba(148,163,184,.15);color:#cbd5e1;border-color:rgba(148,163,184,.35)}
  .filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .search{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font:inherit;font-size:.86rem}
  .search:focus{outline:none;border-color:#3b82f6}
  .empty,.loading-state{text-align:center;padding:60px 20px;color:var(--muted-2)}
  .summary-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .summary-tile{flex:1;min-width:140px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px}
  .summary-tile .num{font-size:1.5rem;font-weight:800;color:var(--text);line-height:1}
  .summary-tile .lbl{font-size:.7rem;color:var(--muted-2);text-transform:uppercase;letter-spacing:.06em;margin-top:4px;font-weight:700}
  .summary-tile.warn .num{color:#fcd34d}
  .summary-tile.late .num{color:#fca5a5}
  .summary-tile.ok .num{color:#86efac}

  /* Editor modal */
  .dep-modal-bg{position:fixed;inset:0;background:rgba(7,11,22,.84);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:30px 12px;overflow-y:auto}
  .dep-modal-bg.open{display:flex}
  .dep-modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);max-width:920px;width:100%;padding:22px;display:flex;flex-direction:column;gap:14px}
  .dep-modal h2{font-size:1.05rem;font-weight:800;color:var(--text);margin:0}
  .dep-modal .sub{font-size:.78rem;color:var(--muted-2);margin-top:2px}
  .dep-modal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
  .dep-modal-grid .field{background:rgba(15,23,42,.45);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px}
  .dep-modal-grid .field .k{font-size:.65rem;color:var(--muted-2);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
  .dep-modal-grid .field .v{font-size:.92rem;color:var(--text);font-weight:700;margin-top:2px}
  .dep-totals{background:rgba(15,23,42,.45);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;display:flex;flex-direction:column;gap:6px}
  .dep-totals-row{display:flex;justify-content:space-between;font-size:.86rem;color:var(--text)}
  .dep-totals-row.emph{font-size:1.05rem;font-weight:800;border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
  .dep-totals-row.emph .v.refund{color:#86efac}
  .dep-totals-row.emph .v.zero{color:#fca5a5}
  .ded-table{width:100%;border-collapse:collapse;font-size:.84rem}
  .ded-table th{background:rgba(15,23,42,.4);text-align:left;padding:8px 10px;font-size:.7rem;color:var(--muted-2);text-transform:uppercase;letter-spacing:.06em;font-weight:700;border-bottom:1px solid var(--border)}
  .ded-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
  .ded-table tr:last-child td{border-bottom:none}
  .ded-table input[type=text],.ded-table input[type=number],.ded-table select{width:100%;background:rgba(15,23,42,.55);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font:inherit;font-size:.82rem}
  .ded-table .col-cat{width:170px}
  .ded-table .col-amt{width:110px;text-align:right}
  .ded-table .col-amt input{text-align:right}
  .ded-table .col-act{width:42px;text-align:center}
  .icon-btn{background:transparent;border:1px solid var(--border);color:var(--muted-2);width:30px;height:30px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:1rem}
  .icon-btn:hover{color:#fca5a5;border-color:rgba(239,68,68,.5)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;border-top:1px solid var(--border);padding-top:14px;margin-top:4px}
  .btn{padding:9px 16px;border-radius:8px;font:inherit;font-size:.86rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text)}
  .btn:hover{border-color:#3b82f6}
  .btn-primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
  .btn-primary:hover{background:#2563eb;border-color:#2563eb}
  .btn-success{background:#16a34a;border-color:#16a34a;color:#fff}
  .btn-success:hover{background:#15803d;border-color:#15803d}
  .btn-link{background:transparent;border:none;color:#93c5fd;text-decoration:underline;cursor:pointer;padding:0;font:inherit;font-size:.84rem}
  .late-banner{background:linear-gradient(180deg,rgba(239,68,68,.08),rgba(239,68,68,.03));border:1px solid rgba(239,68,68,.45);border-left:4px solid #ef4444;border-radius:var(--r-md);padding:12px 14px;font-size:.84rem;color:#fca5a5;margin-bottom:10px}
  .late-banner strong{color:#fff}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.95);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:8px;font-size:.86rem;z-index:2000;box-shadow:0 10px 30px rgba(0,0,0,.5);opacity:0;transition:opacity .2s}
  .toast.show{opacity:1}
  .toast.error{border-color:rgba(239,68,68,.6);color:#fca5a5}
  .toast.ok{border-color:rgba(34,197,94,.5);color:#86efac}
</style>
</head>
<body data-page-title="Deposit Accounting" data-page-sub="Loading…">
<div class="app">
  <main class="app-content">

    <div class="summary-bar" id="summary"></div>

    <div class="filter-bar">
      <input class="search" type="search" id="q" placeholder="Search by address, tenant name, or app ID…">
    </div>

    <div class="chip-row" id="chips">
      <button class="chip active" data-filter="all">All move-outs</button>
      <button class="chip" data-filter="needs_letter">Needs letter</button>
      <button class="chip" data-filter="late">Past deadline</button>
      <button class="chip" data-filter="sent">Letter sent</button>
      <button class="chip" data-filter="disputed">Tenant disputed</button>
    </div>

    <div id="list"></div>
    <div id="empty" class="empty" style="display:none">No applications match these filters.</div>
    <div id="loading" class="loading-state">Loading move-out applications…</div>

  </main>
</div>

<!-- Editor modal -->
<div class="dep-modal-bg" id="editorBg" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
  <div class="dep-modal">
    <div>
      <h2 id="editorTitle">Deposit Accounting</h2>
      <div class="sub" id="editorSub">—</div>
    </div>

    <div id="editorLate"></div>

    <div class="dep-modal-grid" id="editorGrid"></div>

    <div>
      <div style="font-size:.74rem;color:var(--muted-2);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:6px">Itemized deductions</div>
      <table class="ded-table" id="dedTable">
        <thead>
          <tr>
            <th class="col-cat">Category</th>
            <th>Description</th>
            <th class="col-amt">Amount ($)</th>
            <th class="col-act"></th>
          </tr>
        </thead>
        <tbody id="dedRows"></tbody>
      </table>
      <button class="btn-link" id="addDed" style="margin-top:8px">+ Add deduction</button>
    </div>

    <div class="dep-totals" id="totalsBox"></div>

    <div>
      <label style="font-size:.74rem;color:var(--muted-2);text-transform:uppercase;letter-spacing:.06em;font-weight:700">Admin notes (internal)</label>
      <textarea id="adminNotes" rows="3" style="width:100%;margin-top:6px;background:rgba(15,23,42,.55);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font:inherit;font-size:.84rem;resize:vertical" placeholder="Optional notes — not shown to tenant"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn" id="btnCancel">Close</button>
      <button class="btn" id="btnPreview">Recompute totals</button>
      <button class="btn-link" id="btnDownload" style="margin-right:auto;display:none">Download letter PDF</button>
      <button class="btn-success" id="btnGenerate">Generate &amp; finalize letter</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script defer src="/js/admin/deposit-accounting.js?v=__BUILD_VERSION__"></script>
</body>
</html>
