<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="noindex,follow">
  <title>Page Not Found — Choice Properties</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/css/cp-design.css?v=20260428">
  <style>
    .nf-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-6);
      background: var(--bg);
    }
    .nf-card {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }
    .nf-code {
      font-size: clamp(72px, 14vw, 132px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--brand);
      margin: 0 0 var(--sp-3);
    }
    .nf-title {
      font-size: clamp(22px, 3.5vw, 30px);
      font-weight: 700;
      color: var(--text);
      margin: 0 0 var(--sp-2);
      letter-spacing: -0.01em;
    }
    .nf-sub {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
      margin: 0 auto var(--sp-6);
      max-width: 380px;
    }
    .nf-actions {
      display: flex;
      gap: var(--sp-3);
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: var(--sp-6);
    }
    .nf-help {
      font-size: 13px;
      color: var(--muted-2);
    }
    .nf-help a {
      color: var(--brand);
      font-weight: 600;
      text-decoration: none;
    }
    .nf-help a:hover { text-decoration: underline; }
    .nf-brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: var(--sp-6);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
    }
    .nf-brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--brand);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body data-portal="public" data-page-title="Page Not Found">
  <main class="nf-wrap">
    <div class="nf-card">
      <a href="/index.html" class="nf-brand">
        <span class="nf-brand-mark" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 9.5L12 3L21 9.5V20C21 20.55 20.55 21 20 21H15V15H9V21H4C3.45 21 3 20.55 3 20V9.5Z" fill="white" opacity="0.95"/>
            <circle cx="12" cy="11" r="2.5" fill="rgba(255,255,255,0.6)"/>
          </svg>
        </span>
        Choice Properties
      </a>
      <p class="nf-code">404</p>
      <h1 class="nf-title">Page Not Found</h1>
      <p class="nf-sub">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <div class="nf-actions">
        <a href="/index.html" class="btn btn-primary">Back to Home</a>
        <a href="/listings.html" class="btn btn-ghost">Browse Listings</a>
      </div>
      <p class="nf-help">
        Need help? <a href="mailto:support@choiceproperties.com" data-cfg-email>support@choiceproperties.com</a>
      </p>
    </div>
  </main>
  <script defer src="/config.js"></script>
</body>
</html>
