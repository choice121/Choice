<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="noindex, nofollow">
  <title>Create Account — Choice Properties</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,500&display=swap">
  <link rel="stylesheet" href="/assets/fontawesome.css">
  <link rel="stylesheet" href="/css/cp-design.css?v=20260429">
  <style>
    /* Register-only widgets layered on top of the shared auth shell */
    .auth-shell-card.wide { max-width: 520px; }

    .pw-strength-bar  { height:4px; border-radius:2px; background:var(--surface-3); margin-top:8px; overflow:hidden; }
    .pw-strength-fill { height:100%; border-radius:2px; transition:width 300ms,background 300ms; width:0%; }
    .pw-strength-label{ font-size:.72rem; margin-top:4px; font-weight:500; }

    /* Account-type radio grid */
    .acct-type-grid   { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px; }
    .acct-type-option { position:relative; }
    .acct-type-option input[type=radio] { position:absolute; opacity:0; width:0; height:0; }
    .acct-type-label  {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:6px; padding:14px 10px;
      border:1.5px solid var(--border-strong); border-radius:var(--r-sm);
      cursor:pointer; text-align:center;
      font-size:.78rem; font-weight:600; color:var(--muted);
      background:var(--surface);
      transition:border-color .15s, background .15s, color .15s;
    }
    .acct-type-label i { font-size:18px; color:var(--muted-2); transition:color .15s; }
    .acct-type-option input:checked + .acct-type-label {
      border-color:var(--gold); background:rgba(201,165,92,.08); color:#8a6000;
    }
    .acct-type-option input:checked + .acct-type-label i { color:var(--gold); }
    .acct-type-label:hover { border-color:#c8a040; background:rgba(201,165,92,.05); }

    /* Avatar upload */
    .avatar-upload-wrap { display:flex; align-items:center; gap:16px; margin-bottom:var(--sp-4); }
    .avatar-preview {
      width:80px; height:80px; border-radius:50%;
      border:2.5px solid var(--border-strong);
      object-fit:cover; background:var(--surface-2);
      display:flex; align-items:center; justify-content:center;
      font-size:28px; color:var(--muted-2); flex-shrink:0; overflow:hidden;
    }
    .avatar-preview img { width:100%; height:100%; object-fit:cover; display:none; }
    .avatar-upload-btn {
      display:inline-flex; align-items:center; gap:8px; padding:8px 16px;
      border:1.5px solid var(--border-strong); border-radius:var(--r-sm);
      background:var(--surface);
      font-size:.82rem; font-weight:600; color:var(--text); cursor:pointer;
      transition:border-color .15s, background .15s;
    }
    .avatar-upload-btn:hover { border-color:var(--gold); background:rgba(201,165,92,.08); color:#8a6000; }
    .avatar-upload-hint { font-size:.72rem; color:var(--muted-2); margin-top:4px; }

    /* Inline two-column form row */
    .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width: 480px) { .form-row-2 { grid-template-columns:1fr; gap:0; } }
  </style>
  <script defer src="/config.js"></script>
  <script defer src="/js/supabase.min.js"></script>
  <script defer src="/js/cp-ui.js?v=20260429"></script>
  <script type="module" src="/js/cp-api.js"></script>
</head>
<body>

<div class="auth-shell">
  <div class="auth-shell-card wide">
    <div class="auth-shell-brand">
      <div class="name">Choice Properties</div>
      <div class="sub">Join the Marketplace</div>
      <div class="divider"></div>
    </div>

    <div class="auth-form-inner">
      <p class="auth-shell-subtitle">
        Create your landlord account.
        Already have one? <a href="/landlord/login.html">Sign in →</a>
      </p>

      <div class="auth-alert error" id="errorBox">
        <span id="errorMsg"></span>
      </div>

      <form id="registerForm" autocomplete="on" novalidate>

        <!-- Account Type -->
        <div class="field">
          <label class="field-label">Account Type *</label>
          <div class="acct-type-grid">
            <div class="acct-type-option">
              <input type="radio" name="accountType" id="at_landlord" value="landlord" checked>
              <label class="acct-type-label" for="at_landlord"><i class="fas fa-home"></i>Landlord</label>
            </div>
            <div class="acct-type-option">
              <input type="radio" name="accountType" id="at_owner" value="property_owner">
              <label class="acct-type-label" for="at_owner"><i class="fas fa-building"></i>Property Owner</label>
            </div>
            <div class="acct-type-option">
              <input type="radio" name="accountType" id="at_realtor" value="realtor">
              <label class="acct-type-label" for="at_realtor"><i class="fas fa-id-badge"></i>Realtor</label>
            </div>
            <div class="acct-type-option">
              <input type="radio" name="accountType" id="at_brokerage" value="brokerage">
              <label class="acct-type-label" for="at_brokerage"><i class="fas fa-briefcase"></i>Brokerage</label>
            </div>
            <div class="acct-type-option">
              <input type="radio" name="accountType" id="at_agency" value="agency">
              <label class="acct-type-label" for="at_agency"><i class="fas fa-user-tie"></i>Agency</label>
            </div>
            <div class="acct-type-option">
              <input type="radio" name="accountType" id="at_llc" value="llc">
              <label class="acct-type-label" for="at_llc"><i class="fas fa-landmark"></i>LLC</label>
            </div>
            <div class="acct-type-option" style="grid-column:1/-1">
              <input type="radio" name="accountType" id="at_pm" value="property_management">
              <label class="acct-type-label" for="at_pm" style="flex-direction:row;justify-content:center;gap:10px">
                <i class="fas fa-city"></i>Property Management Company
              </label>
            </div>
          </div>
        </div>

        <!-- Avatar Upload -->
        <div class="field">
          <label class="field-label">Profile Photo <span style="text-transform:none;letter-spacing:normal;font-weight:400;color:var(--muted-2)">(optional)</span></label>
          <div class="avatar-upload-wrap">
            <div class="avatar-preview" id="avatarPreview">
              <img id="avatarImg" src="" alt="" loading="lazy">
              <i class="fas fa-user" id="avatarIcon"></i>
            </div>
            <div>
              <label class="avatar-upload-btn" for="avatarFile">
                <i class="fas fa-camera"></i> Upload Photo
              </label>
              <input type="file" id="avatarFile" accept="image/*" style="display:none">
              <div class="avatar-upload-hint">JPG or PNG · Max 5MB</div>
            </div>
          </div>
        </div>

        <div class="form-row-2">
          <div class="field">
            <label class="field-label" for="firstName">First Name *</label>
            <input class="field-input" type="text" id="firstName" placeholder="John" autocomplete="given-name">
          </div>
          <div class="field">
            <label class="field-label" for="lastName">Last Name *</label>
            <input class="field-input" type="text" id="lastName" placeholder="Smith" autocomplete="family-name">
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="businessName">
            Business / Company Name
            <span style="text-transform:none;letter-spacing:normal;font-weight:400;color:var(--muted-2)">(optional)</span>
          </label>
          <input class="field-input" type="text" id="businessName" placeholder="Smith Properties LLC">
        </div>

        <div class="field">
          <label class="field-label" for="emailInput">Email Address *</label>
          <input class="field-input" type="email" id="emailInput"
                 placeholder="you@example.com" autocomplete="email" inputmode="email">
        </div>

        <div class="field">
          <label class="field-label" for="phoneInput">Phone Number *</label>
          <input class="field-input" type="tel" id="phoneInput"
                 placeholder="(555) 000-0000" autocomplete="tel" inputmode="tel">
        </div>

        <div class="field">
          <label class="field-label" for="passwordInput">Password *</label>
          <div class="field-input-wrap">
            <input class="field-input has-suffix" type="password" id="passwordInput"
                   placeholder="At least 8 characters" autocomplete="new-password">
            <button type="button" class="field-suffix-btn" id="togglePw" aria-label="Show password">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="pw-strength-bar"><div class="pw-strength-fill" id="strengthFill"></div></div>
          <div class="pw-strength-label" id="strengthLabel" style="color:var(--muted-2)"></div>
        </div>

        <div class="field">
          <label class="field-label" for="passwordConfirm">Confirm Password *</label>
          <div class="field-input-wrap">
            <input class="field-input has-suffix" type="password" id="passwordConfirm"
                   placeholder="Re-enter your password" autocomplete="new-password">
            <button type="button" class="field-suffix-btn" id="togglePw2" aria-label="Show password">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div id="matchMsg" style="font-size:.75rem;margin-top:4px;font-weight:500"></div>
        </div>

        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:var(--sp-4)">
          <input type="checkbox" id="termsCheck" style="margin-top:4px;accent-color:var(--gold);flex-shrink:0;width:16px;height:16px">
          <label for="termsCheck" style="font-size:.82rem;color:var(--muted);line-height:1.5;cursor:pointer">
            I agree to the <a href="/terms.html" target="_blank" style="color:var(--gold)">Terms of Service</a> and
            <a href="/privacy.html" target="_blank" style="color:var(--gold)">Privacy Policy</a>.
            I confirm I am a property owner or authorized representative.
          </label>
        </div>

        <button type="submit" class="btn-auth" id="registerBtn">
          <span class="btn-text">Create Account</span>
          <div class="btn-spinner"></div>
        </button>
      </form>

      <p class="auth-shell-foot">
        After registration you can log in immediately and submit your first listing.
      </p>
    </div>
  </div>
</div>

<script type="module" nonce="VZEkWatH2Jtta2vFy8dRhA">
  import { signUp, getSession } from '../js/cp-api.js';
  import { supabase } from '../js/cp-api.js';

  getSession().then(s => { if (s) window.location.href = '/landlord/dashboard.html'; });

  // Avatar preview
  const avatarFile = document.getElementById('avatarFile');
  const avatarImg  = document.getElementById('avatarImg');
  const avatarIcon = document.getElementById('avatarIcon');

  avatarFile.addEventListener('change', () => {
    const file = avatarFile.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showError('Avatar must be under 5MB.'); avatarFile.value = ''; return; }
    const reader = new FileReader();
    reader.onload = e => {
      avatarImg.src = e.target.result;
      avatarImg.style.display = 'block';
      avatarIcon.style.display = 'none';
    };
    reader.readAsDataURL(file);
  });

  // Toggle password visibility
  function makeToggle(btnId, inputId) {
    document.getElementById(btnId).addEventListener('click', () => {
      const inp = document.getElementById(inputId);
      inp.type = inp.type === 'password' ? 'text' : 'password';
    });
  }
  makeToggle('togglePw',  'passwordInput');
  makeToggle('togglePw2', 'passwordConfirm');

  // Password strength
  const pwInput = document.getElementById('passwordInput');
  const fillEl  = document.getElementById('strengthFill');
  const labelEl = document.getElementById('strengthLabel');
  pwInput.addEventListener('input', () => {
    const pw = pwInput.value;
    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const levels = [
      { pct:'0%',   color:'var(--surface-3)', label:'',            labelColor:'var(--muted-2)' },
      { pct:'25%',  color:'#dc2626',          label:'Weak',        labelColor:'#dc2626' },
      { pct:'50%',  color:'#f59e0b',          label:'Fair',        labelColor:'#b45309' },
      { pct:'75%',  color:'var(--gold)',      label:'Good',        labelColor:'#8a6000' },
      { pct:'90%',  color:'#22c55e',          label:'Strong',      labelColor:'#15803d' },
      { pct:'100%', color:'#16a34a',          label:'Very Strong', labelColor:'#14532d' },
    ];
    const level = levels[Math.min(score, 5)];
    fillEl.style.width      = pw.length ? level.pct : '0%';
    fillEl.style.background = level.color;
    labelEl.textContent     = pw.length ? level.label : '';
    labelEl.style.color     = level.labelColor;
  });

  // Password match
  const pwConfirm = document.getElementById('passwordConfirm');
  const matchMsg  = document.getElementById('matchMsg');
  function checkMatch() {
    if (!pwConfirm.value) { matchMsg.textContent = ''; return; }
    if (pwInput.value === pwConfirm.value) {
      matchMsg.textContent = '✓ Passwords match';     matchMsg.style.color = '#15803d';
    } else {
      matchMsg.textContent = '✗ Passwords do not match'; matchMsg.style.color = '#dc2626';
    }
  }
  pwConfirm.addEventListener('input', checkMatch);
  pwInput  .addEventListener('input', () => { if (pwConfirm.value) checkMatch(); });

  // Register
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const firstName    = document.getElementById('firstName').value.trim();
    const lastName     = document.getElementById('lastName').value.trim();
    const businessName = document.getElementById('businessName').value.trim();
    const email        = document.getElementById('emailInput').value.trim();
    const phone        = document.getElementById('phoneInput').value.trim();
    const password     = pwInput.value;
    const confirm      = pwConfirm.value;
    const terms        = document.getElementById('termsCheck').checked;
    const accountType  = document.querySelector('input[name="accountType"]:checked')?.value || 'landlord';

    if (!firstName || !lastName) return showError('Please enter your full name.');
    if (!email)                  return showError('Please enter your email address.');
    if (!phone)                  return showError('Please enter your phone number.');
    if (password.length < 8)     return showError('Password must be at least 8 characters.');
    if (password !== confirm)    return showError('Passwords do not match.');
    if (!terms)                  return showError('Please agree to the terms to continue.');

    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const result = await signUp(email, password, {
        contact_name  : `${firstName} ${lastName}`,
        business_name : businessName || null,
        phone,
        account_type  : accountType,
        avatar_url    : null
      });

      // Upload avatar AFTER account is created — prevents orphaned files if signUp fails
      // I-068: Avatar upload error handling — don't block signup if upload fails
      if (avatarFile.files[0] && supabase && result?.user) {
        const file = avatarFile.files[0];
        const ext  = file.name.split('.').pop();
        const path = `avatars/${result.user.id}.${ext}`;
        try {
          const { data: uploadData, error: uploadErr } = await supabase.storage
            .from('profile-photos').upload(path, file, { cacheControl:'3600', upsert:false });
          if (!uploadErr && uploadData) {
            try {
              const { data: urlData } = supabase.storage.from('profile-photos').getPublicUrl(path);
              const avatarUrl = urlData?.publicUrl || null;
              if (avatarUrl) {
                await supabase.from('landlords').update({ avatar_url: avatarUrl }).eq('user_id', result.user.id);
              }
            } catch (e) {
              console.warn('Avatar URL update failed:', e);
            }
          } else if (uploadErr) {
            console.warn('Avatar upload failed:', uploadErr);
            CP.UI.toast('Account created! Your profile photo couldn\'t be uploaded. You can add it later in Settings.', 'warning');
          }
        } catch (avatarErr) {
          console.error('Avatar upload encountered an error:', avatarErr);
          CP.UI.toast('Account created! Your profile photo couldn\'t be uploaded. You can add it later in Settings.', 'warning');
        }
      }

      // Check if Supabase returned an active session (email confirmation disabled)
      // or if it needs email confirmation first
      const hasSession = !!(result?.session);

      if (hasSession) {
        window.location.href = '/landlord/dashboard.html';
        return;
      }

      // P1-F: Email confirmation required — show full-page success state with resend option
      document.querySelector('.auth-form-inner').innerHTML = `
        <div style="text-align:center;padding:24px 0">
          <div style="width:72px;height:72px;background:#dbeafe;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:#2563eb">
            <i class="fas fa-envelope"></i>
          </div>
          <h2 style="font-size:1.4rem;font-weight:800;color:var(--text);margin-bottom:10px">Check Your Email</h2>
          <p style="color:var(--muted);font-size:.92rem;line-height:1.6;max-width:380px;margin:0 auto 16px">
            We sent a confirmation link to <strong>${email}</strong>. Click it to activate your account, then sign in.
          </p>
          <p style="color:var(--muted-2);font-size:.78rem;max-width:340px;margin:0 auto 16px">
            Don't see it? Check your spam folder. The link expires in 24 hours.
          </p>
          <div id="resendMsg" class="auth-alert success" style="margin:0 auto 16px;max-width:340px"></div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:12px">
            <a href="/landlord/login.html" class="btn-auth" style="display:inline-flex;width:auto;padding:13px 28px">
              <span class="btn-text">Go to Sign In</span>
            </a>
            <button id="resendBtn" style="background:none;border:none;color:#2563eb;font-size:.82rem;cursor:pointer;text-decoration:underline;padding:6px 8px;font-family:inherit">
              Resend confirmation email
            </button>
          </div>
        </div>`;

      // P1-F: Wire up the resend button using supabase.auth.resend()
      document.getElementById('resendBtn').addEventListener('click', async () => {
        const btn = document.getElementById('resendBtn');
        const msgEl = document.getElementById('resendMsg');
        btn.disabled = true;
        btn.textContent = 'Sending…';
        try {
          const { error } = await supabase.auth.resend({ type: 'signup', email });
          if (error) throw error;
          msgEl.classList.remove('error');
          msgEl.classList.add('success', 'visible');
          msgEl.textContent = 'Confirmation email resent! Check your inbox (and spam folder).';
          btn.textContent = 'Email resent';
        } catch (err) {
          msgEl.classList.remove('success');
          msgEl.classList.add('error', 'visible');
          msgEl.textContent = err.message || 'Failed to resend. Please try again in a moment.';
          btn.disabled = false;
          btn.textContent = 'Resend confirmation email';
        }
      });
    } catch (err) {
      showError(err.message || 'Registration failed. Please try again.');
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  });

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.classList.add('visible');
    document.getElementById('errorMsg').textContent = msg;
  }
</script>

</body>
</html>
