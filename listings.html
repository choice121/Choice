<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>

  <meta charset="UTF-8">

  <meta property="og:description" content="Verified rental listings nationwide. Apartments, houses, condos — apply in 15 minutes.">

  <style>
    /* ── CRITICAL CSS — above-fold paint for listings.html ───────────────────
       Minimal subset of cp-marketing.css needed for: nav slot reservation,
       page header background, sticky filter bar baseline, card grid skeleton.
    ─────────────────────────────────────────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body[data-portal="public"]{
      margin:0;
      font-family:"Inter",-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#f7f9fc;color:#1f2937;line-height:1.6;font-size:15.5px;
    }
    #site-nav{min-height:64px;display:block}
    .listings-page-header{background:#fff;border-bottom:1px solid #e4e8ef;padding:28px 0 20px;margin-top:64px}
    .filter-bar{background:#fff;border-bottom:1px solid #e4e8ef}
    .property-grid{display:grid;grid-template-columns:1fr;gap:16px}
    .property-card{overflow:hidden;background:#fff;border-radius:18px}
    .property-card-img{position:relative;aspect-ratio:4/3;width:100%;overflow:hidden;background:linear-gradient(145deg,#c8d8e8 0%,#b8cad8 50%,#a8bac8 100%)}
  </style>
<script defer src="/config.js?v=__BUILD_VERSION__"></script>
<script defer src="/js/supabase.min.js"></script>

  <!-- I-060: CollectionPage structured data for listings page -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "Rental Listings — Choice Properties",
    "description": "Browse verified rental listings across the United States. Filter by price, bedrooms, and more.",
    "url": "https://choice-properties-site.pages.dev/listings.html",

      "name": "Choice Properties",
      "url": "https://choice-properties-site.pages.dev/"
    }
  }

<body data-portal="public" data-page="listings">

<!-- Nav slot — hydrated by /js/components.js (components/nav.html) -->
<div id="site-nav"></div>
<!-- ── Page Header (Phase 9.8 mv2 refresh) ── -->
<div class="listings-page-header mv2-listings-header">
  <div class="mv2-listings-header__bg" aria-hidden="true"></div>
  <div class="container mv2-listings-header__inner">
    <p class="mv2-eyebrow mv2-listings-header__eyebrow">Browse our listings</p>
    <h1 class="listings-page-title mv2-listings-header__title">
      Find your <em>next place</em>.
    </h1>
    <p class="mv2-listings-header__subtitle">
      Verified homes from real landlords. Filter by what matters,
      apply in about fifteen minutes.
    </p>
    <div class="listings-search-row mv2-search-row">
      <div class="search-field sf-text mv2-search-field mv2-search-field--text">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput"
          placeholder="City, zip code, or neighborhood…"
          autocomplete="off" aria-label="Search listings">
      </div>
      <div class="search-field sf-select mv2-search-field mv2-search-field--select">
        <i class="fas fa-bed"></i>
        <select id="bedroomsFilter" aria-label="Bedrooms">
          <option value="">Any beds</option>
          <option value="0">Studio</option>
          <option value="1">1 Bed</option>
          <option value="2">2 Beds</option>
          <option value="3">3 Beds</option>
          <option value="4">4+ Beds</option>
        </select>
      </div>
      
      <div class="search-field sf-select mv2-search-field mv2-search-field--select">
          <i class="fas fa-dollar-sign"></i>
          <select id="maxRentFilter" aria-label="Max Rent">
            <option value="">Any price</option>
            <option value="800">Under $800</option>
            <option value="1000">Under $1,000</option>
            <option value="1500">Under $1,500</option>
            <option value="2000">Under $2,000</option>
            <option value="2500">Under $2,500</option>
            <option value="3000">Under $3,000</option>
            <option value="4000">Under $4,000</option>
          </select>
        </div>
        <button class="listings-search-btn mv2-search-btn" id="searchBtn" aria-label="Search">
        <i class="fas fa-search"></i> Search
      </button>
    </div>
  </div>
</div>

<!-- ── Filter Bar (Phase 9.8 mv2 polish) ── -->
<div class="filter-bar mv2-filter-bar">
  <div class="filter-bar-inner">
    <!-- Mobile-only Filters button (Fix 2) -->
      <button class="mobile-filters-btn" id="mobileFiltersBtn">
        <i class="fas fa-sliders-h"></i> Filters
        <span class="mobile-filters-badge" id="mobileFiltersBadge" style="display:none"></span>
      </button>
      <!-- Clear All pill — desktop, shown when filters active (Fix 3) -->
      <button class="filter-pill filter-pill-clear" id="clearAllPill" style="display:none">
        <i class="fas fa-times-circle"></i> Clear all
      </button>
      <button class="filter-pill active" data-filter="all"><i class="fas fa-th"></i> All</button>
    <button class="filter-pill" data-filter="apartment"><i class="fas fa-building"></i> Apartments</button>
    <button class="filter-pill" data-filter="house"><i class="fas fa-home"></i> Houses</button>
    <button class="filter-pill" data-filter="condo"><i class="fas fa-city"></i> Condos</button>
    <button class="filter-pill" data-filter="townhouse"><i class="fas fa-house-user"></i> Townhomes</button>
    <div class="filter-divider"></div>
    <button class="filter-pill" data-filter="pets"><i class="fas fa-paw"></i> Pet Friendly</button>
    <button class="filter-pill" data-filter="available"><i class="fas fa-calendar-check"></i> Move-in Ready</button>
    <button class="filter-pill" data-filter="parking"><i class="fas fa-car"></i> Parking</button>

    <div class="filter-dropdown-wrap" id="moreFiltersWrap">
      <button class="filter-pill" id="moreFiltersBtn">
        <i class="fas fa-sliders-h"></i> More Filters
        <span class="filter-active-badge" id="filterActiveBadge" style="display:none"></span>
      </button>
      <div class="filter-dropdown" id="moreFiltersDropdown">
        <div class="filter-dropdown-mobile-header">
            <span class="filter-dropdown-title">Advanced Filters</span>
            <button class="filter-dropdown-clear-all" id="clearAllMobile">
              <i class="fas fa-times-circle"></i> Clear all
            </button>
          </div>
        <div class="filter-dropdown-row">
          <label>Min Bedrooms</label>
          <select id="advMinBeds">
            <option value="">Any</option>
            <option value="0">Studio</option>
            <option value="1">1+</option>
            <option value="2">2+</option>
            <option value="3">3+</option>
          </select>
        </div>
        <div class="filter-dropdown-row">
          <label>Min Bathrooms</label>
          <select id="advMinBaths">
            <option value="">Any</option>
            <option value="1">1+</option>
            <option value="1.5">1.5+</option>
            <option value="2">2+</option>
          </select>
        </div>
        <div class="filter-dropdown-row">
          <label>Min Price</label>
          <input type="number" id="advMinRent" placeholder="e.g. 800" min="0" step="50">
        </div>
        <div class="filter-dropdown-row">
          <label>Max Price</label>
          <input type="number" id="advMaxRent" placeholder="e.g. 1500" min="0" step="50">
        </div>
        <div class="filter-dropdown-row">
          <label>Laundry</label>
          <select id="advLaundryFilter">
            <option value="">Any</option>
            <option value="in-unit">In-Unit W/D</option>
            <option value="hookups">W/D Hookups</option>
            <option value="shared">Shared Laundry</option>
            <option value="laundromat">Laundromat Nearby</option>
            <option value="none">None</option>
          </select>
        </div>
        <div class="filter-dropdown-row">
          <label>Heating</label>
          <select id="advHeatingFilter">
            <option value="">Any</option>
            <option value="gas-forced-air">Gas Forced Air</option>
            <option value="electric">Electric</option>
            <option value="baseboard">Baseboard</option>
            <option value="radiant">Radiant</option>
            <option value="heat-pump">Heat Pump</option>
            <option value="boiler">Boiler</option>
          </select>
        </div>
        <div class="filter-dropdown-row">
          <label>Pet Type</label>
          <select id="advPetTypeFilter">
            <option value="">Any</option>
            <option value="Dogs">Dogs</option>
            <option value="Cats">Cats</option>
            <option value="Birds">Birds</option>
            <option value="Small Animals">Small Animals</option>
            <option value="Reptiles">Reptiles</option>
          </select>
        </div>
        <div class="filter-dropdown-actions">
          <button class="filter-btn-clear" id="clearAdvFilters">Clear</button>
          <button class="filter-btn-apply" id="applyAdvFilters">Apply Filters</button>
        </div>
      </div>
    </div>

    <div class="filter-count" id="filterCount"></div>
  </div>
</div>

<!-- ── Listings (Phase 9.8 mv2 polish) ── -->
<section class="listings-section mv2-listings-section" id="listings">

          <button class="view-toggle-btn" id="btnMapView" aria-label="Map view">
            <i class="fas fa-map"></i> Map
          </button>
        </div>
        <div class="listings-sort">
          <select id="sortSelect" aria-label="Sort by">
            <option value="newest">Newest</option>
            <option value="price_asc">Price ↑</option>
            <option value="price_desc">Price ↓</option>
            <option value="beds_desc">Most Beds</option>

        </div>
      </div>
    </div>

    <!-- Grid View -->
    <div id="listPanel">

            <div class="skeleton skeleton-line" style="width:75%"></div>
            <div class="skeleton skeleton-line" style="width:60%"></div>
            <div class="skeleton skeleton-line" style="height:12px;width:45%;margin-top:8px"></div>

        <div class="property-card property-card-skeleton">
          <div class="property-card-img skeleton-img skeleton"></div>
          <div class="property-card-body" style="gap:10px;padding:20px">

            <div class="skeleton skeleton-line" style="width:50%"></div>
            <div class="skeleton skeleton-line" style="height:12px;width:42%;margin-top:8px"></div>
          </div>
        </div>
        <div class="property-card property-card-skeleton">
          <div class="property-card-img skeleton-img skeleton"></div>
          <div class="property-card-body" style="gap:10px;padding:20px">
            <div class="skeleton skeleton-line" style="height:26px;width:40%"></div>
            <div class="skeleton skeleton-line" style="width:78%"></div>
            <div class="skeleton skeleton-line" style="width:58%"></div>
            <div class="skeleton skeleton-line" style="height:12px;width:38%;margin-top:8px"></div>
          </div>
        </div>
        <div class="property-card property-card-skeleton">
          <div class="property-card-img skeleton-img skeleton"></div>
          <div class="property-card-body" style="gap:10px;padding:20px">
            <div class="skeleton skeleton-line" style="height:26px;width:36%"></div>
            <div class="skeleton skeleton-line" style="width:82%"></div>
            <div class="skeleton skeleton-line" style="width:52%"></div>
            <div class="skeleton skeleton-line" style="height:12px;width:43%;margin-top:8px"></div>
          </div>
        </div>
        <div class="property-card property-card-skeleton">
          <div class="property-card-img skeleton-img skeleton"></div>
          <div class="property-card-body" style="gap:10px;padding:20px">
            <div class="skeleton skeleton-line" style="height:26px;width:34%"></div>
            <div class="skeleton skeleton-line" style="width:76%"></div>
            <div class="skeleton skeleton-line" style="width:62%"></div>
            <div class="skeleton skeleton-line" style="height:12px;width:46%;margin-top:8px"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Map View -->
    <div id="mapPanel">
      <div id="listingsMap"></div>
      <div id="mapLoadingSpinner" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; align-items: center; justify-content: center; flex-direction: column; gap: 12px;">

        <p style="color: var(--color-text-muted); font-size: 13px; margin: 0;">Loading map...</p>
      </div>
    </div>

    <!-- Pagination -->
    <div id="paginationBar" style="margin: 32px 0 8px; display:flex; justify-content:center;"></div>
  </div>
</section>

<div id="site-footer"></div>

<div class="toast-container" id="toastContainer"></div>
