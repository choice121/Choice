<!DOCTYPE html>
<!--
  count.html — internal embed-only stat widget.
  EXEMPT from the cp-design.css migration (Phase 6.3, option B).
  Self-contained: tiny dark card showing active listing count, no nav/footer.
  Reason for exemption: zero shared chrome, no portal context, used only as an
  iframe/embed source. Keeping it dependency-free avoids a needless CSS load.
-->
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0B1D38">
  <meta name="robots" content="noindex,nofollow">
  <title>Listings Count</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0B1D38;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .wrap {
      text-align: center;
    }
    .count {
      font-size: clamp(72px, 20vw, 140px);
      font-weight: 800;
      color: #fff;
      line-height: 1;
      letter-spacing: -2px;
    }
    .label {
      margin-top: 12px;
      font-size: clamp(13px, 3.5vw, 16px);
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
  <script defer src="/config.js"></script>
  <script defer src="/js/supabase.min.js"></script>
  <script type="module" src="/js/cp-api.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="count" id="count">—</div>
    <div class="label">Active Listings</div>
  </div>

  <script type="module">
    await new Promise(r => setTimeout(r, 300));
    try {
      const { count } = await CP.sb()
        .from('properties')
        .select('id', { count: 'exact', head: true })
        .eq('status', 'active');
      const el = document.getElementById('count');
      if (el && count != null) el.textContent = count.toLocaleString();
    } catch (_) {}
  </script>
</body>
</html>
